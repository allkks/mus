<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Premium Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#ffcc00', surface: '#121212', accent: '#1e1e1e' }, fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } } }
    </script>
    <style>
        body { background-color: #000; color: #fff; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .pb-safe { padding-bottom: 12rem; }
    </style>
</head>
<body>
    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-safe">
        
        <section id="page-home" class="page p-6 pt-24">
            <h1 class="text-5xl font-black italic mb-10 tracking-tighter">Главная</h1>
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="w-1 h-6 bg-brand rounded-full"></span> Артисты</h2>
            <div id="home-artists" class="grid grid-cols-3 md:grid-cols-6 gap-6 mb-12"></div>
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="w-1 h-6 bg-brand rounded-full"></span> Чарт</h2>
            <div id="home-tracks" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </section>

        <section id="page-artist" class="page hidden">
            <div class="relative h-[55vh] w-full">
                <img id="artist-view-img" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                <button onclick="navTo('home')" class="absolute top-8 left-6 bg-black/50 p-3 rounded-full backdrop-blur-md"><i data-lucide="arrow-left"></i></button>
                <div class="absolute bottom-10 left-6">
                    <h1 id="artist-view-name" class="text-6xl md:text-9xl font-black tracking-tighter italic drop-shadow-lg text-white"></h1>
                </div>
            </div>
            <div class="p-6">
                <button onclick="playArtistAll()" class="w-full bg-brand text-black font-black py-4 rounded-2xl mb-10 active:scale-95 transition-transform">СЛУШАТЬ ВСЁ</button>
                <h2 class="text-2xl font-bold mb-6 italic">Треки</h2>
                <div id="artist-view-tracks" class="space-y-2 mb-12"></div>
                <h2 class="text-2xl font-bold mb-6 italic">Альбомы</h2>
                <div id="artist-view-albums" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </section>
    </main>

    <!-- ПЛЕЕР -->
    <div id="player" class="fixed bottom-0 left-0 right-0 glass-nav p-4 pb-12 z-50">
        <div class="flex items-center gap-4 px-2">
            <img id="p-img" class="w-14 h-14 rounded-xl object-cover bg-accent">
            <div class="flex-1 truncate"><div id="p-title" class="font-bold truncate">---</div><div id="p-artist" class="text-xs text-gray-400 truncate">---</div></div>
            <div class="flex items-center gap-4">
                <button onclick="togglePlay()" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center shadow-lg"><i id="p-play-icon" data-lucide="play" class="fill-current"></i></button>
                <button onclick="nextTrack()"><i data-lucide="skip-forward"></i></button>
            </div>
        </div>
        <div class="mt-4 h-1 bg-white/10 rounded-full overflow-hidden mx-2"><div id="player-progress" class="h-full bg-brand w-0"></div></div>
    </div>

    <div id="main-loader" class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-brand border-t-transparent animate-spin rounded-full"></div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const USER = "allkks";
        const REPO = "mus";
        let db = { tracks: [], artists: {} };
        let currentPlaylist = [];
        let currentIndex = -1;
        let activeArtist = null;
        const audio = document.getElementById('audio-engine');

        window.onload = async () => { lucide.createIcons(); await loadApp(); };

        async function loadApp() {
            try {
                // ИСПОЛЬЗУЕМ API ДЛЯ ОБХОДА КЭША
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database.json?t=${Date.now()}`);
                const data = await res.json();
                // Декодируем base64, который отдает GitHub API
                const decoded = decodeURIComponent(escape(atob(data.content)));
                db = JSON.parse(decoded);
                
                renderHome();
                document.getElementById('main-loader').style.display = 'none';
            } catch (e) { 
                console.error("Fetch error:", e);
                // Если API упало, пробуем RAW как запасной вариант
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                renderHome();
                document.getElementById('main-loader').style.display = 'none';
            }
        }

        function renderHome() {
            document.getElementById('home-artists').innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtist('${a.name.replace(/'/g, "")}')" class="text-center cursor-pointer group">
                    <img src="${a.img}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=333&color=fff'" class="aspect-square rounded-full object-cover mb-2 transition-transform group-hover:scale-105 border-2 border-transparent group-hover:border-brand shadow-lg">
                    <p class="text-[10px] font-bold uppercase truncate">${a.name}</p>
                </div>`).join('');
            document.getElementById('home-tracks').innerHTML = db.tracks.slice(0, 15).map(t => createTrackItem(t, db.tracks)).join('');
            lucide.createIcons();
        }

        function createTrackItem(t, playlist) {
            return `<div onclick='playTrack(${t.id}, ${JSON.stringify(playlist).replace(/'/g,"")})' class="flex items-center gap-4 p-3 bg-accent/30 rounded-2xl hover:bg-accent/60 cursor-pointer group transition-all">
                <img src="${t.img}" class="w-12 h-12 rounded-lg object-cover">
                <div class="flex-1 truncate"><div class="font-bold text-sm truncate group-hover:text-brand transition-colors">${t.title}</div><div class="text-[10px] text-gray-500 font-bold uppercase">${t.artist}</div></div>
                <i data-lucide="play" class="w-4 h-4 text-brand fill-current opacity-0 group-hover:opacity-100"></i>
            </div>`;
        }

        function openArtist(name) {
            const artist = db.artists[name];
            if (!artist) return;
            activeArtist = artist;
            document.getElementById('artist-view-name').innerText = artist.name;
            document.getElementById('artist-view-img').src = artist.img;
            document.getElementById('artist-view-tracks').innerHTML = artist.tracks.map(t => createTrackItem(t, artist.tracks)).join('');
            document.getElementById('artist-view-albums').innerHTML = (artist.albums || []).map(alb => `
                <div onclick="playAlbum('${artist.name.replace(/'/g,"")}', '${alb.title.replace(/'/g,"")}')" class="bg-accent/30 p-4 rounded-3xl text-center hover:bg-accent/60 transition-colors cursor-pointer">
                    <img src="${alb.cover}" onerror="this.src='https://ui-avatars.com/api/?name=A&background=333&color=fff'" class="aspect-square rounded-2xl object-cover mb-2 shadow-md">
                    <div class="text-xs font-bold truncate">${alb.title}</div>
                </div>`).join('');
            navTo('artist'); lucide.createIcons();
        }

        function playTrack(id, playlist) {
            currentPlaylist = playlist;
            currentIndex = currentPlaylist.findIndex(t => t.id === id);
            const t = currentPlaylist[currentIndex];
            if(!t) return;
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.img;
            audio.src = t.url; audio.play(); updateUI(true);
        }

        function playAlbum(artistName, albumTitle) {
            const artist = db.artists[artistName];
            const albumTracks = artist.tracks.filter(t => t.album === albumTitle);
            if(albumTracks.length > 0) playTrack(albumTracks[0].id, albumTracks);
        }

        function playArtistAll() { if (activeArtist && activeArtist.tracks.length > 0) playTrack(activeArtist.tracks[0].id, activeArtist.tracks); }
        function togglePlay() { if (audio.paused) { audio.play(); updateUI(true); } else { audio.pause(); updateUI(false); } }
        function updateUI(p) { document.getElementById('p-play-icon').setAttribute('data-lucide', p ? 'pause' : 'play'); lucide.createIcons(); }
        function nextTrack() { if (currentIndex < currentPlaylist.length - 1) playTrack(currentPlaylist[currentIndex+1].id, currentPlaylist); }
        function navTo(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden')); document.getElementById('page-'+p).classList.remove('hidden'); document.getElementById('scroll-container').scrollTo(0,0); }
        audio.ontimeupdate = () => { document.getElementById('player-progress').style.width = (audio.currentTime/audio.duration)*100+"%"; };
        audio.onended = nextTrack;
    </script>
</body>
</html>
