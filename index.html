<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored Music 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #080414; color: white; -webkit-user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Прыгающий эквалайзер */
        @keyframes music-bar { 0%, 100% { height: 4px; } 50% { height: 14px; } }
        .animate-bar-1 { animation: music-bar 0.8s infinite ease-in-out; }
        .animate-bar-2 { animation: music-bar 0.6s infinite ease-in-out; }
        .animate-bar-3 { animation: music-bar 0.7s infinite ease-in-out; }

        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(8,4,20,0.98); z-index: 200; padding: 20px; backdrop-blur: 20px; }
        .admin-modal.active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-44">

    <!-- Фоновое свечение (Тот самый стиль) -->
    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-900/20 blur-[120px] pointer-events-none animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080414]/60 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 p-[1px]">
                <div class="w-full h-full rounded-full bg-[#080414] flex items-center justify-center overflow-hidden">
                    <i class="fa fa-user text-purple-400"></i>
                </div>
            </div>
            <span class="font-bold text-lg tracking-tight">Uncensored Music <span class="text-orange-500">🔥</span></span>
        </div>
        <button id="admin-plus-btn" class="hidden w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg">
            <i class="fa fa-plus"></i>
        </button>
    </header>

    <main class="px-5 space-y-8 mt-4">
        <!-- Search -->
        <div class="relative group">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="search-input" placeholder="Поиск треков и исполнителей..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-purple-500/20 transition-all text-sm">
        </div>

        <!-- Categories -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-1">
            <button onclick="filterCategory('pop')" class="flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap"><i class="fa fa-fire text-orange-500"></i> Популярное</button>
            <button onclick="filterCategory('rap')" class="flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap">🎤 Рэп</button>
            <button onclick="filterCategory('punk')" class="flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap">🎸 Панк</button>
        </div>

        <!-- Recommendations -->
        <section>
            <h2 class="text-lg font-black mb-4 flex items-center justify-between tracking-widest">РЕКОМЕНДАЦИИ</h2>
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                <div class="min-w-[180px] aspect-[1/1.2] rounded-3xl bg-gradient-to-br from-purple-600 to-indigo-600 p-6 flex flex-col justify-end relative overflow-hidden shadow-xl">
                    <i class="fa fa-music absolute top-4 right-4 text-6xl opacity-10"></i>
                    <h3 class="font-black text-2xl leading-tight">RAP HITS</h3>
                </div>
                <div class="min-w-[180px] aspect-[1/1.2] rounded-3xl bg-gradient-to-br from-pink-600 to-purple-600 p-6 flex flex-col justify-end relative overflow-hidden shadow-xl">
                    <i class="fa fa-bolt absolute top-4 right-4 text-6xl opacity-10"></i>
                    <h3 class="font-black text-2xl leading-tight">TOP CHART</h3>
                </div>
            </div>
        </section>

        <!-- Track List -->
        <section>
            <h2 class="text-lg font-black mb-4 uppercase tracking-widest text-gray-400">Топ треков</h2>
            <div class="space-y-3" id="track-container">
                <div class="text-center py-10 text-gray-600">Загрузка музыки...</div>
            </div>
        </section>
    </main>

    <!-- Floating Bottom Player (Тот самый UI) -->
    <div class="fixed bottom-6 left-4 right-4 z-[100] flex flex-col gap-4">
        <div class="bg-[#120c24]/80 backdrop-blur-3xl border border-white/10 rounded-[32px] p-2 shadow-2xl">
            
            <div class="flex items-center justify-between p-3 bg-white/5 rounded-[24px] mb-2">
                <div class="flex items-center gap-3 max-w-[60%]">
                    <img id="p-img" src="https://via.placeholder.com/100" class="w-12 h-12 rounded-xl object-cover ring-1 ring-white/10">
                    <div class="overflow-hidden text-left">
                        <h4 id="p-title" class="font-black text-sm truncate">Выберите трек</h4>
                        <p id="p-artist" class="text-[10px] font-bold text-purple-400 uppercase">Artist</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="p-play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shadow-lg active:scale-90 transition-all">
                        <i class="fa fa-play ml-1"></i>
                    </button>
                </div>
            </div>

            <div class="px-4 mb-2">
                <div class="w-full h-1 bg-white/10 rounded-full relative overflow-hidden">
                    <div id="p-bar" class="absolute top-0 left-0 h-full bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.6)]" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="flex justify-around items-center py-2">
                <button class="flex flex-col items-center gap-1 text-purple-500"><i class="fa fa-home text-xl"></i><span class="text-[9px] font-black uppercase">Дом</span></button>
                <div class="relative -top-3">
                    <div class="p-3 rounded-2xl bg-purple-600 text-white shadow-lg"><i class="fa fa-heart text-xl"></i></div>
                </div>
                <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa fa-cog text-xl"></i><span class="text-[9px] font-black uppercase">Опции</span></button>
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="admin-modal no-scrollbar">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-purple-500 uppercase">Добавить трек</h2>
            <button onclick="toggleAdminModal()" class="text-3xl">&times;</button>
        </div>
        <div class="space-y-4">
            <input id="in-title" type="text" placeholder="Название трека" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-artist" type="text" placeholder="Исполнитель" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-genre" type="text" placeholder="Жанр (pop, rap, punk)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-url" type="text" placeholder="MP3 URL" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-cover" type="text" placeholder="Cover URL" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <button onclick="saveToDB()" id="save-btn" class="w-full bg-purple-600 py-5 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ТВОИ НАСТРОЙКИ ---
        const SB_URL = "https://zzztlkyoyjvkokcvqqfd.supabase.co";
        const SB_KEY = "sb_publishable_YOPX7PVk9K1d3gIH3kkQcw_HJlsk-OD";
        const ADMIN_ID = 7919252297; // <-- ЗАМЕНИ НА СВОЙ ID
        // ----------------------

        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const audio = document.getElementById('main-audio');
        let dbMusic = [];
        let currentIdx = -1;

        if (tg.initDataUnsafe?.user?.id === ADMIN_ID) {
            document.getElementById('admin-plus-btn').classList.remove('hidden');
        }

        async function loadData() {
            const { data } = await supabase.from('music').select('*');
            if (data) {
                dbMusic = data;
                renderTracks();
            }
        }

        function renderTracks(filter = "") {
            const container = document.getElementById('track-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = dbMusic.filter(t => 
                (t.title.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search)) &&
                (filter === "" || t.genre === filter)
            );

            container.innerHTML = filtered.map((t, i) => {
                const active = currentIdx !== -1 && dbMusic[currentIdx].id === t.id && !audio.paused;
                return `
                    <div onclick="playTrackById(${t.id})" class="flex items-center justify-between p-3 rounded-2xl transition-all border ${active ? 'bg-purple-600/10 border-purple-500/30 shadow-lg shadow-purple-900/10' : 'bg-white/[0.02] border-transparent hover:bg-white/[0.06]'}">
                        <div class="flex items-center gap-4">
                            <div class="relative w-14 h-14 rounded-2xl overflow-hidden shadow-md">
                                <img src="${t.cover}" class="w-full h-full object-cover">
                                ${active ? `<div class="absolute inset-0 bg-black/40 flex items-center justify-center gap-1">
                                    <div class="w-1 bg-white animate-bar-1"></div>
                                    <div class="w-1 bg-white animate-bar-2"></div>
                                    <div class="w-1 bg-white animate-bar-3"></div>
                                </div>` : ''}
                            </div>
                            <div class="text-left">
                                <h4 class="font-bold text-sm ${active ? 'text-purple-400' : ''}">${t.title}</h4>
                                <p class="text-xs text-gray-500 font-medium">${t.artist}</p>
                            </div>
                        </div>
                        <button class="w-10 h-10 rounded-full flex items-center justify-center bg-white/5 text-gray-400">
                            <i class="fa ${active ? 'fa-pause' : 'fa-play'}"></i>
                        </button>
                    </div>
                `;
            }).join('') || '<div class="text-center py-10 text-gray-600">Ничего не найдено</div>';
        }

        function playTrackById(id) {
            const index = dbMusic.findIndex(t => t.id === id);
            if (currentIdx === index && !audio.paused) {
                audio.pause();
            } else {
                currentIdx = index;
                audio.src = dbMusic[currentIdx].url;
                audio.play();
                updatePlayerUI();
            }
            renderTracks();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updatePlayerUI() {
            const t = dbMusic[currentIdx];
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.cover;
            document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-pause"></i>';
        }

        async function saveToDB() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "ПУБЛИКАЦИЯ...";
            const payload = {
                title: document.getElementById('in-title').value,
                artist: document.getElementById('in-artist').value,
                genre: document.getElementById('in-genre').value,
                url: document.getElementById('in-url').value,
                cover: document.getElementById('in-cover').value,
                avatar: "" 
            };
            const { error } = await supabase.from('music').insert([payload]);
            if (!error) {
                toggleAdminModal();
                loadData();
            }
            btn.innerText = "ОПУБЛИКОВАТЬ";
        }

        function toggleAdminModal() { document.getElementById('admin-modal').classList.toggle('active'); }
        function filterCategory(cat) { renderTracks(cat); }

        document.getElementById('p-play-btn').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-play ml-1"></i>'; }
            renderTracks();
        };

        document.getElementById('search-input').oninput = () => renderTracks();
        document.getElementById('admin-plus-btn').onclick = toggleAdminModal;
        audio.ontimeupdate = () => { document.getElementById('p-bar').style.width = (audio.currentTime / audio.duration) * 100 + '%'; };

        loadData();
    </script>
</body>
</html>
