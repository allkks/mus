<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored Music 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #080414; 
            color: white; 
            -webkit-user-select: none; 
            overflow-x: hidden; 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes music-bar { 
            0%, 100% { height: 4px; } 
            50% { height: 16px; } 
        }
        .animate-bar-1 { animation: music-bar 0.8s infinite ease-in-out; }
        .animate-bar-2 { animation: music-bar 0.6s infinite ease-in-out; }
        .animate-bar-3 { animation: music-bar 0.7s infinite ease-in-out; }

        .filter-btn.active { 
            background: rgba(168, 85, 247, 0.2); 
            border-color: rgba(168, 85, 247, 0.5); 
            color: #a855f7; 
        }
        
        .track-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        
        .track-card.playing { 
            background: rgba(168, 85, 247, 0.1); 
            border-color: rgba(168, 85, 247, 0.3); 
        }

        .player-blur {
            background: rgba(18, 12, 36, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen pb-44">

    <!-- Фоновые эффекты -->
    <div class="fixed top-[-10%] left-[-10%] w-[70%] h-[50%] bg-purple-900/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[70%] h-[50%] bg-indigo-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Шапка -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080414]/80 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-600 to-blue-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                <i class="fa fa-fire text-white"></i>
            </div>
            <span class="font-black text-xl tracking-tighter italic uppercase">UNCENSORED</span>
        </div>
    </header>

    <main class="px-5 space-y-8 mt-6">
        <!-- Поиск -->
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="search-input" placeholder="Поиск трека или артиста..." 
                class="w-full bg-white/5 rounded-2xl py-4 pl-12 pr-4 text-sm outline-none border border-transparent focus:border-purple-500/30 transition-all">
        </div>

        <!-- Фильтры -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-1" id="category-filters">
            <button onclick="setFilter('')" id="cat-all" class="filter-btn active bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-[10px] font-black uppercase whitespace-nowrap tracking-widest">Все</button>
            <button onclick="setFilter('pop')" id="cat-pop" class="filter-btn bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-[10px] font-black uppercase whitespace-nowrap tracking-widest text-gray-400">Поп</button>
            <button onclick="setFilter('rap')" id="cat-rap" class="filter-btn bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-[10px] font-black uppercase whitespace-nowrap tracking-widest text-gray-400">Рэп</button>
            <button onclick="setFilter('punk')" id="cat-punk" class="filter-btn bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-[10px] font-black uppercase whitespace-nowrap tracking-widest text-gray-400">Панк</button>
        </div>

        <!-- Список треков -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500">Музыкальная база</h2>
                <span id="track-count" class="text-[10px] bg-purple-500/10 text-purple-400 px-3 py-1 rounded-full font-bold">0</span>
            </div>
            <div class="space-y-3" id="track-container">
                <!-- Загрузка -->
                <div class="py-20 text-center opacity-20"><i class="fa fa-spinner fa-spin text-3xl"></i></div>
            </div>
        </section>
    </main>

    <!-- Плеер -->
    <div id="player-bar" class="fixed bottom-6 left-4 right-4 z-[100] translate-y-40 transition-all duration-700 ease-out">
        <div class="player-blur rounded-[35px] p-3 shadow-2xl">
            <div class="flex items-center justify-between p-2 bg-white/5 rounded-[28px] mb-3">
                <div class="flex items-center gap-4 overflow-hidden">
                    <img id="p-img" src="" class="w-12 h-12 rounded-xl object-cover shadow-lg bg-gray-800 flex-shrink-0">
                    <div class="overflow-hidden">
                        <h4 id="p-title" class="font-black text-sm truncate pr-2 text-white uppercase tracking-tighter">Название</h4>
                        <p id="p-artist" class="text-[9px] text-purple-400 uppercase font-black tracking-[0.15em] truncate">Артист</p>
                    </div>
                </div>
                <button id="p-play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shadow-xl active:scale-90 transition-all flex-shrink-0">
                    <i class="fa fa-play ml-1"></i>
                </button>
            </div>

            <div class="px-5 mb-4">
                <div id="p-progress-container" class="w-full h-1.5 bg-white/10 rounded-full cursor-pointer relative overflow-hidden">
                    <div id="p-bar" class="absolute top-0 left-0 h-full bg-purple-500 rounded-full" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[9px] text-gray-500 mt-2 font-bold uppercase tracking-tighter">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#080414';

        const SB_URL = "https://zzztlkyoyjvkokcvqqfd.supabase.co";
        const SB_KEY = "sb_publishable_YOPX7PVk9K1d3gIH3kkQcw_HJlsk-OD";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const audio = document.getElementById('main-audio');
        let dbMusic = [];
        let currentFilter = '';
        let playingId = null;

        async function loadData() {
            const { data, error } = await supabase.from('music').select('*').order('created_at', { ascending: false });
            if (data) {
                dbMusic = data;
                render();
            }
        }

        function render() {
            const container = document.getElementById('track-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            const filtered = dbMusic.filter(t => 
                (t.title.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search)) &&
                (currentFilter === "" || t.genre === currentFilter)
            );

            document.getElementById('track-count').innerText = filtered.length;

            container.innerHTML = filtered.map(t => {
                const isPlaying = playingId === t.id;
                
                return `
                    <div class="track-card flex items-center justify-between p-3.5 rounded-3xl active:scale-[0.98] ${isPlaying ? 'playing' : ''}" onclick="playTrack(${t.id})">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <div class="relative w-14 h-14 rounded-2xl overflow-hidden flex-shrink-0 shadow-lg">
                                <img src="${t.cover}" class="w-full h-full object-cover">
                                ${isPlaying && !audio.paused ? `
                                    <div class="absolute inset-0 bg-black/60 flex items-center justify-center gap-1">
                                        <div class="w-1 bg-white animate-bar-1 rounded-full"></div>
                                        <div class="w-1 bg-white animate-bar-2 rounded-full"></div>
                                        <div class="w-1 bg-white animate-bar-3 rounded-full"></div>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="text-left overflow-hidden">
                                <h4 class="font-black text-[13px] truncate uppercase tracking-tight ${isPlaying ? 'text-purple-400' : 'text-white'}">${t.title}</h4>
                                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-0.5">${t.artist}</p>
                            </div>
                        </div>
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isPlaying ? 'bg-purple-500 text-white' : 'bg-white/5 text-gray-500'}">
                            <i class="fa ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play text-[10px]'}"></i>
                        </div>
                    </div>
                `;
            }).join('') || '<div class="py-20 text-center text-gray-600 text-[10px] font-bold uppercase tracking-widest">Ничего не найдено</div>';
        }

        function playTrack(id) {
            const track = dbMusic.find(t => t.id === id);
            if (!track) return;

            if (playingId === id) {
                if (audio.paused) audio.play();
                else audio.pause();
            } else {
                playingId = id;
                audio.src = track.url;
                audio.play();
                
                document.getElementById('p-img').src = track.cover;
                document.getElementById('p-title').innerText = track.title;
                document.getElementById('p-artist').innerText = track.artist;
                document.getElementById('player-bar').classList.remove('translate-y-40');
            }
            render();
            tg.HapticFeedback.impactOccurred('light');
        }

        function setFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active', 'text-white');
                b.classList.add('text-gray-400');
            });
            const activeBtn = cat === '' ? document.getElementById('cat-all') : document.getElementById(`cat-${cat}`);
            if (activeBtn) {
                activeBtn.classList.add('active', 'text-white');
                activeBtn.classList.remove('text-gray-400');
            }
            render();
            tg.HapticFeedback.selectionChanged();
        }

        document.getElementById('p-play-btn').onclick = () => {
            if (audio.paused) audio.play();
            else audio.pause();
            tg.HapticFeedback.impactOccurred('medium');
        };

        audio.onplay = () => {
            document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-pause"></i>';
            render();
        };
        audio.onpause = () => {
            document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-play ml-1"></i>';
            render();
        };

        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            document.getElementById('p-bar').style.width = perc + '%';
            
            const fmt = (t) => {
                if(isNaN(t)) return "0:00";
                const m = Math.floor(t / 60);
                const s = Math.floor(t % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };
            document.getElementById('current-time').innerText = fmt(audio.currentTime);
            document.getElementById('total-time').innerText = fmt(audio.duration);
        };

        document.getElementById('p-progress-container').onclick = (e) => {
            const x = e.clientX - e.currentTarget.getBoundingClientRect().left;
            audio.currentTime = (x / e.currentTarget.offsetWidth) * audio.duration;
        };

        document.getElementById('search-input').oninput = () => render();

        loadData();
    </script>
</body>
</html>
