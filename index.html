<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .track-item { background: #1a1525; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #8b5cf6; border: none; padding: 10px 20px; border-radius: 20px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Топ треков</h1>
    <div id="tracks">Загрузка...</div>

    <script>
        const BASE_URL = "https://mean-glasses-make.loca.lt"; 
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id || 0;

        fetch(`${BASE_URL}/check_access/${userId}`)
            .then(res => res.json())
            .then(data => {
                if (!data.access) {
                    document.body.innerHTML = "<h1>🚫 Доступ закрыт</h1><p>Подпишись на канал!</p>";
                } else {
                    loadTracks();
                }
            });

        function loadTracks() {
            fetch(`${BASE_URL}/get_tracks`)
                .then(res => res.json())
                .then(tracks => {
                    const container = document.getElementById('tracks');
                    container.innerHTML = '';
                    tracks.forEach(track => {
                        container.innerHTML += `<div class="track-item"><div><b>${track[1]}</b> - ${track[2]}</div><button>▶</button></div>`;
                    });
                });
        }
    </script>
</body>
</html>
