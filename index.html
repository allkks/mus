<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Uncensored Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0a1a; color: white; font-family: sans-serif; padding: 20px; }
        .track-item { background: #1a1525; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .play-btn { background: #8b5cf6; border: none; padding: 12px; border-radius: 50%; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Uncensored Music 🔥</h1>
    <div id="tracks">Загрузка треков...</div>

    <script>
        const BASE_URL = "ТВОЯ_ССЫЛКА_ИЗ_TUNNEL"; // ВСТАВЬ СЮДА ССЫЛКУ ИЗ ЛОКАЛТАННЕЛА
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id || 0;

        fetch(`${BASE_URL}/check_access/${userId}`)
            .then(res => res.json())
            .then(data => {
                if (!data.access) {
                    document.body.innerHTML = "<h1>🚫 Доступ закрыт</h1>";
                } else {
                    fetch(`${BASE_URL}/get_library`)
                        .then(res => res.json())
                        .then(tracks => {
                            const container = document.getElementById('tracks');
                            container.innerHTML = '';
                            tracks.forEach(t => {
                                container.innerHTML += `
                                    <div class="track-item">
                                        <div><b>${t.artist}</b> - ${t.title}</div>
                                        <button class="play-btn" onclick="play(${t.id})">▶</button>
                                    </div>`;
                            });
                        });
                }
            });

        function play(id) {
            fetch(`${BASE_URL}/play/${id}`, { method: 'POST' });
            alert("Начинаю воспроизведение трека #" + id);
        }
    </script>
</body>
</html>
