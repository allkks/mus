<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --accent: #9333ea; --bg: #0b0714; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; -webkit-user-select: none; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chip { padding: 8px 20px; border-radius: 14px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.05); white-space: nowrap; transition: 0.3s; }
        .chip.active { background: var(--accent); box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3); }
        
        .track-card { background: rgba(255,255,255,0.03); border-radius: 20px; transition: 0.2s; border: 1px solid transparent; }
        .track-card.playing { background: rgba(147, 51, 234, 0.1); border-color: rgba(147, 51, 234, 0.3); }
        
        #full-player { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 100; transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #full-player.active { transform: translateY(0); }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; box-shadow: 0 0 10px var(--accent); }
        
        .admin-input { w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-3 outline-none focus:border-purple-500 text-sm; }
    </style>
</head>
<body class="pb-40">

    <!-- Header -->
    <div class="px-6 pt-10 pb-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-purple-500 p-0.5 shadow-lg">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-full h-full rounded-full bg-purple-900">
            </div>
            <h1 class="text-xl font-black italic tracking-tighter">UNCENSORED</h1>
        </div>
        <button onclick="toggleAdmin()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-gray-400">
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </button>
    </div>

    <!-- MAIN UI -->
    <div id="user-view">
        <!-- Genres -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar px-6 mb-8" id="genre-container">
            <button onclick="filterGenre('All')" class="chip active">🔥 Все</button>
            <button onclick="filterGenre('Rock')" class="chip">🎸 Рок</button>
            <button onclick="filterGenre('Rap')" class="chip">🎤 Рэп</button>
            <button onclick="filterGenre('Pop')" class="chip">✨ Поп</button>
        </div>

        <!-- Artists slider -->
        <div class="px-6 mb-8">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">Топ Исполнителей</h3>
            <div id="artist-slider" class="flex gap-6 overflow-x-auto no-scrollbar">
                <!-- Сюда попадут артисты -->
            </div>
        </div>

        <!-- Tracks list -->
        <div class="px-6">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">Последние релизы</h3>
            <div id="tracks-list" class="space-y-3">
                <!-- Сюда попадут треки -->
            </div>
        </div>
    </div>

    <!-- ADMIN VIEW (Hidden by default) -->
    <div id="admin-view" class="hidden px-6 pb-20">
        <h2 class="text-2xl font-black mb-6 text-purple-500">Админ-центр</h2>
        
        <div class="glass p-5 rounded-[30px] mb-6">
            <p class="text-xs font-bold text-gray-400 mb-4 uppercase">Добавить данные</p>
            <input id="adm-name" type="text" placeholder="Имя артиста или название" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-3 outline-none focus:border-purple-500 text-sm">
            <input id="adm-img" type="text" placeholder="URL картинки (для артиста)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-3 outline-none text-sm">
            <input id="adm-url" type="text" placeholder="URL MP3 (для трека)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-3 outline-none text-sm">
            
            <div class="flex gap-2 mb-4">
                <button onclick="saveArtist()" class="flex-1 bg-purple-600 p-3 rounded-xl font-bold text-xs">Как Артиста</button>
                <button onclick="saveTrack()" class="flex-1 bg-indigo-600 p-3 rounded-xl font-bold text-xs">Как Трек</button>
            </div>
        </div>

        <p class="text-xs text-gray-500 mb-2">Нажми, чтобы удалить:</p>
        <div id="admin-list" class="space-y-2 mb-6"></div>

        <button onclick="exportData()" class="w-full py-4 bg-white text-black rounded-2xl font-black shadow-xl">ПОЛУЧИТЬ КОД ДЛЯ GITHUB</button>
        <textarea id="output-json" class="w-full h-40 mt-4 bg-black/50 border border-white/10 rounded-xl p-3 text-[10px] font-mono hidden"></textarea>
    </div>

    <!-- Mini Player -->
    <div id="mini-player" class="fixed bottom-6 left-4 right-4 z-[60] translate-y-[200%] transition-transform duration-500">
        <div class="glass rounded-3xl p-3 flex items-center justify-between" onclick="openFullPlayer()">
            <div class="flex items-center gap-3 overflow-hidden">
                <img id="m-img" src="" class="w-12 h-12 rounded-2xl object-cover bg-purple-900">
                <div class="overflow-hidden text-sm">
                    <h4 id="m-title" class="font-bold truncate">...</h4>
                    <p id="m-artist" class="text-[10px] text-gray-500 truncate">...</p>
                </div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="m-play-btn" class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center shadow-lg"><i class="fa-solid fa-play"></i></button>
        </div>
    </div>

    <!-- Full Player -->
    <div id="full-player" class="p-10 flex flex-col justify-between">
        <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
        
        <div class="flex flex-col items-center">
            <img id="f-img" src="" class="w-full aspect-square rounded-[50px] shadow-2xl object-cover bg-purple-900 mb-10">
            <div class="w-full">
                <h2 id="f-title" class="text-3xl font-black truncate">...</h2>
                <p id="f-artist" class="text-xl text-purple-500 mt-2">...</p>
            </div>
        </div>

        <div class="w-full">
            <div class="h-1 bg-white/10 rounded-full mb-8" onclick="seek(event)"><div id="f-progress" class="progress-fill"></div></div>
            <div class="flex justify-around items-center">
                <button onclick="prevTrack()" class="text-3xl"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" id="f-play-btn" class="w-24 h-24 bg-white text-black rounded-full text-4xl flex items-center justify-center shadow-2xl"><i class="fa-solid fa-play"></i></button>
                <button onclick="nextTrack()" class="text-3xl"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // --- CONFIG ---
        const GITHUB_USER = 'allkks';
        const REPO_NAME = 'mus';
        const JSON_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/database.json`;

        let database = { artists: [], tracks: [] };
        let filteredTracks = [];
        let currentIdx = -1;
        let isAdmin = false;
        const audio = document.getElementById('audio');

        async function init() {
            try {
                const res = await fetch(JSON_URL + '?t=' + Date.now());
                database = await res.json();
                filteredTracks = database.tracks;
                render();
            } catch(e) {
                console.error("Database not found");
            }
        }

        function render() {
            // Артисты
            document.getElementById('artist-slider').innerHTML = database.artists.map(a => `
                <div onclick="filterByArtist('${a.name}')" class="flex flex-col items-center gap-2 flex-shrink-0 active:scale-90 transition-transform">
                    <img src="${a.img}" class="w-20 h-20 rounded-full object-cover border-2 border-purple-500/20">
                    <span class="text-[10px] font-bold text-gray-500 uppercase text-center w-20 truncate">${a.name}</span>
                </div>
            `).join('');

            // Треки
            const tracksList = document.getElementById('tracks-list');
            tracksList.innerHTML = filteredTracks.map((t, idx) => {
                const isPlaying = currentIdx !== -1 && filteredTracks[currentIdx].url === t.url;
                const art = database.artists.find(a => a.name === t.artist) || { img: '' };
                return `
                    <div onclick="playTrack(${idx})" class="track-card p-4 flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <img src="${art.img}" class="w-12 h-12 rounded-xl object-cover">
                            <div class="overflow-hidden">
                                <h4 class="font-bold text-sm truncate">${t.title}</h4>
                                <p class="text-[10px] text-gray-500 uppercase font-bold">${t.artist}</p>
                            </div>
                        </div>
                        <i class="fa-solid ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play'} text-purple-500 text-xs"></i>
                    </div>
                `;
            }).join('');

            // Админ-список
            document.getElementById('admin-list').innerHTML = `
                <p class="text-[10px] font-bold text-purple-500">АРТИСТЫ:</p>
                ${database.artists.map((a, i) => `<div class="p-2 glass rounded-lg text-xs flex justify-between" onclick="deleteItem('artists', ${i})">${a.name} <span>×</span></div>`).join('')}
                <p class="text-[10px] font-bold text-indigo-500 mt-4">ТРЕКИ:</p>
                ${database.tracks.map((t, i) => `<div class="p-2 glass rounded-lg text-xs flex justify-between" onclick="deleteItem('tracks', ${i})">${t.title} <span>×</span></div>`).join('')}
            `;
        }

        function filterGenre(g) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            filteredTracks = g === 'All' ? database.tracks : database.tracks.filter(t => t.genre === g);
            render();
        }

        function filterByArtist(name) {
            filteredTracks = database.tracks.filter(t => t.artist === name);
            render();
        }

        function playTrack(idx) {
            if(currentIdx === idx) return togglePlay();
            currentIdx = idx;
            const t = filteredTracks[idx];
            audio.src = t.url;
            audio.play();
            updateUI(t);
            document.getElementById('mini-player').classList.remove('translate-y-[200%]');
            render();
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        function togglePlay() {
            audio.paused ? audio.play() : audio.pause();
            updateUI(filteredTracks[currentIdx]);
            render();
        }

        function updateUI(t) {
            const art = database.artists.find(a => a.name === t.artist) || { img: '' };
            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            document.getElementById('m-title').innerText = t.title;
            document.getElementById('m-artist').innerText = t.artist;
            document.getElementById('m-img').src = art.img;
            document.getElementById('m-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('f-img').src = art.img;
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
        }

        // ADMIN LOGIC
        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('user-view').classList.toggle('hidden', isAdmin);
            document.getElementById('admin-view').classList.toggle('hidden', !isAdmin);
        }

        function saveArtist() {
            const name = document.getElementById('adm-name').value;
            const img = document.getElementById('adm-img').value;
            if(name && img) {
                database.artists.push({ name, img });
                alert("Артист добавлен локально!");
                render();
            }
        }

        function saveTrack() {
            const title = document.getElementById('adm-name').value;
            const url = document.getElementById('adm-url').value;
            const artist = prompt("Имя артиста (должно совпадать точно):");
            const genre = prompt("Жанр (Rock, Rap, Pop):");
            if(title && url && artist) {
                database.tracks.push({ title, artist, genre, url });
                alert("Трек добавлен локально!");
                render();
            }
        }

        function deleteItem(type, idx) {
            if(confirm("Удалить?")) {
                database[type].splice(idx, 1);
                render();
            }
        }

        function exportData() {
            const area = document.getElementById('output-json');
            area.value = JSON.stringify(database, null, 2);
            area.classList.remove('hidden');
            area.select();
            document.execCommand('copy');
            alert("КОД СКОПИРОВАН! Теперь зайди на GitHub в файл database.json и просто замени всё содержимое этим кодом.");
        }

        // PLAYER CONTROLS
        function nextTrack() { if(currentIdx < filteredTracks.length - 1) playTrack(currentIdx + 1); }
        function prevTrack() { if(currentIdx > 0) playTrack(currentIdx - 1); }
        function openFullPlayer() { document.getElementById('full-player').classList.add('active'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('active'); }
        function seek(e) { audio.currentTime = (e.clientX - 40) / (window.innerWidth - 80) * audio.duration; }
        audio.ontimeupdate = () => { document.getElementById('f-progress').style.width = (audio.currentTime / audio.duration * 100) + '%'; };
        audio.onended = () => nextTrack();

        init();
    </script>
</body>
</html>
