<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored Music 🔥</title>
    <!-- Подключаем библиотеки -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #080414; color: white; -webkit-user-select: none; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes music-bar { 0%, 100% { height: 4px; } 50% { height: 14px; } }
        .animate-bar-1 { animation: music-bar 0.8s infinite ease-in-out; }
        .animate-bar-2 { animation: music-bar 0.6s infinite ease-in-out; }
        .animate-bar-3 { animation: music-bar 0.7s infinite ease-in-out; }
        
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; padding: 20px; backdrop-blur: 10px; }
        .admin-modal.active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="pb-44">

    <!-- Фоновое свечение -->
    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080414]/60 p-5 border-b border-white/5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="back-btn" class="hidden p-2 bg-white/5 rounded-xl mr-2"><i class="fa fa-chevron-left"></i></button>
            <h1 id="header-title" class="font-bold text-lg uppercase tracking-widest">Главная</h1>
        </div>
        <button id="admin-plus-btn" class="hidden w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center shadow-lg shadow-purple-500/40">
            <i class="fa fa-plus"></i>
        </button>
    </header>

    <!-- VIEWS -->
    <main id="view-genres" class="view active px-5 py-6">
        <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Жанры</h2>
        <div id="genres-list" class="grid grid-cols-2 gap-3"></div>
    </main>

    <main id="view-artists" class="view px-5 py-6">
        <div id="artists-list" class="space-y-4"></div>
    </main>

    <main id="view-tracks" class="view px-5 py-6">
        <div class="flex flex-col items-center text-center space-y-4 mb-8">
            <img id="cur-art-avatar" src="" class="w-32 h-32 rounded-full border-4 border-purple-500 shadow-2xl object-cover">
            <h2 id="cur-art-name" class="text-3xl font-black uppercase italic"></h2>
        </div>
        <div id="tracks-list" class="space-y-3"></div>
    </main>

    <!-- Floating Player -->
    <div class="fixed bottom-6 left-4 right-4 z-[100] bg-[#120c24]/90 backdrop-blur-3xl border border-white/10 rounded-[32px] p-4 shadow-2xl">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3 overflow-hidden">
                <img id="p-img" src="https://via.placeholder.com/100" class="w-12 h-12 rounded-xl object-cover ring-1 ring-white/10">
                <div class="truncate">
                    <h4 id="p-title" class="font-bold text-sm truncate">Выберите трек</h4>
                    <p id="p-artist" class="text-[10px] text-purple-400 font-bold uppercase">Artist</p>
                </div>
            </div>
            <button id="p-play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <i class="fa fa-play ml-1 text-xl"></i>
            </button>
        </div>
        <div class="mt-3 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="p-bar" class="h-full bg-purple-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <!-- АДМИНКА -->
    <div id="admin-modal" class="admin-modal no-scrollbar">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black uppercase tracking-tighter text-purple-500">Добавить музыку</h2>
            <button onclick="toggleAdminModal()" class="text-3xl">&times;</button>
        </div>
        <div class="space-y-4">
            <input id="in-title" type="text" placeholder="Название трека" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-artist" type="text" placeholder="Исполнитель" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-avatar" type="text" placeholder="Ссылка на аватар артиста" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-genre" type="text" placeholder="Жанр (например: punk-rock)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-url" type="text" placeholder="Ссылка на MP3" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input id="in-cover" type="text" placeholder="Ссылка на обложку трека" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <button onclick="saveToDB()" id="save-btn" class="w-full bg-purple-600 py-5 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all">ОПУБЛИКОВАТЬ</button>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- НАСТРОЙКИ ---
        const SB_URL = "https://zzztlkyoyjvkokcvqqfd.supabase.co";
        const SB_KEY = "sb_publishable_YOPX7PVk9K1d3gIH3kkQcw_HJlsk-OD";
        const ADMIN_ID = 7919252297; // ТВОЙ ID ЦИФРАМИ
        // -----------------

        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const audio = document.getElementById('main-audio');
        let dbMusic = [];
        let viewHistory = ['genres'];

        // Проверка на админа
        if (tg.initDataUnsafe?.user?.id === ADMIN_ID) {
            document.getElementById('admin-plus-btn').classList.remove('hidden');
        }

        async function loadData() {
            const { data, error } = await supabase.from('music').select('*');
            if (data) {
                dbMusic = data;
                renderGenres();
            }
        }

        function renderGenres() {
            showView('genres', 'Главная');
            const genres = [...new Set(dbMusic.map(t => t.genre))];
            const list = document.getElementById('genres-list');
            list.innerHTML = genres.map(g => `
                <div onclick="renderArtists('${g}')" class="h-28 rounded-3xl bg-gradient-to-br from-purple-600 to-indigo-800 p-5 flex items-end shadow-xl active:scale-95 transition-all border border-white/10">
                    <span class="font-black text-xs uppercase italic tracking-widest">${g}</span>
                </div>
            `).join('');
        }

        function renderArtists(genre) {
            showView('artists', genre);
            const artists = [...new Map(dbMusic.filter(t => t.genre === genre).map(item => [item.artist, item])).values()];
            const list = document.getElementById('artists-list');
            list.innerHTML = artists.map(a => `
                <div onclick="renderTracks('${a.artist}')" class="flex items-center gap-4 p-4 bg-white/5 rounded-[24px] border border-white/5 active:bg-white/10 transition-all">
                    <img src="${a.avatar}" class="w-16 h-16 rounded-full object-cover shadow-lg border-2 border-purple-500/20">
                    <div class="flex-1">
                        <h4 class="font-bold text-lg italic">${a.artist}</h4>
                        <p class="text-[10px] text-gray-500 font-bold">ИСПОЛНИТЕЛЬ</p>
                    </div>
                    <i class="fa fa-chevron-right text-gray-800"></i>
                </div>
            `).join('');
        }

        function renderTracks(artistName) {
            showView('tracks', artistName);
            const artistTracks = dbMusic.filter(t => t.artist === artistName);
            document.getElementById('cur-art-avatar').src = artistTracks[0].avatar;
            document.getElementById('cur-art-name').innerText = artistName;

            const list = document.getElementById('tracks-list');
            list.innerHTML = artistTracks.map(t => `
                <div onclick="playTrack('${t.url}', '${t.title}', '${t.artist}', '${t.cover}')" class="flex items-center justify-between p-3 bg-white/[0.03] border border-white/5 rounded-2xl active:bg-purple-600/10 transition-all">
                    <div class="flex items-center gap-4">
                        <img src="${t.cover}" class="w-14 h-14 rounded-xl object-cover">
                        <div>
                            <h4 class="font-bold text-sm">${t.title}</h4>
                            <p class="text-[10px] text-gray-500 font-bold uppercase">${t.artist}</p>
                        </div>
                    </div>
                    <i class="fa fa-play text-gray-700"></i>
                </div>
            `).join('');
        }

        function playTrack(url, title, artist, cover) {
            audio.src = url;
            audio.play();
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = cover;
            document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-pause text-xl"></i>';
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function saveToDB() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "ПУБЛИКАЦИЯ...";
            
            const payload = {
                title: document.getElementById('in-title').value,
                artist: document.getElementById('in-artist').value,
                avatar: document.getElementById('in-avatar').value,
                genre: document.getElementById('in-genre').value,
                url: document.getElementById('in-url').value,
                cover: document.getElementById('in-cover').value
            };

            const { error } = await supabase.from('music').insert([payload]);
            if (!error) {
                alert("Успешно добавлено!");
                toggleAdminModal();
                loadData();
            } else {
                alert("Ошибка: " + error.message);
                btn.innerText = "ОПУБЛИКОВАТЬ";
            }
        }

        function showView(viewId, title) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('header-title').innerText = title;
            
            const backBtn = document.getElementById('back-btn');
            if(viewId === 'genres') {
                backBtn.classList.add('hidden');
                viewHistory = ['genres'];
            } else {
                backBtn.classList.remove('hidden');
                if(viewHistory[viewHistory.length-1] !== viewId) viewHistory.push(viewId);
            }
        }

        document.getElementById('back-btn').onclick = () => {
            viewHistory.pop();
            const prev = viewHistory[viewHistory.length - 1];
            if(prev === 'genres') renderGenres();
            else if(prev === 'artists') {
                const curGenre = document.getElementById('header-title').innerText;
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById('view-artists').classList.add('active');
                viewHistory = ['genres', 'artists'];
            }
            tg.HapticFeedback.impactOccurred('light');
        };

        document.getElementById('p-play-btn').onclick = () => {
            if(audio.paused) {
                audio.play();
                document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-pause text-xl"></i>';
            } else {
                audio.pause();
                document.getElementById('p-play-btn').innerHTML = '<i class="fa fa-play text-xl ml-1"></i>';
            }
        };

        audio.ontimeupdate = () => {
            const prog = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('p-bar').style.width = prog + '%';
        };

        function toggleAdminModal() {
            document.getElementById('admin-modal').classList.toggle('active');
        }

        document.getElementById('admin-plus-btn').onclick = toggleAdminModal;

        loadData();
    </script>
</body>
</html>
