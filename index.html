<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored Music 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #080414; color: white; -webkit-user-select: none; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes music-bar { 0%, 100% { height: 4px; } 50% { height: 16px; } }
        .animate-bar-1 { animation: music-bar 0.8s infinite ease-in-out; }
        .animate-bar-2 { animation: music-bar 0.6s infinite ease-in-out; }
        .animate-bar-3 { animation: music-bar 0.7s infinite ease-in-out; }

        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(8,4,20,0.98); z-index: 200; padding: 20px; backdrop-filter: blur(25px); }
        .admin-modal.active { display: flex; flex-direction: column; }
        
        .filter-btn.active { background: rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.5); color: #a855f7; }
        .track-card.playing { background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.3); }

        input, select { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1); }
        input:focus, select:focus { border-color: #a855f7 !important; background: rgba(255,255,255,0.08) !important; outline: none; }
        
        .btn-paste { font-size: 10px; background: rgba(168, 85, 247, 0.2); color: #a855f7; padding: 4px 8px; rounded: 8px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen pb-44">

    <!-- Background Effects -->
    <div class="fixed top-[-10%] left-[-10%] w-[70%] h-[50%] bg-purple-900/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[70%] h-[50%] bg-indigo-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080414]/80 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-600 to-blue-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                <i class="fa fa-fire text-white"></i>
            </div>
            <span class="font-black text-xl tracking-tighter italic">UNCENSORED</span>
        </div>
        <!-- Admin Button -->
        <button id="admin-plus-btn" class="hidden w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-all">
            <i class="fa fa-plus text-lg"></i>
        </button>
    </header>

    <main class="px-5 space-y-8 mt-6">
        <!-- Search -->
        <div class="relative group">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="search-input" placeholder="Поиск трека или артиста..." 
                class="w-full bg-white/5 rounded-2xl py-4 pl-12 pr-4 text-sm">
        </div>

        <!-- Filters -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-1" id="category-filters">
            <button onclick="filterCategory('')" id="cat-all" class="filter-btn active bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-xs font-black uppercase whitespace-nowrap">Все</button>
            <button onclick="filterCategory('pop')" id="cat-pop" class="filter-btn bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-xs font-black uppercase whitespace-nowrap">Поп</button>
            <button onclick="filterCategory('rap')" id="cat-rap" class="filter-btn bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-xs font-black uppercase whitespace-nowrap">Рэп</button>
            <button onclick="filterCategory('punk')" id="cat-punk" class="filter-btn bg-white/5 border border-white/5 rounded-xl px-5 py-2.5 text-xs font-black uppercase whitespace-nowrap">Панк</button>
        </div>

        <!-- Track List -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gray-500">Музыкальная база</h2>
                <span id="track-count" class="text-[10px] bg-purple-500/10 text-purple-400 px-3 py-1 rounded-full font-bold">0</span>
            </div>
            <div class="space-y-3" id="track-container">
                <div class="py-20 text-center opacity-20"><i class="fa fa-spinner fa-spin text-3xl"></i></div>
            </div>
        </section>
    </main>

    <!-- Player Bar -->
    <div id="player-bar" class="fixed bottom-6 left-4 right-4 z-[100] translate-y-40 transition-all duration-700 ease-out">
        <div class="bg-[#120c24]/95 backdrop-blur-3xl border border-white/10 rounded-[35px] p-3 shadow-2xl">
            <div class="flex items-center justify-between p-2 bg-white/5 rounded-[28px] mb-3">
                <div class="flex items-center gap-4 overflow-hidden">
                    <img id="p-img" src="" class="w-12 h-12 rounded-xl object-cover shadow-lg bg-gray-800">
                    <div class="overflow-hidden">
                        <h4 id="p-title" class="font-black text-sm truncate pr-2 text-white">Название</h4>
                        <p id="p-artist" class="text-[10px] text-purple-400 uppercase font-black tracking-widest truncate">Артист</p>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button id="p-play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shadow-xl active:scale-90 transition-all">
                        <i class="fa fa-play ml-1"></i>
                    </button>
                </div>
            </div>

            <div class="px-5 mb-4">
                <div id="p-progress-container" class="w-full h-1.5 bg-white/10 rounded-full cursor-pointer relative overflow-hidden">
                    <div id="p-bar" class="absolute top-0 left-0 h-full bg-purple-500 rounded-full" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[9px] text-gray-500 mt-2 font-bold uppercase tracking-tighter">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="admin-modal no-scrollbar overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black italic">ДОБАВИТЬ ТРЕК</h2>
                <p class="text-[10px] text-purple-500 font-bold tracking-widest uppercase">Панель управления</p>
            </div>
            <button onclick="toggleAdminModal()" class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl text-2xl">&times;</button>
        </div>
        
        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-500 ml-2 uppercase">Название</label>
                    <input id="in-title" type="text" placeholder="Название" class="w-full bg-white/5 p-4 rounded-2xl">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-500 ml-2 uppercase">Исполнитель</label>
                    <input id="in-artist" type="text" placeholder="Артист" class="w-full bg-white/5 p-4 rounded-2xl">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-500 ml-2 uppercase">Жанр</label>
                <select id="in-genre" class="w-full bg-[#130d2b] p-4 rounded-2xl text-gray-300 appearance-none">
                    <option value="pop">Популярное 🔥</option>
                    <option value="rap">Рэп 🎤</option>
                    <option value="punk">Панк 🎸</option>
                </select>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Прямая ссылка на MP3</label>
                    <button onclick="pasteFromClipboard('in-url')" class="btn-paste uppercase">Вставить</button>
                </div>
                <input id="in-url" type="text" placeholder="https://..." class="w-full bg-white/5 p-4 rounded-2xl">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Ссылка на обложку</label>
                    <button onclick="pasteFromClipboard('in-cover')" class="btn-paste uppercase">Вставить</button>
                </div>
                <input id="in-cover" type="text" placeholder="https://..." class="w-full bg-white/5 p-4 rounded-2xl">
            </div>

            <div class="bg-purple-500/10 p-4 rounded-2xl border border-purple-500/20">
                <p class="text-[9px] text-purple-300 font-medium leading-relaxed uppercase tracking-tighter">
                    <i class="fa fa-info-circle mr-1"></i> Сохраняйте треки в облака, дающие прямую ссылку (Dropbox с ?dl=1, Discord, Свой хостинг).
                </p>
            </div>

            <button onclick="saveToDB()" id="save-btn" class="w-full bg-white text-black py-5 rounded-3xl font-black uppercase shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <i class="fa fa-check-circle"></i> ОПУБЛИКОВАТЬ
            </button>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SB_URL = "https://zzztlkyoyjvkokcvqqfd.supabase.co";
        const SB_KEY = "sb_publishable_YOPX7PVk9K1d3gIH3kkQcw_HJlsk-OD";
        const ADMIN_ID = 7919252297;

        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const audio = document.getElementById('main-audio');
        let dbMusic = [];
        let filteredMusic = [];
        let currentIdx = -1;
        let currentFilter = '';

        // Force check admin status
        function checkAdmin() {
            const userId = tg.initDataUnsafe?.user?.id;
            if (userId === ADMIN_ID || !tg.initDataUnsafe?.user) { // fallback for dev environment
                document.getElementById('admin-plus-btn').classList.remove('hidden');
            }
        }
        checkAdmin();

        async function loadData() {
            const { data, error } = await supabase.from('music').select('*').order('created_at', { ascending: false });
            if (data) {
                dbMusic = data;
                applyFilters();
            }
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            filteredMusic = dbMusic.filter(t => 
                (t.title.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search)) &&
                (currentFilter === "" || t.genre === currentFilter)
            );
            renderTracks();
        }

        function renderTracks() {
            const container = document.getElementById('track-container');
            document.getElementById('track-count').innerText = filteredMusic.length;

            container.innerHTML = filteredMusic.map((t, i) => {
                const isPlaying = currentIdx !== -1 && dbMusic[currentIdx]?.id === t.id;
                const activeStyle = isPlaying ? 'track-card playing border-purple-500/40' : 'border-transparent bg-white/[0.03]';
                
                return `
                    <div class="flex items-center justify-between p-3.5 rounded-3xl transition-all border ${activeStyle}" onclick="playTrackById(${t.id})">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <div class="relative w-14 h-14 rounded-2xl overflow-hidden flex-shrink-0 shadow-lg bg-gray-900">
                                <img src="${t.cover || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                                ${isPlaying && !audio.paused ? `
                                    <div class="absolute inset-0 bg-black/50 flex items-center justify-center gap-1">
                                        <div class="w-1 bg-white animate-bar-1 rounded-full"></div>
                                        <div class="w-1 bg-white animate-bar-2 rounded-full"></div>
                                        <div class="w-1 bg-white animate-bar-3 rounded-full"></div>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="text-left overflow-hidden">
                                <h4 class="font-black text-sm truncate ${isPlaying ? 'text-purple-400' : 'text-white'} uppercase">${t.title}</h4>
                                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-0.5">${t.artist}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 pl-2">
                            ${(tg.initDataUnsafe?.user?.id === ADMIN_ID) ? `
                                <button onclick="event.stopPropagation(); removeTrack(${t.id})" class="w-9 h-9 flex items-center justify-center text-red-500/30 hover:text-red-500 active:scale-90 transition-all">
                                    <i class="fa fa-trash-alt text-[10px]"></i>
                                </button>
                            ` : ''}
                            <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isPlaying ? 'bg-purple-500 text-white' : 'bg-white/5 text-gray-500'}">
                                <i class="fa ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play text-[10px]'}"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') || '<div class="py-20 text-center text-gray-600 text-xs font-bold uppercase tracking-widest">Треков нет</div>';
        }

        async function pasteFromClipboard(targetId) {
            try {
                // In Telegram WebApp environment, navigator.clipboard might be restricted
                // but we try it anyway. 
                const text = await navigator.clipboard.readText();
                if (text) {
                    document.getElementById(targetId).value = text;
                    tg.HapticFeedback.impactOccurred('light');
                }
            } catch (err) {
                console.log("Clipboard access denied or not supported");
            }
        }

        function playTrackById(id) {
            const index = dbMusic.findIndex(t => t.id === id);
            
            if (currentIdx === index) {
                if (audio.paused) audio.play();
                else audio.pause();
            } else {
                currentIdx = index;
                audio.src = dbMusic[currentIdx].url;
                audio.play();
                updatePlayerUI();
                document.getElementById('player-bar').classList.remove('translate-y-40');
            }
            renderTracks();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updatePlayerUI() {
            const t = dbMusic[currentIdx];
            if (!t) return;
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.cover || '';
            document.getElementById('p-play-btn').innerHTML = audio.paused ? '<i class="fa fa-play ml-1"></i>' : '<i class="fa fa-pause"></i>';
        }

        async function saveToDB() {
            const title = document.getElementById('in-title').value;
            const artist = document.getElementById('in-artist').value;
            const url = document.getElementById('in-url').value;
            const cover = document.getElementById('in-cover').value;
            const genre = document.getElementById('in-genre').value;
            
            if (!title || !artist || !url) {
                tg.showAlert("Заполни название, артиста и ссылку!");
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner animate-spin"></i> ПУБЛИКАЦИЯ...';

            const { error } = await supabase.from('music').insert([{
                title, artist, genre, url, cover: cover || 'https://via.placeholder.com/300?text=Uncensored'
            }]);
            
            if (!error) {
                tg.HapticFeedback.notificationOccurred('success');
                // Clear inputs
                ['in-title', 'in-artist', 'in-url', 'in-cover'].forEach(id => document.getElementById(id).value = '');
                toggleAdminModal();
                loadData();
            } else {
                tg.showAlert("Ошибка: " + error.message);
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="fa fa-check-circle"></i> ОПУБЛИКОВАТЬ';
        }

        async function removeTrack(id) {
            tg.showConfirm("Удалить этот трек?", async (ok) => {
                if(ok) {
                    await supabase.from('music').delete().eq('id', id);
                    loadData();
                    tg.HapticFeedback.notificationOccurred('warning');
                }
            });
        }

        function toggleAdminModal() { 
            document.getElementById('admin-modal').classList.toggle('active'); 
        }

        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const b = cat === '' ? document.getElementById('cat-all') : document.getElementById(`cat-${cat}`);
            if(b) b.classList.add('active');
            applyFilters();
            tg.HapticFeedback.selectionChanged();
        }

        document.getElementById('p-play-btn').onclick = () => {
            if (audio.paused) audio.play();
            else audio.pause();
            tg.HapticFeedback.impactOccurred('medium');
        };

        audio.onplay = () => updatePlayerUI();
        audio.onpause = () => updatePlayerUI();
        audio.onended = () => {
            if (currentIdx < dbMusic.length - 1) playTrackById(dbMusic[currentIdx + 1].id);
        };
        
        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            document.getElementById('p-bar').style.width = perc + '%';
            
            const curM = Math.floor(audio.currentTime / 60);
            const curS = Math.floor(audio.currentTime % 60);
            document.getElementById('current-time').innerText = `${curM}:${curS < 10 ? '0' : ''}${curS}`;
            
            if (audio.duration) {
                const durM = Math.floor(audio.duration / 60);
                const durS = Math.floor(audio.duration % 60);
                document.getElementById('total-time').innerText = `${durM}:${durS < 10 ? '0' : ''}${durS}`;
            }
        };

        document.getElementById('p-progress-container').onclick = (e) => {
            const x = e.clientX - e.currentTarget.getBoundingClientRect().left;
            audio.currentTime = (x / e.currentTarget.offsetWidth) * audio.duration;
        };

        document.getElementById('search-input').oninput = () => applyFilters();
        document.getElementById('admin-plus-btn').onclick = toggleAdminModal;

        loadData();
    </script>
</body>
</html>
