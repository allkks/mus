<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Premium</title>
    
    <!-- SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bg: '#0a0510', accent: '#8a2be2', surface: '#1a1225', 
                        text: '#ffffff', dim: '#b3a9c0', heart: '#ff2d55', brandY: '#ffcc00' 
                    },
                    fontFamily: { sans: ['Manrope', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0510; color: #ffffff; font-family: 'Manrope', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-player { background: rgba(26, 18, 37, 0.98); backdrop-filter: blur(30px); border-top: 1px solid rgba(138, 43, 226, 0.3); }
        .hero-bg { background: linear-gradient(180deg, transparent 0%, rgba(10, 5, 16, 1) 100%); }
        .yandex-gradient { background: linear-gradient(135deg, #8a2be2 0%, #ff2d55 100%); }
        .h-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 10px; }
        .h-scroll > div { scroll-snap-align: start; flex-shrink: 0; }
        .page { transition: opacity 0.3s ease; }
        #player { height: 210px; }
    </style>
</head>
<body class="selection:bg-accent/30">

    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-64">
        
        <!-- HEADER -->
        <div class="p-6 pt-10 sticky top-0 bg-bg/90 backdrop-blur-xl z-50 flex items-center gap-4">
            <div class="flex-1 flex items-center gap-3 bg-surface/50 border border-white/5 rounded-2xl px-5 py-3 focus-within:border-accent transition-all">
                <i data-lucide="search" class="w-4 h-4 text-dim"></i>
                <input id="search-input" type="text" placeholder="Поиск музыки" class="bg-transparent outline-none w-full text-sm text-white" oninput="handleSearch()">
            </div>
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-accent/20 flex items-center justify-center border border-accent/30 overflow-hidden">
                <i data-lucide="user" class="w-5 h-5 text-accent"></i>
            </div>
        </div>

        <!-- PAGE: HOME -->
        <section id="page-home" class="page p-4">
            <div onclick="playRandom()" class="relative h-52 rounded-[2.5rem] overflow-hidden mb-10 yandex-gradient shadow-2xl p-8 flex flex-col justify-end transform active:scale-95 transition-transform cursor-pointer">
                <div class="absolute top-4 right-8 opacity-20"><i data-lucide="waves" class="w-32 h-32 text-white"></i></div>
                <h2 class="text-4xl font-black italic tracking-tighter leading-none">Моя<br>Волна</h2>
                <div class="absolute bottom-8 right-8 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-xl"><i data-lucide="play" class="fill-black text-black ml-1"></i></div>
            </div>

            <!-- GLOBAL CHART -->
            <div class="mb-10">
                <h2 class="text-xl font-bold mb-6 px-2 flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-5 h-5 text-brandY"></i><span>Мировой чарт</span>
                </h2>
                <div id="home-charts" class="space-y-1 px-2 bg-surface/20 rounded-[2rem] p-4 border border-white/5">
                    <div class="text-dim text-xs opacity-50">Загрузка топа...</div>
                </div>
            </div>

            <!-- FAVORITES -->
            <div id="fav-section" class="hidden mb-10">
                <h2 onclick="openFullList('Мне нравится', getFavorites())" class="text-xl font-bold mb-4 px-2 flex items-center justify-between text-heart cursor-pointer">
                    <span>Мне нравится</span><i data-lucide="chevron-right" class="w-5 h-5"></i>
                </h2>
                <div id="favorites-list" class="space-y-1 px-2"></div>
            </div>

            <div class="mb-10">
                <h2 class="text-xl font-bold mb-6 px-2 text-white/50 uppercase text-[10px] tracking-[0.2em]">Исполнители</h2>
                <div id="home-artists" class="h-scroll no-scrollbar px-2"></div>
            </div>
        </section>

        <!-- PAGE: ARTIST -->
        <section id="page-artist" class="page hidden">
            <div class="relative h-[50vh] w-full flex flex-col justify-end overflow-hidden">
                <img id="artist-view-img" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <button onclick="navTo('home')" class="absolute top-6 left-6 bg-black/40 p-3 rounded-full backdrop-blur-xl border border-white/10 z-10"><i data-lucide="chevron-left"></i></button>
                <div class="relative p-6 pb-8 z-10">
                    <h1 id="artist-view-name" class="text-5xl font-black italic tracking-tighter mb-4 text-white"></h1>
                    <button class="bg-brandY text-black px-12 py-4 rounded-full font-black shadow-xl" onclick="playArtistTracks()">СЛУШАТЬ</button>
                </div>
            </div>
            <div class="p-4" id="artist-view-tracks"></div>
        </section>

        <section id="page-search" class="page hidden p-6"><div id="search-results" class="space-y-2"></div></section>
        <section id="page-full-list" class="page hidden p-6"><div id="full-list-content"></div></section>
    </main>

    <!-- PLAYER -->
    <div id="player" class="glass-player fixed bottom-6 left-2 right-2 rounded-[2.5rem] p-5 z-[100] transition-all duration-500 translate-y-[300px] shadow-2xl">
        <div class="flex gap-4 items-center mb-4">
            <img id="p-img" class="w-20 h-20 rounded-3xl object-cover shadow-xl">
            <div class="flex-1 min-w-0">
                <div id="p-title" class="font-bold text-lg leading-tight truncate text-white">...</div>
                <div id="p-artist" class="text-dim text-sm font-medium truncate uppercase tracking-wider">...</div>
            </div>
            <button onclick="toggleFavorite(currentTrackId)" class="p-2"><i id="p-heart-main" data-lucide="heart" class="w-7 h-7"></i></button>
        </div>
        <div class="px-1">
            <div class="h-1 bg-white/10 rounded-full overflow-hidden mb-1"><div id="player-progress" class="h-full bg-brandY w-0 transition-all duration-200"></div></div>
            <div class="flex justify-between text-[10px] font-mono text-dim"><span id="p-current-time">0:00</span><span id="p-total-time">0:00</span></div>
        </div>
        <div class="flex items-center justify-around mt-4">
            <button onclick="prevTrack()" class="p-3"><i data-lucide="skip-back" class="fill-white text-white"></i></button>
            <button onclick="togglePlay()" class="w-16 h-16 bg-white text-black rounded-3xl flex items-center justify-center shadow-2xl active:scale-95 transition-all"><i id="p-play-icon" data-lucide="play" class="fill-black"></i></button>
            <button onclick="nextTrack()" class="p-3"><i data-lucide="skip-forward" class="fill-white text-white"></i></button>
        </div>
    </div>

    <!-- NAVBAR -->
    <div class="fixed bottom-0 left-0 right-0 h-20 bg-bg/80 backdrop-blur-md border-t border-white/5 flex items-center justify-around z-[90]">
        <button onclick="navTo('home')" class="flex flex-col items-center gap-1 text-brandY"><i data-lucide="home"></i><span class="text-[9px] font-bold">ГЛАВНАЯ</span></button>
        <button onclick="openFullList('Мне нравится', getFavorites())" class="flex flex-col items-center gap-1 text-dim/40"><i data-lucide="heart"></i><span class="text-[9px] font-bold">МОЁ</span></button>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        // 1. КОНФИГУРАЦИЯ FIREBASE (Твои ключи)
        const firebaseConfig = {
            apiKey: "AIzaSyDRxdwpKhy4hn-umuwKLrYfCZ4caafAV_o",
            authDomain: "project-48022103835443054.firebaseapp.com",
            databaseURL: "https://project-48022103835443054-default-rtdb.firebaseio.com",
            projectId: "project-48022103835443054",
            storageBucket: "project-48022103835443054.firebasestorage.app",
            messagingSenderId: "812358314577",
            appId: "1:812358314577:web:a392af88486face13aa670"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        // 2. ДАННЫЕ TELEGRAM
        const tg = window.Telegram.WebApp;
        tg.ready();
        const user = tg.initDataUnsafe?.user || { id: "guest", first_name: "Слушатель" };

        const USER = "allkks";
        const REPO = "mus";
        let db = { tracks: [], artists: {} };
        let favorites = [];
        let currentTrackId = null;
        let currentPlaylist = [];
        let globalBust = Date.now();
        const audio = document.getElementById('audio-engine');

        // 3. ЗАПУСК
        window.onload = async () => {
            lucide.createIcons();
            if(user.photo_url) document.getElementById('user-avatar').innerHTML = `<img src="${user.photo_url}" class="w-full h-full object-cover">`;
            
            await loadDatabase();
            initCloudSync(); // Синхронизация лайков
            listenGlobalCharts(); // Живой чарт
            
            setInterval(loadDatabase, 20000);
        };

        // СИНХРОНИЗАЦИЯ С ОБЛАКОМ
        function initCloudSync() {
            // Сохраняем пользователя
            rtdb.ref('users/' + user.id + '/profile').update({
                name: user.first_name,
                username: user.username || ""
            });

            // Подписка на лайки (реальное время)
            rtdb.ref('users/' + user.id + '/favorites').on('value', (snap) => {
                const data = snap.val();
                favorites = data ? Object.keys(data).filter(k => data[k] === true).map(Number) : [];
                renderHome();
                updateHeartIcons();
            });
        }

        function toggleFavorite(id) {
            if(!id) return;
            const isFav = favorites.includes(id);
            rtdb.ref('users/' + user.id + '/favorites/' + id).set(!isFav);
        }

        function logPlay(id) {
            // Приращение счетчика в облаке для чарта
            rtdb.ref('global_charts/' + id).transaction(c => (c || 0) + 1);
        }

        function listenGlobalCharts() {
            rtdb.ref('global_charts').orderByValue().limitToLast(10).on('value', (snap) => {
                const data = snap.val();
                if (!data) return;
                const sorted = Object.keys(data).sort((a, b) => data[b] - data[a]);
                
                document.getElementById('home-charts').innerHTML = sorted.map((tid, i) => {
                    const t = db.tracks.find(x => x.id == tid);
                    if(!t) return '';
                    return `
                        <div onclick="playTrack(${t.id}, db.tracks)" class="flex items-center gap-4 p-3 active:bg-white/5 transition-all cursor-pointer">
                            <span class="text-lg font-black italic opacity-20 w-6">${i+1}</span>
                            <img src="${imgBust(t.img)}" class="w-12 h-12 rounded-lg object-cover">
                            <div class="flex-1 truncate">
                                <div class="font-bold text-sm text-white">${t.title}</div>
                                <div class="text-[10px] text-dim uppercase tracking-wider">${t.artist}</div>
                            </div>
                            <div class="text-[10px] font-mono text-accent/50">${data[tid]}</div>
                        </div>`;
                }).join('');
            });
        }

        // --- ЛОГИКА ИНТЕРФЕЙСА ---

        async function loadDatabase() {
            const bust = Date.now();
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database.json?v=${bust}`, {
                    cache: "no-store", headers: { 'Accept': 'application/vnd.github.v3.raw' }
                });
                const newData = await res.json();
                if (JSON.stringify(db) !== JSON.stringify(newData)) {
                    db = newData; globalBust = Date.now();
                    renderHome();
                }
            } catch (e) {
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database.json?v=${bust}`, { cache: "no-store" });
                db = await res.json();
                renderHome();
            }
        }

        function imgBust(u) { return u ? `${u}${u.includes('?') ? '&' : '?'}v=${globalBust}` : ''; }

        function renderHome() {
            document.getElementById('home-artists').innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtistPage('${a.name}')" class="w-32 text-center transform active:scale-90 transition-transform cursor-pointer">
                    <img src="${imgBust(a.img)}" class="w-24 h-24 rounded-full mx-auto object-cover mb-3 shadow-2xl border border-white/5">
                    <div class="text-[10px] font-bold uppercase tracking-widest truncate text-white">${a.name}</div>
                </div>`).join('');
            
            const favs = db.tracks.filter(t => favorites.includes(t.id));
            if(favs.length) {
                document.getElementById('fav-section').classList.remove('hidden');
                document.getElementById('favorites-list').innerHTML = favs.map(t => renderTrackItem(t, 'db.tracks')).join('');
            } else document.getElementById('fav-section').classList.add('hidden');
            
            lucide.createIcons();
        }

        function renderTrackItem(t, src) {
            const isFav = favorites.includes(t.id);
            const list = Array.isArray(src) ? 'currentPlaylist' : src;
            return `
                <div class="flex items-center gap-4 p-3 rounded-2xl active:bg-white/5 transition-all cursor-pointer" onclick="playTrack(${t.id}, ${list})">
                    <img src="${imgBust(t.img)}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm truncate text-white">${t.title}</div>
                        <div class="text-[10px] text-dim font-bold uppercase tracking-widest">${t.artist}</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation(); toggleFavorite(${t.id})">
                        <i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-heart text-heart' : 'text-dim/20'}"></i>
                    </button>
                </div>`;
        }

        function playTrack(id, list) {
            const t = Array.isArray(list) ? list.find(x => x.id === id) : db.tracks.find(x => x.id === id);
            if(!t) return;
            currentTrackId = id;
            currentPlaylist = Array.isArray(list) ? list : db.tracks;
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = imgBust(t.img);
            audio.src = t.url; audio.play();
            document.getElementById('p-play-icon').setAttribute('data-lucide', 'pause');
            document.getElementById('player').classList.remove('translate-y-[300px]');
            logPlay(id); 
            lucide.createIcons(); updateHeartIcons();
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase().trim();
            if (!q) { navTo('home'); return; }
            navTo('search');
            const container = document.getElementById('search-results');
            
            const foundArtists = Object.values(db.artists).filter(a => a.name.toLowerCase().includes(q));
            const foundTracks = db.tracks.filter(t => t.title.toLowerCase().includes(q));

            let html = '';
            if (foundArtists.length > 0) {
                html += `<div class="text-[10px] font-black text-accent uppercase tracking-widest mb-4 px-2">Исполнители</div>`;
                foundArtists.forEach(a => {
                    html += `<div onclick="openArtistPage('${a.name}')" class="flex items-center gap-4 p-4 rounded-3xl bg-surface/40 border border-white/5 mb-6 active:scale-95 transition-all cursor-pointer"><img src="${imgBust(a.img)}" class="w-16 h-16 rounded-full object-cover border border-accent/20 shadow-xl"><div class="flex-1"><div class="font-bold text-lg text-white">${a.name}</div><div class="text-[10px] text-dim font-bold uppercase tracking-widest">Артист</div></div><i data-lucide="chevron-right" class="text-dim"></i></div>`;
                });
            }
            if (foundTracks.length > 0) {
                html += `<div class="text-[10px] font-black text-dim uppercase tracking-widest mb-4 px-2">Треки</div>`;
                html += foundTracks.map(t => renderTrackItem(t, 'db.tracks')).join('');
            }
            container.innerHTML = html || `<div class="py-20 text-center text-dim opacity-40">Ничего не найдено</div>`;
            lucide.createIcons();
        }

        function openArtistPage(name) {
            const artist = db.artists[name];
            if(!artist) return;
            document.getElementById('artist-view-img').src = imgBust(artist.img);
            document.getElementById('artist-view-name').innerText = artist.name;
            document.getElementById('artist-view-tracks').innerHTML = artist.tracks.map(t => renderTrackItem(t, `db.artists['${name}'].tracks`)).join('');
            navTo('artist'); lucide.createIcons();
        }

        function togglePlay() { 
            if(audio.paused) { audio.play(); document.getElementById('p-play-icon').setAttribute('data-lucide', 'pause'); }
            else { audio.pause(); document.getElementById('p-play-icon').setAttribute('data-lucide', 'play'); }
            lucide.createIcons();
        }

        function updateHeartIcons() {
            const isFav = favorites.includes(currentTrackId);
            const btn = document.getElementById('p-heart-main');
            if (btn) {
                if (isFav) { btn.classList.add('fill-heart', 'text-heart'); btn.classList.remove('text-dim'); }
                else { btn.classList.remove('fill-heart', 'text-heart'); btn.classList.add('text-dim'); }
            }
            lucide.createIcons();
        }

        function formatTime(s) {
            const m = Math.floor(s/60); const sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audio.ontimeupdate = () => { 
            if(audio.duration) {
                document.getElementById('player-progress').style.width = (audio.currentTime/audio.duration)*100 + "%"; 
                document.getElementById('p-current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('p-total-time').innerText = formatTime(audio.duration);
            }
        };

        function navTo(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
            document.getElementById('page-'+p).classList.remove('hidden');
        }

        function nextTrack() {
            let i = currentPlaylist.findIndex(t => t.id === currentTrackId);
            playTrack(currentPlaylist[(i+1)%currentPlaylist.length].id, currentPlaylist);
        }

        function prevTrack() {
            let i = currentPlaylist.findIndex(t => t.id === currentTrackId);
            playTrack(currentPlaylist[(i-1+currentPlaylist.length)%currentPlaylist.length].id, currentPlaylist);
        }

        function getFavorites() { return db.tracks.filter(t => favorites.includes(t.id)); }
        function openFullList(title, list) {
            document.getElementById('full-list-content').innerHTML = `<h1 class="text-3xl font-bold mb-6">${title}</h1>` + list.map(t => renderTrackItem(t, 'db.tracks')).join('');
            navTo('full-list');
        }
        function playRandom() { if(db.tracks.length) playTrack(db.tracks[Math.floor(Math.random()*db.tracks.length)].id, db.tracks); }
        audio.onended = () => nextTrack();
    </script>
</body>
</html>
