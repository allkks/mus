<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Музыка и Артисты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bg: '#0a0510', 
                        accent: '#8a2be2', 
                        surface: '#1a1225', 
                        text: '#ffffff', 
                        dim: '#b3a9c0',
                        heart: '#ff2d55'
                    },
                    fontFamily: { sans: ['Manrope', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0510; color: #ffffff; font-family: 'Manrope', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-player { 
            background: rgba(26, 18, 37, 0.95); 
            backdrop-filter: blur(25px); 
            border-top: 1px solid rgba(138, 43, 226, 0.2);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .yandex-gradient { background: linear-gradient(135deg, #8a2be2 0%, #4b0082 100%); }
        .hero-bg { background: linear-gradient(180deg, transparent 0%, rgba(10, 5, 16, 1) 95%); }
        
        .wave-pulse { animation: pulse-purple 2s infinite; }
        @keyframes pulse-purple {
            0% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(138, 43, 226, 0); }
            100% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0); }
        }

        .page { transition: opacity 0.3s ease; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-40">
        
        <!-- ШАПКА И ПОИСК -->
        <div class="p-6 pt-10 sticky top-0 bg-bg/90 backdrop-blur-xl z-50">
            <div class="flex items-center gap-3 bg-surface/50 border border-white/5 rounded-2xl px-5 py-4 focus-within:border-accent transition-all">
                <i data-lucide="search" class="w-5 h-5 text-dim"></i>
                <input id="search-input" type="text" placeholder="Треки, артисты, альбомы" class="bg-transparent border-none outline-none w-full text-sm font-medium placeholder:text-dim" oninput="handleSearch()">
            </div>
        </div>

        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <section id="page-home" class="page p-6 pt-2">
            <!-- МОЯ ВОЛНА -->
            <div onclick="playRandom()" class="relative h-56 rounded-[2.5rem] overflow-hidden mb-10 cursor-pointer yandex-gradient wave-pulse btn-active">
                <div class="absolute inset-0 flex flex-col justify-end p-8 z-10">
                    <span class="bg-white/10 backdrop-blur-md w-fit px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mb-2">Настроено на тебя</span>
                    <h2 class="text-4xl font-black italic tracking-tighter">Моя волна</h2>
                    <p class="text-white/70 text-sm mt-1">Бесконечный поток музыки</p>
                </div>
                <div class="absolute bottom-8 right-8 w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-2xl">
                    <i data-lucide="play" class="fill-black text-black ml-1 w-6 h-6"></i>
                </div>
            </div>

            <!-- ЛУЧШИЕ ИСПОЛНИТЕЛИ -->
            <div class="mb-10">
                <h2 class="text-2xl font-bold mb-6 px-2">Лучшие исполнители</h2>
                <div id="home-artists" class="flex gap-5 overflow-x-auto pb-4 no-scrollbar snap-x">
                    <!-- Сюда вставятся артисты -->
                </div>
            </div>

            <!-- ЛЮБИМОЕ (скрыто если пусто) -->
            <div id="fav-section" class="hidden mb-10">
                <h2 class="text-2xl font-bold mb-6 px-2 flex items-center gap-2">
                    <i data-lucide="heart" class="fill-heart text-heart w-6 h-6"></i> Любимое
                </h2>
                <div id="favorites-list" class="space-y-1"></div>
            </div>

            <!-- ТРЕНДЫ -->
            <div class="mb-10">
                <h2 class="text-2xl font-bold mb-6 px-2">Популярно</h2>
                <div id="home-trending" class="space-y-1"></div>
            </div>
        </section>

        <!-- ПОИСК -->
        <section id="page-search" class="page hidden p-6">
            <h2 class="text-2xl font-bold mb-6">Результаты</h2>
            <div id="search-results" class="space-y-2"></div>
        </section>

        <!-- СТРАНИЦА АРТИСТА -->
        <section id="page-artist" class="page hidden animate-in fade-in duration-500">
            <div class="relative h-[45vh] w-full">
                <img id="artist-view-img" class="w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <button onclick="navTo('home')" class="absolute top-6 left-6 bg-black/40 p-3 rounded-full backdrop-blur-xl border border-white/10">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                <div class="absolute bottom-10 left-6">
                    <h1 id="artist-view-name" class="text-5xl font-black italic tracking-tighter drop-shadow-2xl"></h1>
                    <p class="text-white/60 text-xs font-bold uppercase tracking-widest mt-2 flex items-center gap-2">
                        <i data-lucide="check-circle" class="w-4 h-4 text-accent"></i> Официальный артист
                    </p>
                </div>
            </div>
            <div class="p-6">
                <div id="artist-view-tracks" class="space-y-1"></div>
            </div>
        </section>
    </main>

    <!-- ПЛЕЕР -->
    <div id="player" class="glass-player fixed bottom-8 left-4 right-4 rounded-3xl p-4 z-[100] transition-transform duration-500 translate-y-44">
        <div id="player-progress-container" class="absolute -top-[1px] left-8 right-8 h-[2px] bg-white/5 cursor-pointer" onclick="handleSeek(event)">
            <div id="player-progress" class="h-full bg-accent relative transition-all duration-100">
                <div class="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full shadow-[0_0_10px_#fff]"></div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div onclick="openFullscreenPlayer()" class="w-14 h-14 flex-shrink-0 cursor-pointer">
                <img id="p-img" class="w-full h-full rounded-2xl object-cover shadow-lg">
            </div>
            <div class="flex-1 overflow-hidden">
                <div id="p-title" class="font-bold truncate text-sm">Не выбрано</div>
                <div id="p-artist" onclick="openArtistByName(this.innerText)" class="text-dim text-[11px] font-bold uppercase tracking-widest truncate cursor-pointer hover:text-accent">MUS.LIB</div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleFavorite(currentTrackId)" class="p-2 btn-active">
                    <i id="p-heart" data-lucide="heart" class="w-6 h-6"></i>
                </button>
                <button onclick="togglePlay()" class="w-12 h-12 flex items-center justify-center bg-white text-black rounded-2xl btn-active">
                    <i id="p-play-icon" data-lucide="play" class="fill-current w-6 h-6"></i>
                </button>
                <button onclick="nextTrack()" class="text-dim pr-1">
                    <i data-lucide="skip-forward" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ПОЛНОЭКРАННЫЙ ПЛЕЕР -->
    <div id="full-player" class="fixed inset-0 bg-[#0a0510] z-[200] transition-transform duration-500 translate-y-full flex flex-col p-8 pt-16">
        <button onclick="closeFullscreenPlayer()" class="absolute top-8 left-8 text-dim"><i data-lucide="chevron-down" class="w-10 h-10"></i></button>
        <div class="flex-1 flex flex-col items-center justify-center">
            <img id="f-img" class="w-full max-w-sm aspect-square rounded-[3rem] shadow-2xl object-cover mb-12 border border-white/5">
            <div class="text-center">
                <h1 id="f-title" class="text-3xl font-black mb-2 px-4">---</h1>
                <p id="f-artist" onclick="openArtistByName(this.innerText); closeFullscreenPlayer()" class="text-accent text-xl font-black italic uppercase tracking-widest cursor-pointer">---</p>
            </div>
        </div>
        <div class="w-full max-w-sm mx-auto pb-20">
            <div class="h-1 bg-white/10 rounded-full mb-4 relative" onclick="handleSeek(event)">
                <div id="f-progress" class="absolute h-full bg-accent rounded-full"></div>
            </div>
            <div class="flex justify-between items-center px-2">
                <button onclick="toggleFavorite(currentTrackId)"><i id="f-heart" data-lucide="heart" class="w-8 h-8"></i></button>
                <div class="flex items-center gap-8">
                    <button onclick="prevTrack()"><i data-lucide="skip-back" class="w-10 h-10 fill-current"></i></button>
                    <button onclick="togglePlay()" class="w-24 h-24 bg-white text-black rounded-full flex items-center justify-center btn-active">
                        <i id="f-play-icon" data-lucide="play" class="w-10 h-10 fill-current ml-1"></i>
                    </button>
                    <button onclick="nextTrack()"><i data-lucide="skip-forward" class="w-10 h-10 fill-current"></i></button>
                </div>
                <button class="text-dim opacity-40"><i data-lucide="shuffle" class="w-6 h-6"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const USER = "allkks";
        const REPO = "mus";
        let db = { tracks: [], artists: {} };
        let currentPlaylist = [];
        let currentIndex = -1;
        let currentTrackId = null;
        let favorites = JSON.parse(localStorage.getItem('user_favorites') || '[]');
        const audio = document.getElementById('audio-engine');

        window.onload = async () => {
            lucide.createIcons();
            await fetchData();
        };

        async function fetchData() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database.json?t=${Date.now()}`);
                db = await res.json();
                renderAll();
            } catch (e) {
                console.error("Data error", e);
            }
        }

        function renderAll() {
            // Артисты
            const artistContainer = document.getElementById('home-artists');
            artistContainer.innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtistPage('${a.name}')" class="flex-shrink-0 w-36 text-center btn-active cursor-pointer">
                    <div class="aspect-square rounded-full overflow-hidden mb-3 border-2 border-accent/20">
                        <img src="${a.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="font-bold text-sm truncate uppercase tracking-tighter">${a.name}</div>
                </div>
            `).join('');

            // Популярное
            document.getElementById('home-trending').innerHTML = db.tracks.slice(0, 8).map(t => renderTrackItem(t)).join('');
            
            renderFavorites();
            lucide.createIcons();
        }

        function renderTrackItem(t) {
            const isFav = favorites.includes(t.id);
            return `
                <div class="flex items-center gap-4 p-3 rounded-2xl active:bg-surface/50 transition-all">
                    <div class="w-12 h-12 relative flex-shrink-0" onclick="playTrack(${t.id}, db.tracks)">
                        <img src="${t.img}" class="w-full h-full rounded-xl object-cover shadow-md">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/20 rounded-xl">
                            <i data-lucide="play" class="w-5 h-5 fill-white text-white opacity-0 group-active:opacity-100"></i>
                        </div>
                    </div>
                    <div class="flex-1 overflow-hidden" onclick="playTrack(${t.id}, db.tracks)">
                        <div class="font-bold text-sm truncate">${t.title}</div>
                        <div class="text-[10px] text-dim font-extrabold uppercase tracking-widest hover:text-accent cursor-pointer" onclick="event.stopPropagation(); openArtistPage('${t.artist}')">${t.artist}</div>
                    </div>
                    <button onclick="toggleFavorite(${t.id})" class="p-2">
                        <i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-heart text-heart' : 'text-dim/30'}"></i>
                    </button>
                </div>
            `;
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const resDiv = document.getElementById('search-results');
            if(!q) { navTo('home'); return; }
            navTo('search');

            const filteredTracks = db.tracks.filter(t => t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q));
            const filteredArtists = Object.values(db.artists).filter(a => a.name.toLowerCase().includes(q));

            let html = "";
            if(filteredArtists.length) {
                html += `<div class="mb-4"><p class="text-[10px] font-bold text-dim uppercase tracking-[0.2em] mb-3 ml-2">Артисты</p><div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">`;
                html += filteredArtists.map(a => `
                    <div onclick="openArtistPage('${a.name}')" class="flex-shrink-0 w-24 text-center">
                        <img src="${a.img}" class="w-16 h-16 rounded-full mx-auto object-cover mb-2">
                        <div class="text-[10px] font-bold truncate uppercase">${a.name}</div>
                    </div>`).join('');
                html += `</div></div>`;
            }
            html += `<p class="text-[10px] font-bold text-dim uppercase tracking-[0.2em] mb-3 ml-2">Треки</p>`;
            html += filteredTracks.length ? filteredTracks.map(t => renderTrackItem(t)).join('') : `<p class="p-4 text-dim italic text-sm text-center">Ничего не найдено</p>`;
            
            resDiv.innerHTML = html;
            lucide.createIcons();
        }

        function openArtistPage(name) {
            const artist = db.artists[name];
            if(!artist) return;
            document.getElementById('artist-view-img').src = artist.img;
            document.getElementById('artist-view-name').innerText = artist.name.toUpperCase();
            document.getElementById('artist-view-tracks').innerHTML = artist.tracks.map(t => renderTrackItem(t)).join('');
            navTo('artist');
            lucide.createIcons();
        }

        function openArtistByName(name) { openArtistPage(name.trim()); }

        function playTrack(id, list) {
            currentPlaylist = list;
            currentIndex = list.findIndex(t => t.id === id);
            const t = list[currentIndex];
            currentTrackId = id;

            document.getElementById('p-title').innerText = document.getElementById('f-title').innerText = t.title;
            document.getElementById('p-artist').innerText = document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('p-img').src = document.getElementById('f-img').src = t.img;
            
            audio.src = t.url;
            audio.play();
            updatePlayIcon(true);
            updateHeartIcons();
            document.getElementById('player').classList.remove('translate-y-44');
        }

        function togglePlay() { 
            if(audio.paused) { audio.play(); updatePlayIcon(true); } 
            else { audio.pause(); updatePlayIcon(false); }
        }

        function updatePlayIcon(p) {
            const icons = ['p-play-icon', 'f-play-icon'];
            icons.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.setAttribute('data-lucide', p ? 'pause' : 'play');
                    lucide.createIcons();
                }
            });
        }

        function toggleFavorite(id) {
            if(!id) return;
            const idx = favorites.indexOf(id);
            if(idx > -1) favorites.splice(idx, 1);
            else favorites.push(id);
            localStorage.setItem('user_favorites', JSON.stringify(favorites));
            updateHeartIcons();
            renderFavorites();
            // Обновить списки если мы на страницах
            const activePage = document.querySelector('.page:not(.hidden)');
            if(activePage.id === 'page-home') renderAll();
            else if(activePage.id === 'page-artist') openArtistPage(db.tracks.find(t=>t.id===id).artist);
        }

        function updateHeartIcons() {
            const isFav = favorites.includes(currentTrackId);
            const pHeart = document.getElementById('p-heart');
            const fHeart = document.getElementById('f-heart');
            if(pHeart) pHeart.className = `w-6 h-6 ${isFav ? 'fill-heart text-heart' : 'text-dim'}`;
            if(fHeart) fHeart.className = `w-8 h-8 ${isFav ? 'fill-heart text-heart' : 'text-dim'}`;
            lucide.createIcons();
        }

        function renderFavorites() {
            const favTracks = db.tracks.filter(t => favorites.includes(t.id));
            const container = document.getElementById('favorites-list');
            const section = document.getElementById('fav-section');
            if(favTracks.length > 0) {
                section.classList.remove('hidden');
                container.innerHTML = favTracks.map(t => renderTrackItem(t)).join('');
            } else {
                section.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function nextTrack() { if(currentIndex < currentPlaylist.length - 1) playTrack(currentPlaylist[currentIndex+1].id, currentPlaylist); }
        function prevTrack() { if(currentIndex > 0) playTrack(currentPlaylist[currentIndex-1].id, currentPlaylist); }
        function playRandom() { playTrack(db.tracks[Math.floor(Math.random()*db.tracks.length)].id, db.tracks); }

        function navTo(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('scroll-container').scrollTo(0,0);
        }

        function openFullscreenPlayer() { document.getElementById('full-player').classList.remove('translate-y-full'); }
        function closeFullscreenPlayer() { document.getElementById('full-player').classList.add('translate-y-full'); }

        audio.ontimeupdate = () => {
            if(!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('player-progress').style.width = pct + "%";
            document.getElementById('f-progress').style.width = pct + "%";
        };

        function handleSeek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            audio.currentTime = (x / rect.width) * audio.duration;
        }

        audio.onended = nextTrack;
    </script>
</body>
</html>
