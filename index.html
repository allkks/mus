<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --accent: #a855f7;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: white;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .artist-card-img {
            position: relative;
            transition: transform 0.3s ease;
        }
        
        .artist-card-img::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), #4f46e5);
            z-index: -1;
            opacity: 0.5;
        }

        .track-card {
            background: var(--card-bg);
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .track-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.1);
        }

        .track-card.playing {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        #artist-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }

        #artist-page.active {
            transform: translateY(0);
        }

        .progress-container {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* Анимация появления плеера */
        .player-appear {
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(150%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 safe-top flex justify-between items-center">
        <div>
            <p class="text-[10px] font-bold text-purple-500 uppercase tracking-[0.3em]">Music App</p>
            <h1 class="text-3xl font-extrabold tracking-tight">UNCENSORED</h1>
        </div>
        <div class="w-10 h-10 rounded-full glass flex items-center justify-center">
            <i class="fa-solid fa-magnifying-glass text-sm opacity-60"></i>
        </div>
    </header>

    <main id="home-view">
        <!-- Artists Section -->
        <section class="mt-4">
            <div class="px-6 flex justify-between items-end mb-4">
                <h3 class="text-lg font-bold">Твои кумиры</h3>
                <span class="text-xs text-purple-400 font-semibold">Все</span>
            </div>
            <div id="artist-list" class="flex gap-6 overflow-x-auto px-6 no-scrollbar snap-x">
                <!-- Артисты рендерятся тут -->
            </div>
        </section>

        <!-- All Releases -->
        <section class="mt-10 px-6">
            <h3 class="text-lg font-bold mb-4">Новинки недели</h3>
            <div id="track-list" class="space-y-3">
                <!-- Треки рендерятся тут -->
            </div>
        </section>
    </main>

    <!-- Artist Detail Page -->
    <div id="artist-page" class="overflow-y-auto no-scrollbar">
        <div id="ap-banner" class="h-[45vh] relative flex items-end p-8">
            <button onclick="closeArtist()" class="fixed top-12 left-6 z-50 w-10 h-10 glass rounded-full flex items-center justify-center">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/40 to-transparent z-10"></div>
            <div class="relative z-20">
                <p class="text-xs font-bold text-purple-400 uppercase tracking-widest mb-1">Исполнитель</p>
                <h2 id="ap-name" class="text-5xl font-extrabold tracking-tighter"></h2>
            </div>
        </div>
        
        <div class="p-6 relative z-20 bg-[#050505]">
            <div id="ap-content"></div>
        </div>
        <div class="h-32"></div>
    </div>

    <!-- Mini Player Bar -->
    <div id="player-bar" class="fixed bottom-8 left-4 right-4 z-[150] hidden">
        <div class="glass rounded-2xl p-2 flex items-center justify-between shadow-2xl" onclick="openFullPlayer()">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <div class="relative">
                    <img id="p-img" src="" class="w-12 h-12 rounded-xl object-cover bg-neutral-900 shadow-lg">
                    <div id="p-mini-wave" class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-xl opacity-0">
                         <div class="flex gap-1 items-end h-4">
                            <div class="w-0.5 bg-white animate-bounce" style="animation-duration: 0.5s"></div>
                            <div class="w-0.5 bg-white animate-bounce" style="animation-duration: 0.8s"></div>
                            <div class="w-0.5 bg-white animate-bounce" style="animation-duration: 0.6s"></div>
                         </div>
                    </div>
                </div>
                <div class="min-w-0">
                    <h4 id="p-title" class="font-bold text-sm truncate pr-4"></h4>
                    <p id="p-subtitle" class="text-[10px] text-neutral-400 uppercase font-semibold"></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="event.stopPropagation(); togglePlay();" id="p-play-btn" class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center active:scale-90 transition-transform">
                    <i class="fa-solid fa-play"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Full Screen Player -->
    <div id="full-player" class="fixed inset-0 bg-[#050505] z-[200] translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.32, 0.72, 0, 1)]">
        <div class="h-full flex flex-col safe-top safe-bottom p-8">
            <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full flex items-center justify-center mb-8">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            
            <div class="flex-1 flex flex-col justify-center">
                <div class="relative group">
                    <div class="absolute inset-0 bg-purple-600/20 blur-[80px] rounded-full scale-75 group-hover:scale-100 transition-transform duration-700"></div>
                    <img id="f-img" src="" class="relative w-full aspect-square rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] object-cover bg-neutral-900">
                </div>
                
                <div class="mt-12 text-left">
                    <h2 id="f-title" class="text-3xl font-black tracking-tight mb-2"></h2>
                    <p id="f-artist" class="text-lg text-purple-400 font-semibold opacity-80"></p>
                </div>
            </div>

            <div class="w-full mt-auto">
                <div class="flex justify-between text-[10px] font-bold text-neutral-500 mb-2 uppercase tracking-tighter">
                    <span id="f-current-time">0:00</span>
                    <span id="f-duration">0:00</span>
                </div>
                <div class="progress-container mb-10" onclick="seek(event)">
                    <div id="f-progress" class="progress-fill"></div>
                </div>
                
                <div class="flex justify-around items-center mb-8">
                    <button onclick="prevTrack()" class="text-2xl opacity-60 active:opacity-100 transition-opacity"><i class="fa-solid fa-backward-step"></i></button>
                    <button onclick="togglePlay()" id="f-play-btn" class="w-24 h-24 bg-white text-black rounded-full text-4xl flex items-center justify-center shadow-[0_0_30px_rgba(255,255,255,0.2)] active:scale-90 transition-transform">
                        <i class="fa-solid fa-play ml-1"></i>
                    </button>
                    <button onclick="nextTrack()" class="text-2xl opacity-60 active:opacity-100 transition-opacity"><i class="fa-solid fa-forward-step"></i></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const GITHUB_USER = 'allkks', REPO_NAME = 'mus';
        let db = { artists: [], tracks: [] }, currentIdx = -1, currentList = [];
        const audio = document.getElementById('audio');

        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                render();
            } catch (e) {
                console.error("Ошибка загрузки БД", e);
            }
        }

        function render() {
            // Рендер списка артистов
            document.getElementById('artist-list').innerHTML = db.artists.map(a => `
                <div onclick="openArtist('${a.id}')" class="flex flex-col items-center gap-3 active:scale-95 transition-transform snap-center min-w-[90px]">
                    <div class="artist-card-img w-20 h-20 rounded-full overflow-hidden border-2 border-white/5">
                        <img src="${a.img || 'https://api.dicebear.com/7.x/initials/svg?seed='+a.name}" class="w-full h-full object-cover">
                    </div>
                    <span class="text-[10px] font-extrabold text-neutral-400 uppercase tracking-tighter text-center leading-tight">${a.name}</span>
                </div>
            `).join('');

            // Рендер популярных треков на главной
            renderTracks('track-list', db.tracks);
        }

        function renderTracks(containerId, list) {
            const container = document.getElementById(containerId);
            container.innerHTML = list.map((t, idx) => {
                const isPlaying = currentList[currentIdx]?.url === t.url;
                return `
                    <div onclick='playTrack(${idx}, ${JSON.stringify(list).replace(/'/g, "&apos;")})' 
                         class="track-card p-3 flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <div class="relative w-12 h-12 flex-shrink-0">
                                <img src="${t.cover || 'https://api.dicebear.com/7.x/shapes/svg?seed='+t.title}" class="w-full h-full rounded-xl object-cover">
                                ${isPlaying && !audio.paused ? '<div class="absolute inset-0 bg-purple-600/40 rounded-xl flex items-center justify-center"><i class="fa-solid fa-volume-high text-[10px]"></i></div>' : ''}
                            </div>
                            <div class="overflow-hidden">
                                <h4 class="font-bold text-sm truncate">${t.title}</h4>
                                <p class="text-[10px] text-neutral-500 font-bold uppercase tracking-tight">${t.album || 'Single'}</p>
                            </div>
                        </div>
                        <div class="text-neutral-600 text-xs px-2">
                             <i class="fa-solid ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play'} text-purple-500"></i>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openArtist(id) {
            const artist = db.artists.find(a => a.id === id);
            const tracks = db.tracks.filter(t => t.artistId === id);
            
            document.getElementById('ap-name').innerText = artist.name;
            document.getElementById('ap-banner').style.background = `url(${artist.img}) center/cover`;
            
            // Группировка
            const albums = [...new Set(tracks.map(t => t.album))];
            let html = "";
            
            // Сначала блок "Все треки" (популярное)
            html += `<h3 class="text-xs font-black text-neutral-500 uppercase tracking-[0.2em] mb-4 mt-2">Популярные треки</h3>`;
            html += `<div id="ap-all-tracks" class="space-y-3 mb-10"></div>`;
            
            // Потом по альбомам
            albums.forEach(al => {
                if(!al) return;
                html += `<div class="flex items-center gap-3 mb-4 mt-8">
                            <div class="h-px flex-1 bg-white/10"></div>
                            <h3 class="text-[10px] font-black text-purple-500 uppercase tracking-[0.3em]">${al}</h3>
                            <div class="h-px flex-1 bg-white/10"></div>
                         </div>`;
                html += `<div id="album-${al.replace(/\s/g, '')}" class="space-y-3"></div>`;
            });

            document.getElementById('ap-content').innerHTML = html;
            document.getElementById('artist-page').classList.add('active');

            // Рендер после вставки HTML
            setTimeout(() => {
                renderTracks('ap-all-tracks', tracks);
                albums.forEach(al => {
                    if(!al) return;
                    const alTracks = tracks.filter(t => t.album === al);
                    renderTracks(`album-${al.replace(/\s/g, '')}`, alTracks);
                });
            }, 50);
        }

        function closeArtist() { document.getElementById('artist-page').classList.remove('active'); }

        function playTrack(idx, list) {
            if(currentList === list && currentIdx === idx) { 
                togglePlay(); 
                return; 
            }
            
            currentList = list; 
            currentIdx = idx;
            const track = currentList[currentIdx];
            
            audio.src = track.url; 
            audio.play().catch(e => console.log("Play blocked by browser"));
            
            const bar = document.getElementById('player-bar');
            if(bar.classList.contains('hidden')) {
                bar.classList.remove('hidden');
                bar.classList.add('player-appear');
            }
            
            updateUI();
        }

        function togglePlay() { 
            if(audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
            updateUI(); 
        }

        function updateUI() {
            const t = currentList[currentIdx];
            if(!t) return;

            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            
            // Mini player
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-subtitle').innerText = t.album || 'Single';
            document.getElementById('p-img').src = t.cover || '';
            document.getElementById('p-play-btn').innerHTML = `<i class="fa-solid ${icon}${audio.paused ? ' ml-0.5' : ''}"></i>`;
            document.getElementById('p-mini-wave').style.opacity = audio.paused ? '0' : '1';

            // Full player
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = t.album || 'Single Release';
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon}${audio.paused ? ' ml-1' : ''}"></i>`;

            // Обновление списков (активный трек)
            renderTracks('track-list', db.tracks);
            
            // Если открыта страница артиста, обновляем и там
            const apAll = document.getElementById('ap-all-tracks');
            if(apAll) {
                const artistId = db.tracks.find(tr => tr.url === t.url)?.artistId;
                const artistTracks = db.tracks.filter(tr => tr.artistId === artistId);
                renderTracks('ap-all-tracks', artistTracks);
            }
        }

        function formatTime(sec) {
            if(!sec) return "0:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function openFullPlayer() { 
            document.getElementById('full-player').style.transform = 'translateY(0)'; 
        }
        
        function closeFullPlayer() { 
            document.getElementById('full-player').style.transform = 'translateY(100%)'; 
        }

        function seek(e) { 
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            audio.currentTime = (x / rect.width) * audio.duration; 
        }

        audio.ontimeupdate = () => { 
            const progress = (audio.currentTime / audio.duration * 100);
            document.getElementById('f-progress').style.width = progress + '%'; 
            document.getElementById('f-current-time').innerText = formatTime(audio.currentTime);
            if(audio.duration) {
                document.getElementById('f-duration').innerText = formatTime(audio.duration);
            }
        };

        audio.onended = () => { 
            if(currentIdx < currentList.length - 1) {
                playTrack(currentIdx + 1, currentList); 
            } else {
                audio.pause();
                updateUI();
            }
        };

        function prevTrack() { if(currentIdx > 0) playTrack(currentIdx - 1, currentList); }
        function nextTrack() { if(currentIdx < currentList.length - 1) playTrack(currentIdx + 1, currentList); }

        // Start
        init();
    </script>
</body>
</html>
