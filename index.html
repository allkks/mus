<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { --accent: #9333ea; --bg-dark: #0f0a1e; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 0% 0%, rgba(147, 51, 234, 0.15) 0px, transparent 50%);
            color: white; -webkit-user-select: none; overflow-x: hidden;
        }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .track-item { background: rgba(255, 255, 255, 0.03); border-radius: 16px; transition: all 0.2s; }
        .track-item.playing { background: rgba(147, 51, 234, 0.2); border: 1px solid rgba(147, 51, 234, 0.4); }

        /* Full Player Animation */
        #full-player {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0f0a1e; z-index: 100;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #full-player.active { transform: translateY(0); }

        .progress-container { height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; position: relative; cursor: pointer; }
        .progress-fill { height: 100%; background: #9333ea; border-radius: 2px; width: 0%; position: relative; }
        .progress-fill::after {
            content: ''; position: absolute; right: -6px; top: -4px;
            width: 12px; height: 12px; background: white; border-radius: 50%; box-shadow: 0 0 10px #9333ea;
        }
        
        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <div class="px-6 pt-8 pb-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-purple-500 p-0.5">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Music" class="w-full h-full rounded-full bg-purple-900">
            </div>
            <h1 class="text-xl font-black italic tracking-tighter text-white">UNCENSORED</h1>
        </div>
    </div>

    <!-- Navigation Back -->
    <div id="back-nav" class="px-6 mb-4 hidden">
        <button onclick="goBack()" class="flex items-center gap-2 text-purple-400 font-bold text-sm">
            <i class="fa-solid fa-arrow-left"></i> Назад
        </button>
    </div>

    <!-- Page Titles -->
    <div class="px-6 mb-6">
        <h2 id="current-title" class="text-3xl font-extrabold">Библиотека</h2>
        <p id="current-subtitle" class="text-gray-500 text-sm">Выберите жанр музыки</p>
    </div>

    <!-- Main Content Area -->
    <div id="main-grid" class="px-6 grid grid-cols-2 gap-4">
        <!-- Контент загружается сюда через JS -->
    </div>

    <!-- Mini Player Bar -->
    <div id="player-bar" class="fixed bottom-6 left-4 right-4 z-50 translate-y-[200%] transition-transform duration-500">
        <div class="glass rounded-3xl p-3 shadow-2xl flex items-center justify-between" onclick="openFullPlayer()">
            <div class="flex items-center gap-3 overflow-hidden">
                <img id="p-img" src="" class="w-12 h-12 rounded-xl object-cover bg-purple-900">
                <div class="overflow-hidden">
                    <h4 id="p-title" class="font-bold text-sm truncate">...</h4>
                    <p id="p-artist" class="text-[10px] text-gray-400 truncate">...</p>
                </div>
            </div>
            <button id="p-play-btn" onclick="event.stopPropagation(); togglePlay();" class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center">
                <i class="fa-solid fa-play ml-0.5"></i>
            </button>
        </div>
    </div>

    <!-- Full Player Modal -->
    <div id="full-player" class="p-8 flex flex-col justify-between">
        <div class="flex justify-between items-center">
            <button onclick="closeFullPlayer()" class="w-10 h-10 glass rounded-full flex items-center justify-center">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="text-center">
                <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Сейчас играет</p>
                <p id="f-artist-top" class="text-xs text-purple-400">Исполнитель</p>
            </div>
            <div class="w-10"></div>
        </div>

        <div class="flex flex-col items-center">
            <img id="f-img" src="" class="w-full aspect-square rounded-[40px] shadow-2xl shadow-purple-900/40 object-cover mb-10 bg-purple-900">
            <div class="text-left w-full px-2">
                <h2 id="f-title" class="text-2xl font-bold truncate text-white">Название трека</h2>
                <p id="f-artist" class="text-lg text-gray-400 mt-1">Исполнитель</p>
            </div>
        </div>

        <div class="w-full">
            <div class="progress-container mb-2" id="f-progress-click">
                <div id="f-progress-fill" class="progress-fill"></div>
            </div>
            <div class="flex justify-between text-[10px] text-gray-500 font-mono mb-8">
                <span id="f-time-curr">0:00</span>
                <span id="f-time-total">0:00</span>
            </div>

            <div class="flex justify-between items-center px-4">
                <button class="text-xl opacity-40"><i class="fa-solid fa-shuffle"></i></button>
                <button onclick="prevTrack()" class="text-3xl"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" id="f-play-btn" class="w-20 h-20 bg-white text-black rounded-full text-3xl flex items-center justify-center shadow-xl">
                    <i class="fa-solid fa-play ml-1"></i>
                </button>
                <button onclick="nextTrack()" class="text-3xl"><i class="fa-solid fa-forward-step"></i></button>
                <button class="text-xl opacity-40"><i class="fa-solid fa-repeat"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        // --- CONFIG ---
        const GITHUB_USER = 'ТВОЙ_ЛОГИН'; // Твой ник на GitHub
        const REPO_NAME = 'ТВОЙ_РЕПО';   // Твой репозиторий
        const BRANCH = 'main';
        const ROOT_PATH = 'all_music';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0f0a1e';

        const audio = document.getElementById('audio-engine');
        let pathStack = [ROOT_PATH];
        let playlist = [];
        let currentTrackIdx = -1;
        let currentLevelItems = [];

        // Initialization
        async function init() {
            await loadFolder(ROOT_PATH);
        }

        async function loadFolder(path) {
            showLoader();
            try {
                const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    currentLevelItems = data;
                    renderUI();
                }

                // Update Header
                const parts = path.split('/');
                const folderName = parts[parts.length - 1];
                document.getElementById('current-title').innerText = folderName === ROOT_PATH ? 'Библиотека' : decodeURIComponent(folderName);
                document.getElementById('current-subtitle').innerText = pathStack.length === 1 ? 'Выберите жанр' : (pathStack.length === 2 ? 'Исполнители' : 'Треки');
                document.getElementById('back-nav').classList.toggle('hidden', pathStack.length === 1);
            } catch (e) {
                console.error("Fetch error:", e);
                document.getElementById('main-grid').innerHTML = '<p class="text-red-500 col-span-2 text-center">Ошибка загрузки. Проверьте настройки GitHub.</p>';
            }
        }

        function renderUI() {
            const container = document.getElementById('main-grid');
            container.innerHTML = '';
            
            const folders = currentLevelItems.filter(i => i.type === 'dir');
            const files = currentLevelItems.filter(i => i.name.endsWith('.mp3'));

            if (folders.length > 0) {
                container.className = "px-6 grid grid-cols-2 gap-4";
                folders.forEach(folder => {
                    const isArtist = pathStack.length === 2;
                    const img = isArtist 
                        ? `https://api.dicebear.com/7.x/micah/svg?seed=${folder.name}` 
                        : `https://api.dicebear.com/7.x/shapes/svg?seed=${folder.name}`;

                    container.innerHTML += `
                        <div onclick="enterFolder('${folder.path}')" class="glass p-4 rounded-[32px] flex flex-col items-center gap-3 active:scale-95 transition-all">
                            <img src="${img}" class="w-24 h-24 rounded-2xl bg-indigo-900 shadow-xl">
                            <span class="font-bold text-xs text-center truncate w-full">${folder.name}</span>
                        </div>
                    `;
                });
            } else if (files.length > 0) {
                container.className = "px-6 space-y-3";
                playlist = files;
                files.forEach((file, idx) => {
                    const isPlaying = currentTrackIdx !== -1 && playlist[currentTrackIdx].sha === file.sha;
                    container.innerHTML += `
                        <div onclick="playMusic(${idx})" class="track-item flex items-center justify-between p-3 ${isPlaying ? 'playing' : ''}">
                            <div class="flex items-center gap-4 overflow-hidden">
                                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center text-purple-500">
                                    <i class="fa-solid fa-play text-xs"></i>
                                </div>
                                <div class="overflow-hidden">
                                    <h4 class="font-bold text-sm truncate text-white">${file.name.replace('.mp3', '')}</h4>
                                    <p class="text-[10px] text-gray-500">Нажмите, чтобы играть</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function enterFolder(path) {
            pathStack.push(path);
            loadFolder(path);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function goBack() {
            if (pathStack.length > 1) {
                pathStack.pop();
                loadFolder(pathStack[pathStack.length - 1]);
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function playMusic(idx) {
            currentTrackIdx = idx;
            const track = playlist[idx];
            
            audio.src = track.download_url;
            audio.play();
            
            updatePlayerUI();
            document.getElementById('player-bar').classList.remove('translate-y-[200%]');
            renderUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function togglePlay() {
            if (audio.paused) audio.play();
            else audio.pause();
            updatePlayerUI();
            renderUI();
        }

        function updatePlayerUI() {
            if (currentTrackIdx === -1) return;
            const track = playlist[currentTrackIdx];
            const name = track.name.replace('.mp3', '');
            const artist = pathStack[pathStack.length - 1].split('/').pop();
            const icon = audio.paused ? 'fa-play' : 'fa-pause';

            document.getElementById('p-title').innerText = name;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = `https://api.dicebear.com/7.x/identicon/svg?seed=${name}`;
            document.getElementById('p-play-btn').innerHTML = `<i class="fa-solid ${icon} ${audio.paused?'ml-0.5':''}"></i>`;

            document.getElementById('f-title').innerText = name;
            document.getElementById('f-artist').innerText = artist;
            document.getElementById('f-artist-top').innerText = artist;
            document.getElementById('f-img').src = `https://api.dicebear.com/7.x/identicon/svg?seed=${name}`;
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon} ${audio.paused?'ml-1':''}"></i>`;
        }

        function nextTrack() {
            if (currentTrackIdx < playlist.length - 1) playMusic(currentTrackIdx + 1);
        }

        function prevTrack() {
            if (currentTrackIdx > 0) playMusic(currentTrackIdx - 1);
        }

        // Helpers
        function showLoader() {
            document.getElementById('main-grid').innerHTML = '<div class="col-span-2 flex justify-center py-20"><i class="fa-solid fa-circle-notch loader text-3xl text-purple-500"></i></div>';
        }

        function openFullPlayer() { document.getElementById('full-player').classList.add('active'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('active'); }

        // Audio Events
        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('f-progress-fill').style.width = perc + '%';
            const fmt = (t) => {
                const m = Math.floor(t / 60) || 0;
                const s = Math.floor(t % 60) || 0;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }
            document.getElementById('f-time-curr').innerText = fmt(audio.currentTime);
            document.getElementById('f-time-total').innerText = fmt(audio.duration);
        };

        audio.onplay = () => updatePlayerUI();
        audio.onpause = () => updatePlayerUI();
        audio.onended = () => nextTrack();

        document.getElementById('f-progress-click').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        init();
    </script>
</body>
</html>
