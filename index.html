<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        :root { --accent: #9333ea; --bg: #0b0714; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; -webkit-user-select: none; overflow-x: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .chip { padding: 10px 22px; border-radius: 16px; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.05); white-space: nowrap; transition: 0.3s; }
        .chip.active { background: var(--accent); box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4); }

        .track-card { background: rgba(255,255,255,0.03); border-radius: 24px; transition: 0.2s; }
        .track-card.playing { background: rgba(147, 51, 234, 0.12); border: 1px solid rgba(147, 51, 234, 0.3); }

        #artist-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 80; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
        #artist-page.active { transform: translateX(0); }

        #full-player { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 100; transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #full-player.active { transform: translateY(0); }
        
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body class="pb-40">

    <!-- HEADER -->
    <div class="px-6 pt-12 pb-6 flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter text-white">UNCENSORED</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleAdmin()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-gear"></i></button>
        </div>
    </div>

    <!-- MAIN VIEW -->
    <div id="view-home">
        <!-- Search -->
        <div class="px-6 mb-8">
            <div class="glass flex items-center px-4 py-3 rounded-2xl">
                <i class="fa-solid fa-magnifying-glass text-gray-500 mr-3"></i>
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="Трек, артист или жанр..." class="bg-transparent w-full outline-none text-sm">
            </div>
        </div>

        <!-- Genres -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar px-6 mb-10" id="genre-list">
            <button onclick="filterGenre('All')" class="chip active">🔥 Все</button>
            <button onclick="filterGenre('Rock')" class="chip">🎸 Рок</button>
            <button onclick="filterGenre('Rap')" class="chip">🎤 Рэп</button>
            <button onclick="filterGenre('Pop')" class="chip">✨ Поп</button>
        </div>

        <!-- Artists slider -->
        <div class="px-6 mb-10">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest mb-5">Популярные Артисты</h3>
            <div id="artist-slider" class="flex gap-6 overflow-x-auto no-scrollbar"></div>
        </div>

        <!-- Tracks List -->
        <div class="px-6">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest mb-5">Рекомендации</h3>
            <div id="tracks-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- ARTIST PAGE -->
    <div id="artist-page" class="no-scrollbar">
        <div class="relative h-[350px]">
            <img id="ap-img" src="" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#0b0714]/60 to-[#0b0714]"></div>
            <button onclick="closeArtist()" class="absolute top-12 left-6 w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="absolute bottom-6 px-6">
                <h2 id="ap-name" class="text-4xl font-black mb-2"></h2>
                <p id="ap-desc" class="text-gray-400 text-xs leading-relaxed"></p>
            </div>
        </div>
        <div class="px-6 pt-6 pb-40">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest mb-6">Популярные треки</h3>
            <div id="ap-tracks" class="space-y-4"></div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-view" class="hidden px-6 pb-20">
        <h2 class="text-2xl font-black mb-8 text-purple-500">Система управления</h2>
        
        <div class="glass p-6 rounded-[35px] mb-8">
            <div id="gh-auth" class="mb-6 pb-6 border-b border-white/10">
                <p class="text-[10px] font-bold text-purple-400 mb-3 uppercase tracking-widest">GitHub Token</p>
                <input id="gh-token" type="password" placeholder="ghp_..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-purple-500 mb-4">
                <button onclick="saveToGithub()" id="save-btn" class="w-full bg-green-600 py-4 rounded-2xl font-black text-xs shadow-lg">СОХРАНИТЬ ВСЕ ИЗМЕНЕНИЯ</button>
            </div>

            <p class="text-[10px] font-bold text-gray-400 mb-4 uppercase">Добавить Контент</p>
            <input id="adm-name" type="text" placeholder="Имя / Название" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-3 outline-none text-sm">
            <input id="adm-img" type="text" placeholder="URL фото / Обложки" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-3 outline-none text-sm">
            <input id="adm-url" type="text" placeholder="URL MP3 (только для трека)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-3 outline-none text-sm">
            <textarea id="adm-desc" placeholder="Описание (только для артиста)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-3 outline-none text-sm h-20"></textarea>
            
            <div class="flex gap-3 mt-4">
                <button onclick="addArtistAdmin()" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-xs">КАК АРТИСТА</button>
                <button onclick="addTrackAdmin()" class="flex-1 bg-purple-600 py-4 rounded-2xl font-black text-xs">КАК ТРЕК</button>
            </div>
        </div>

        <div id="admin-list" class="space-y-3"></div>
    </div>

    <!-- MINI PLAYER -->
    <div id="mini-player" class="fixed bottom-6 left-4 right-4 z-[90] translate-y-[200%] transition-transform duration-500">
        <div class="glass rounded-[30px] p-3 flex items-center justify-between" onclick="openFullPlayer()">
            <div class="flex items-center gap-4 overflow-hidden">
                <img id="m-img" src="" class="w-12 h-12 rounded-2xl object-cover bg-purple-900 shadow-lg">
                <div class="overflow-hidden">
                    <h4 id="m-title" class="font-bold text-sm truncate"></h4>
                    <p id="m-artist" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest truncate"></p>
                </div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="m-play-btn" class="w-11 h-11 rounded-full bg-white text-black flex items-center justify-center shadow-lg"><i class="fa-solid fa-play"></i></button>
        </div>
    </div>

    <!-- FULL PLAYER -->
    <div id="full-player" class="p-10 flex flex-col justify-between">
        <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
        <div class="flex flex-col items-center">
            <img id="f-img" src="" class="w-full aspect-square rounded-[60px] shadow-2xl object-cover bg-purple-900 shadow-purple-900/40 mb-12">
            <div class="w-full text-center">
                <h2 id="f-title" class="text-3xl font-black truncate px-4"></h2>
                <p id="f-artist" class="text-xl text-purple-500 font-bold mt-2 uppercase tracking-widest"></p>
            </div>
        </div>
        <div class="w-full">
            <div class="h-1.5 bg-white/10 rounded-full mb-4" id="p-seek" onclick="seek(event)"><div id="f-progress" class="progress-fill"></div></div>
            <div class="flex justify-between text-[10px] font-bold text-gray-600 mb-10 tracking-widest"><span id="f-time-curr">0:00</span><span id="f-time-total">0:00</span></div>
            <div class="flex justify-around items-center">
                <button onclick="prevTrack()" class="text-3xl opacity-80"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" id="f-play-btn" class="w-24 h-24 bg-white text-black rounded-full text-4xl flex items-center justify-center shadow-2xl"><i class="fa-solid fa-play ml-1"></i></button>
                <button onclick="nextTrack()" class="text-3xl opacity-80"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // --- SETTINGS ---
        const GITHUB_USER = 'allkks';
        const REPO_NAME = 'mus';
        const FILE_PATH = 'database.json';

        let database = { artists: [], tracks: [] };
        let filteredTracks = [];
        let currentPlaylist = [];
        let currentIdx = -1;
        let isAdmin = false;
        const audio = document.getElementById('audio');

        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${FILE_PATH}?t=${Date.now()}`);
                database = await res.json();
                filteredTracks = database.tracks;
                render();
                if(localStorage.getItem('gh_token')) document.getElementById('gh-token').value = localStorage.getItem('gh_token');
            } catch(e) { console.error("Database error"); }
        }

        function render() {
            // Artists
            document.getElementById('artist-slider').innerHTML = database.artists.map(a => `
                <div onclick="openArtist('${a.id}')" class="flex flex-col items-center gap-3 flex-shrink-0 active:scale-90 transition-transform">
                    <img src="${a.img}" class="w-24 h-24 rounded-full object-cover border-2 border-purple-500/20 shadow-xl bg-purple-900">
                    <span class="text-[10px] font-black text-gray-500 uppercase text-center w-24 truncate tracking-tighter">${a.name}</span>
                </div>
            `).join('');

            // Home Tracks
            renderTrackList('tracks-list', filteredTracks);

            // Admin List
            if(isAdmin) {
                document.getElementById('admin-list').innerHTML = `
                    <p class="text-[10px] font-black text-purple-500 mb-4 uppercase">Список управления</p>
                    ${database.tracks.map((t, i) => `<div class="glass p-4 rounded-2xl flex justify-between text-xs mb-2"><span>${t.title}</span><button onclick="deleteItem('tracks', ${i})" class="text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join('')}
                    ${database.artists.map((a, i) => `<div class="glass p-4 rounded-2xl flex justify-between text-xs mb-2 border-l-4 border-indigo-500"><span>Артист: ${a.name}</span><button onclick="deleteItem('artists', ${i})" class="text-red-500"><i class="fa-solid fa-trash"></i></button></div>`).join('')}
                `;
            }
        }

        function renderTrackList(containerId, list) {
            document.getElementById(containerId).innerHTML = list.map((t, idx) => {
                const isPlaying = currentIdx !== -1 && currentPlaylist[currentIdx]?.id === t.id;
                const artist = database.artists.find(a => a.id === t.artistId) || { name: 'Unknown', img: '' };
                return `
                    <div onclick="playFromList('${containerId}', ${idx})" class="track-card p-5 flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-5 overflow-hidden">
                            <img src="${t.cover || artist.img}" class="w-14 h-14 rounded-2xl object-cover bg-purple-900 shadow-lg">
                            <div class="overflow-hidden">
                                <h4 class="font-bold text-sm truncate mb-1">${t.title}</h4>
                                <p class="text-[10px] text-purple-400 font-black uppercase tracking-widest">${artist.name}</p>
                            </div>
                        </div>
                        <i class="fa-solid ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play'} text-purple-500 text-xs"></i>
                    </div>
                `;
            }).join('');
        }

        // --- NAVIGATION ---
        function openArtist(id) {
            const artist = database.artists.find(a => a.id === id);
            const artistTracks = database.tracks.filter(t => t.artistId === id);
            
            document.getElementById('ap-img').src = artist.img;
            document.getElementById('ap-name').innerText = artist.name;
            document.getElementById('ap-desc').innerText = artist.desc || '';
            
            renderTrackList('ap-tracks', artistTracks);
            document.getElementById('artist-page').classList.add('active');
        }

        function closeArtist() { document.getElementById('artist-page').classList.remove('active'); }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            filteredTracks = database.tracks.filter(t => {
                const artist = database.artists.find(a => a.id === t.artistId)?.name.toLowerCase() || "";
                return t.title.toLowerCase().includes(query) || artist.includes(query) || t.genre.toLowerCase().includes(query);
            });
            render();
        }

        // --- PLAYER ---
        function playFromList(containerId, idx) {
            let targetList = [];
            if(containerId === 'tracks-list') targetList = filteredTracks;
            if(containerId === 'ap-tracks') {
                const currentArtistId = database.artists.find(a => a.name === document.getElementById('ap-name').innerText).id;
                targetList = database.tracks.filter(t => t.artistId === currentArtistId);
            }

            if(currentPlaylist === targetList && currentIdx === idx) return togglePlay();
            
            currentPlaylist = targetList;
            currentIdx = idx;
            const track = currentPlaylist[currentIdx];
            
            audio.src = track.url;
            audio.play();
            updateUI(track);
            document.getElementById('mini-player').classList.remove('translate-y-[200%]');
            render();
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        function togglePlay() {
            audio.paused ? audio.play() : audio.pause();
            updateUI(currentPlaylist[currentIdx]);
            render();
        }

        function updateUI(t) {
            const artist = database.artists.find(a => a.id === t.artistId) || { name: 'Unknown', img: '' };
            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            
            document.getElementById('m-title').innerText = t.title;
            document.getElementById('m-artist').innerText = artist.name;
            document.getElementById('m-img').src = t.cover || artist.img;
            document.getElementById('m-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = artist.name;
            document.getElementById('f-img').src = t.cover || artist.img;
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon} ${audio.paused ? 'ml-1' : ''}"></i>`;
        }

        // --- ADMIN ---
        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('view-home').classList.toggle('hidden', isAdmin);
            document.getElementById('admin-view').classList.toggle('hidden', !isAdmin);
            if(isAdmin) render();
        }

        function addArtistAdmin() {
            const name = document.getElementById('adm-name').value;
            const img = document.getElementById('adm-img').value;
            const desc = document.getElementById('adm-desc').value;
            if(!name || !img) return alert("Имя и Фото обязательны!");
            
            const id = name.toLowerCase().replace(/\s+/g, '-');
            database.artists.push({ id, name, img, desc });
            alert("Артист добавлен! Сохрани изменения.");
            render();
        }

        function addTrackAdmin() {
            const title = document.getElementById('adm-name').value;
            let url = document.getElementById('adm-url').value;
            const cover = document.getElementById('adm-img').value;
            const genre = prompt("Жанр (Rock, Rap, Pop):");
            const artistName = prompt("Имя артиста (точно как в списке):");
            
            if(!title || !url || !artistName) return alert("Заполни всё!");
            if (url.includes('github.com')) url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');

            const artistId = database.artists.find(a => a.name === artistName)?.id;
            if(!artistId) return alert("Сначала создай артиста!");

            database.tracks.push({ id: Date.now().toString(), title, artistId, genre, url, cover });
            alert("Трек добавлен!");
            render();
        }

        async function saveToGithub() {
            const token = document.getElementById('gh-token').value;
            if(!token) return alert("Token!");
            localStorage.setItem('gh_token', token);

            const btn = document.getElementById('save-btn');
            btn.innerText = "ПУБЛИКАЦИЯ...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const { sha } = await res.json();
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(database, null, 2))));
                
                await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update database", content, sha })
                });
                alert("Опубликовано!");
                toggleAdmin();
            } catch(e) { alert("Ошибка!"); }
            btn.innerText = "СОХРАНИТЬ ВСЕ ИЗМЕНЕНИЯ";
        }

        function deleteItem(type, idx) {
            database[type].splice(idx, 1);
            render();
        }

        // --- HELPERS ---
        function openFullPlayer() { document.getElementById('full-player').classList.add('active'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('active'); }
        function nextTrack() { if(currentIdx < currentPlaylist.length - 1) playFromList('', currentIdx + 1); }
        function prevTrack() { if(currentIdx > 0) playFromList('', currentIdx - 1); }
        function seek(e) { audio.currentTime = (e.clientX - 40) / (window.innerWidth - 80) * audio.duration; }
        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration * 100) || 0;
            document.getElementById('f-progress').style.width = p + '%';
            const fmt = t => Math.floor(t/60) + ":" + Math.floor(t%60).toString().padStart(2,'0');
            document.getElementById('f-time-curr').innerText = fmt(audio.currentTime);
            document.getElementById('f-time-total').innerText = fmt(audio.duration || 0);
        };
        audio.onended = () => nextTrack();

        init();
    </script>
</body>
</html>
