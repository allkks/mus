<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored Music 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .animate-bounce-subtle { animation: bounce-subtle 3s infinite ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #080414; color: #f3f4f6; }
    </style>
</head>
<body class="min-h-screen font-sans pb-40">

    <!-- Фоновое свечение -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-900/20 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-[#080414]/80 p-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 p-[2px]">
                <div class="w-full h-full rounded-full bg-[#080414] flex items-center justify-center overflow-hidden">
                    <i class="fa fa-user text-purple-400"></i>
                </div>
            </div>
            <span class="font-bold text-lg tracking-tight">Uncensored Music <span class="text-orange-500">🔥</span></span>
        </div>
        <button class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition">
            <i class="fa fa-ellipsis-h text-xl"></i>
        </button>
    </header>

    <main class="px-5 space-y-6">
        <!-- Search -->
        <div class="relative group mt-4">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" placeholder="Поиск треков и исполнителей..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500/50 transition-all placeholder:text-gray-600 text-sm">
        </div>

        <!-- Quick Categories -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <button class="flex items-center gap-2 whitespace-nowrap bg-white/5 border border-white/5 rounded-full px-4 py-2 text-sm font-medium">
                <i class="fa fa-fire text-orange-500"></i> Популярное
            </button>
            <button class="flex items-center gap-2 whitespace-nowrap bg-white/5 border border-white/5 rounded-full px-4 py-2 text-sm font-medium">
                ⭐ Лучшее
            </button>
            <button class="flex items-center gap-2 whitespace-nowrap bg-white/5 border border-white/5 rounded-full px-4 py-2 text-sm font-medium">
                🆕 Новинки
            </button>
        </div>

        <!-- Recommendations -->
        <section>
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                Рекомендации <div class="h-[2px] flex-1 bg-white/5 ml-2"></div>
            </h2>
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                <div class="min-w-[160px] aspect-[4/5] rounded-3xl bg-gradient-to-br from-purple-600 to-blue-500 p-5 flex flex-col justify-end relative overflow-hidden group shadow-lg">
                    <i class="fa fa-music absolute top-4 right-4 text-4xl opacity-20"></i>
                    <h3 class="font-black text-2xl leading-tight relative z-10">RAP HITS</h3>
                </div>
                <div class="min-w-[160px] aspect-[4/5] rounded-3xl bg-gradient-to-br from-pink-600 to-purple-600 p-5 flex flex-col justify-end relative overflow-hidden group shadow-lg">
                    <i class="fa fa-bolt absolute top-4 right-4 text-4xl opacity-20"></i>
                    <h3 class="font-black text-2xl leading-tight relative z-10">TOP CHART</h3>
                </div>
            </div>
        </section>

        <!-- Track List -->
        <section id="track-list">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                Топ треков <div class="h-[2px] flex-1 bg-white/5 ml-2"></div>
            </h2>
            <div class="space-y-2" id="playlist">
                <!-- Треки будут здесь -->
            </div>
        </section>
    </main>

    <!-- Floating Bottom Player -->
    <div class="fixed bottom-4 left-4 right-4 z-[100]">
        <div class="bg-[#120c24]/90 backdrop-blur-2xl border border-white/10 rounded-3xl p-4 shadow-2xl">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                    <img id="player-cover" src="https://via.placeholder.com/100" class="w-12 h-12 rounded-xl object-cover ring-1 ring-white/20">
                    <div>
                        <h4 id="player-title" class="font-bold text-sm leading-none mb-1">Выберите трек</h4>
                        <div class="flex items-center gap-2 text-[10px] text-gray-400">
                            <span id="curr-time">0:00</span>
                            <div class="w-24 h-1 bg-white/10 rounded-full relative">
                                <div id="progress-bar" class="absolute top-0 left-0 h-full bg-purple-500 rounded-full" style="width: 0%"></div>
                            </div>
                            <span id="total-time">0:00</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="play-btn" class="w-11 h-11 rounded-full bg-white text-black flex items-center justify-center shadow-lg">
                        <i class="fa fa-play ml-1"></i>
                    </button>
                </div>
            </div>
            
            <!-- Nav Bar -->
            <div class="flex justify-around pt-2 border-t border-white/5 mt-2">
                <button class="flex flex-col items-center gap-1 text-purple-500"><i class="fa fa-home text-lg"></i><span class="text-[8px] font-bold">Главная</span></button>
                <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa fa-search text-lg"></i><span class="text-[8px] font-bold">Поиск</span></button>
                <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa fa-heart text-lg"></i><span class="text-[8px] font-bold">Любимое</span></button>
                <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa fa-cog text-lg"></i><span class="text-[8px] font-bold">Настройки</span></button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tracks = [
            { id: 1, title: 'Деньги', artist: 'Kizaru', image: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=100&h=100&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
            { id: 2, title: 'Goosebumps', artist: 'Travis Scott', image: 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=100&h=100&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
            { id: 3, title: 'Life Is Good', artist: 'Future ft. Drake', image: 'https://images.unsplash.com/photo-1514525253361-bee8718a74a2?w=100&h=100&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' }
        ];

        const playlist = document.getElementById('playlist');
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const progressBar = document.getElementById('progress-bar');

        function renderTracks() {
            playlist.innerHTML = tracks.map((t, i) => `
                <div class="flex items-center justify-between p-3 rounded-2xl bg-white/[0.02] border border-transparent active:border-white/10 transition-all" onclick="playTrack(${i})">
                    <div class="flex items-center gap-4">
                        <span class="text-xs font-bold text-gray-600 w-4">${i+1}</span>
                        <img src="${t.image}" class="w-12 h-12 rounded-xl object-cover">
                        <div>
                            <h4 class="font-semibold text-sm">${t.title}</h4>
                            <p class="text-xs text-gray-500">${t.artist}</p>
                        </div>
                    </div>
                    <i class="fa fa-play text-gray-600"></i>
                </div>
            `).join('');
        }

        function playTrack(index) {
            const track = tracks[index];
            audio.src = track.url;
            audio.play();
            
            document.getElementById('player-title').innerText = track.title;
            document.getElementById('player-cover').src = track.image;
            playBtn.innerHTML = '<i class="fa fa-pause"></i>';
            tg.HapticFeedback.impactOccurred('medium');
        }

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.innerHTML = '<i class="fa fa-pause"></i>'; }
            else { audio.pause(); playBtn.innerHTML = '<i class="fa fa-play ml-1"></i>'; }
        };

        audio.ontimeupdate = () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = progress + '%';
            
            // Обновление времени
            const formatTime = (s) => Math.floor(s / 60) + ':' + ('0' + Math.floor(s % 60)).slice(-2);
            document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
            if(audio.duration) document.getElementById('total-time').innerText = formatTime(audio.duration);
        };

        renderTracks();
    </script>
</body>
</html>
