<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .artist-card:hover img { transform: scale(1.05); }
        .active-page { display: block !important; }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent cursor-pointer" onclick="showPage('home')">
            MUSIC PLATFORM
        </h1>
        <div id="search" class="hidden md:block">
            <input type="text" placeholder="Поиск треков..." class="bg-slate-800 rounded-full px-4 py-2 border border-slate-700 focus:outline-none focus:border-cyan-500">
        </div>
    </header>

    <main class="container mx-auto p-4">
        
        <!-- ГЛАВНАЯ -->
        <section id="page-home" class="page hidden active-page">
            <h2 class="text-3xl font-bold mb-6">Популярные артисты</h2>
            <div id="artists-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Артисты загрузятся тут -->
            </div>

            <h2 class="text-3xl font-bold mt-12 mb-6">Топ чарт</h2>
            <div id="chart-list" class="space-y-2">
                <!-- Треки загрузятся тут -->
            </div>
        </section>

        <!-- СТРАНИЦА АРТИСТА -->
        <section id="page-artist" class="page hidden">
            <div id="artist-header" class="relative h-64 md:h-96 rounded-3xl overflow-hidden mb-8">
                <img id="artist-big-img" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent flex items-end p-8">
                    <h2 id="artist-name" class="text-5xl font-black"></h2>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <h3 class="text-2xl font-bold mb-4">Все треки</h3>
                    <div id="artist-tracks" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-2xl font-bold mb-4">Альбомы</h3>
                    <div id="artist-albums" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- PLAYER BAR -->
    <div class="fixed bottom-0 inset-x-0 glass p-4 border-t border-slate-700">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div id="now-playing-img" class="w-12 h-12 bg-slate-700 rounded-md"></div>
                <div>
                    <div id="now-playing-title" class="font-bold text-sm">Выберите трек</div>
                    <div id="now-playing-artist" class="text-xs text-slate-400">---</div>
                </div>
            </div>
            <audio id="main-audio" controls class="w-full max-w-xl h-10"></audio>
        </div>
    </div>

    <script>
        const REPO = "allkks/mus";
        let db = { artists: [], albums: [], tracks: [] };

        async function init() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${REPO}/main/database.json?v=${Math.random()}`);
                db = await response.json();
                renderHome();
            } catch (e) {
                console.error("Ошибка загрузки БД", e);
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function renderHome() {
            const grid = document.getElementById('artists-grid');
            grid.innerHTML = db.artists.map(a => `
                <div class="artist-card cursor-pointer group" onclick="openArtist('${a.name}')">
                    <div class="aspect-square rounded-full overflow-hidden mb-3 border-4 border-slate-800 group-hover:border-cyan-500 transition-all">
                        <img src="${a.img}" class="w-full h-full object-cover transition-transform duration-500" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <p class="text-center font-bold">${a.name}</p>
                </div>
            `).join('');

            const chart = document.getElementById('chart-list');
            chart.innerHTML = db.tracks.slice(0, 10).map(t => renderTrackRow(t)).join('');
        }

        function renderTrackRow(t) {
            return `
                <div class="flex items-center justify-between p-3 hover:bg-slate-800 rounded-xl transition-colors cursor-pointer group" onclick="playTrack('${t.id}')">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-700 rounded flex items-center justify-center group-hover:bg-cyan-600">▶</div>
                        <div>
                            <div class="font-semibold">${t.title}</div>
                            <div class="text-xs text-slate-400">${t.artist}</div>
                        </div>
                    </div>
                    <div class="text-slate-500 text-sm">${t.album}</div>
                </div>
            `;
        }

        function openArtist(name) {
            const artist = db.artists.find(a => a.name === name);
            const tracks = db.tracks.filter(t => t.artist === name);
            const albums = db.albums.filter(a => a.artist === name);

            document.getElementById('artist-name').innerText = artist.name;
            document.getElementById('artist-big-img').src = artist.img;
            
            document.getElementById('artist-tracks').innerHTML = tracks.map(t => renderTrackRow(t)).join('');
            document.getElementById('artist-albums').innerHTML = albums.map(alb => `
                <div class="bg-slate-800 p-4 rounded-2xl flex items-center gap-4">
                    <img src="${alb.cover}" class="w-16 h-16 rounded-lg object-cover">
                    <div>
                        <div class="font-bold">${alb.title}</div>
                        <div class="text-xs text-slate-400">Альбом</div>
                    </div>
                </div>
            `).join('');

            showPage('artist');
        }

        function playTrack(id) {
            const track = db.tracks.find(t => t.id === id);
            const audio = document.getElementById('main-audio');
            
            audio.src = track.url;
            audio.play();
            
            document.getElementById('now-playing-title').innerText = track.title;
            document.getElementById('now-playing-artist').innerText = track.artist;
            // Здесь можно добавить поиск обложки
        }

        init();
    </script>
</body>
</html>
