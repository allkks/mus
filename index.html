<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bg: '#0a0510', accent: '#8a2be2', surface: '#1a1225', 
                        text: '#ffffff', dim: '#b3a9c0', heart: '#ff2d55', brandY: '#ffcc00' 
                    },
                    fontFamily: { sans: ['Manrope', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0510; color: #ffffff; font-family: 'Manrope', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-player { background: rgba(26, 18, 37, 0.98); backdrop-filter: blur(30px); border-top: 1px solid rgba(138, 43, 226, 0.2); }
        .hero-bg { background: linear-gradient(180deg, transparent 0%, rgba(10, 5, 16, 1) 100%); }
        .yandex-gradient { background: linear-gradient(135deg, #8a2be2 0%, #ff2d55 100%); }
        .h-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 10px; }
        .track-column { min-width: 85vw; scroll-snap-align: start; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
        .album-card { min-width: 140px; scroll-snap-align: start; }
        .page { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="selection:bg-accent/30">

    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-80">
        
        <!-- HEADER -->
        <div class="p-6 pt-10 sticky top-0 bg-bg/90 backdrop-blur-xl z-50 flex items-center gap-4">
            <div class="flex-1 flex items-center gap-3 bg-surface/50 border border-white/5 rounded-2xl px-5 py-3 focus-within:border-accent transition-all">
                <i data-lucide="search" class="w-4 h-4 text-dim"></i>
                <input id="search-input" type="text" placeholder="Поиск музыки" class="bg-transparent outline-none w-full text-sm text-white" oninput="handleSearch()">
            </div>
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-accent/20 flex items-center justify-center border border-accent/30 overflow-hidden">
                <!-- Сюда вставится фото юзера -->
                <i data-lucide="user" class="w-5 h-5 text-accent"></i>
            </div>
        </div>

        <!-- HOME -->
        <section id="page-home" class="page p-4">
            <div onclick="playRandom()" class="relative h-52 rounded-[2.5rem] overflow-hidden mb-10 yandex-gradient shadow-2xl p-8 flex flex-col justify-end transform active:scale-95 transition-transform cursor-pointer">
                <div class="absolute top-4 right-8 opacity-20"><i data-lucide="waves" class="w-32 h-32 text-white"></i></div>
                <h2 class="text-4xl font-black italic tracking-tighter leading-none text-white">Моя<br>залупа</h2>
                <div class="absolute bottom-8 right-8 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-xl"><i data-lucide="play" class="fill-black text-black ml-1"></i></div>
            </div>

            <div class="mb-10">
                <h2 onclick="openFullList('Мировой чарт', currentGlobalTracks)" class="text-xl font-bold mb-4 px-2 flex items-center justify-between cursor-pointer">
                    <span class="flex items-center gap-2"><i data-lucide="trending-up" class="w-5 h-5 text-brandY"></i>Мировой чарт</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-dim"></i>
                </h2>
                <div id="home-charts" class="h-scroll no-scrollbar px-2"></div>
            </div>

            <div id="fav-section" class="hidden mb-10">
                <h2 onclick="navTo('full-list', 'Мне нравится')" class="text-xl font-bold mb-4 px-2 flex items-center justify-between text-heart cursor-pointer">
                    <span>Мне нравится</span><i data-lucide="chevron-right" class="w-5 h-5 text-dim"></i>
                </h2>
                <div id="favorites-list" class="h-scroll no-scrollbar px-2"></div>
            </div>

            <div class="mb-10">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] mb-6 px-2 text-dim">Исполнители</h2>
                <div id="home-artists" class="h-scroll no-scrollbar px-2"></div>
            </div>
        </section>

        <!-- PAGE: ARTIST -->
        <section id="page-artist" class="page hidden">
            <div class="relative h-[55vh] w-full flex flex-col justify-end overflow-hidden">
                <img id="artist-view-img" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <button onclick="navTo('home')" class="absolute top-6 left-6 bg-black/40 p-3 rounded-full backdrop-blur-xl border border-white/10 z-10"><i data-lucide="chevron-left" class="text-white"></i></button>
                <div class="relative p-6 pb-8 z-10">
                    <h1 id="artist-view-name" class="text-5xl font-black italic tracking-tighter mb-4 text-white leading-tight"></h1>
                    <button class="bg-brandY text-black px-12 py-4 rounded-full font-black shadow-xl" onclick="playArtistTracks()">СЛУШАТЬ</button>
                </div>
            </div>
            <div class="p-4 mt-4">
                <h2 class="text-xl font-bold mb-4 flex items-center justify-between">Треки <i data-lucide="chevron-right" class="text-dim"></i></h2>
                <div id="artist-view-tracks" class="h-scroll no-scrollbar"></div>
                <h2 class="text-xl font-bold mb-4 mt-8">Альбомы</h2>
                <div id="artist-view-albums" class="h-scroll no-scrollbar"></div>
            </div>
        </section>

        <!-- PAGE: ALBUM -->
        <section id="page-album" class="page hidden">
            <div class="relative h-[45vh] w-full flex flex-col justify-end overflow-hidden">
                <img id="album-view-img" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <button onclick="navTo('artist')" class="absolute top-6 left-6 bg-black/40 p-3 rounded-full backdrop-blur-xl border border-white/10 z-10"><i data-lucide="chevron-left" class="text-white"></i></button>
                <div class="relative p-6 pb-8 z-10 text-center">
                    <h1 id="album-view-title" class="text-3xl font-black text-white mb-1"></h1>
                    <p id="album-view-artist" class="text-dim mb-4"></p>
                    <button class="bg-white text-black px-10 py-3 rounded-full font-bold shadow-xl" onclick="playCurrentAlbum()">СЛУШАТЬ ВСЁ</button>
                </div>
            </div>
            <div class="p-4 space-y-1" id="album-tracks-list"></div>
        </section>

        <section id="page-search" class="page hidden p-6"><div id="search-results" class="space-y-2"></div></section>
        
        <section id="page-full-list" class="page hidden p-6">
            <button onclick="navTo('home')" class="flex items-center gap-2 text-dim mb-6"><i data-lucide="chevron-left"></i> Назад</button>
            <div id="full-list-content" class="space-y-1"></div>
        </section>
    </main>

    <!-- PLAYER (MINI) -->
    <div id="mini-player" onclick="openFullPlayer()" class="glass-player fixed bottom-24 left-2 right-2 rounded-3xl p-3 z-[100] transition-all duration-500 translate-y-[200px] shadow-2xl flex items-center gap-3 cursor-pointer">
        <img id="m-img" class="w-12 h-12 rounded-xl object-cover" src="">
        <div class="flex-1 min-w-0">
            <div id="m-title" class="font-bold text-sm truncate text-white">...</div>
            <div id="m-artist" class="text-dim text-[10px] uppercase">...</div>
        </div>
        <button onclick="event.stopPropagation(); togglePlay()" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
            <i id="m-play-icon" data-lucide="play" class="fill-black w-5 h-5 ml-0.5"></i>
        </button>
    </div>

    <!-- PLAYER (FULL) -->
    <div id="full-player" class="fixed inset-0 bg-bg z-[200] transition-transform duration-500 translate-y-full flex flex-col p-8">
        <div class="flex justify-between items-center mb-10"><button onclick="closeFullPlayer()"><i data-lucide="chevron-down" class="w-8 h-8 text-white"></i></button><span class="text-[10px] font-bold uppercase tracking-widest opacity-30 text-white">Моя волна</span><button><i data-lucide="more-horizontal" class="w-6 h-6 text-white"></i></button></div>
        <div class="flex-1 flex items-center justify-center mb-10"><img id="f-img" class="w-full aspect-square max-w-[320px] rounded-[3rem] object-cover shadow-2xl border border-white/5"></div>
        <div class="flex items-center justify-between mb-8"><div class="flex-1 min-w-0 pr-4"><h2 id="f-title" class="text-3xl font-black italic text-white mb-1 truncate">...</h2><p id="f-artist" class="text-lg text-dim truncate">...</p></div><button onclick="toggleFavorite(currentTrackId)" class="p-2"><i id="f-heart" data-lucide="heart" class="w-8 h-8"></i></button></div>
        <div class="mb-10"><div class="relative h-1 bg-white/10 rounded-full mb-4 cursor-pointer" id="seek-bar" onclick="seek(event)"><div id="f-progress" class="absolute top-0 left-0 h-full bg-white rounded-full"></div><div id="f-handle" class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full" style="left: 0%"></div></div><div class="flex justify-between text-[10px] font-mono text-dim"><span id="f-current-time">0:00</span><span id="f-total-time">0:00</span></div></div>
        <div class="flex items-center justify-around mb-12"><button class="opacity-20 text-white"><i data-lucide="shuffle"></i></button><button onclick="prevTrack()" class="p-2 active:scale-75 transition-all"><i data-lucide="skip-back" class="w-10 h-10 fill-white"></i></button><button onclick="togglePlay()" class="w-24 h-24 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-all"><i id="f-play-icon" data-lucide="play" class="fill-black w-10 h-10 ml-1"></i></button><button onclick="nextTrack()" class="p-2 active:scale-75 transition-all"><i data-lucide="skip-forward" class="w-10 h-10 fill-white"></i></button><button class="opacity-20 text-white"><i data-lucide="repeat"></i></button></div>
    </div>

    <!-- NAVBAR -->
    <div class="fixed bottom-0 left-0 right-0 h-20 bg-bg/80 backdrop-blur-md border-t border-white/5 flex items-center justify-around z-[90]">
        <button id="nav-home" onclick="navTo('home')" class="nav-btn flex flex-col items-center gap-1 text-brandY">
            <i data-lucide="home"></i><span class="text-[9px] font-bold">ГЛАВНАЯ</span>
        </button>
        <button id="nav-fav" onclick="navTo('full-list', 'Мне нравится')" class="nav-btn flex flex-col items-center gap-1 text-dim/40">
            <i data-lucide="heart"></i><span class="text-[9px] font-bold">МОЁ</span>
        </button>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDRxdwpKhy4hn-umuwKLrYfCZ4caafAV_o",
            authDomain: "project-48022103835443054.firebaseapp.com",
            databaseURL: "https://project-48022103835443054-default-rtdb.firebaseio.com",
            projectId: "project-48022103835443054",
            storageBucket: "project-48022103835443054.firebasestorage.app",
            messagingSenderId: "812358314577",
            appId: "1:812358314577:web:a392af88486face13aa670"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.ready();
        const user = tg.initDataUnsafe?.user || { id: "guest", first_name: "Слушатель" };

        let db = { tracks: [], artists: {} };
        let favorites = [];
        let currentGlobalTracks = [];
        let currentTrackId = null;
        let currentPlaylist = [];
        let currentArtistName = '';
        let globalBust = Date.now();
        const audio = document.getElementById('audio-engine');

        window.onload = async () => {
            lucide.createIcons();
            
            // Ставим аватарку юзера
            if (user.photo_url) {
                document.getElementById('user-avatar').innerHTML = `<img src="${user.photo_url}" class="w-full h-full object-cover">`;
            }

            // Загрузка базы
            rtdb.ref('/').on('value', (snap) => {
                const data = snap.val();
                const source = data.music_data || data;
                if(source && source.tracks) {
                    db.tracks = source.tracks;
                    db.artists = source.artists;
                    renderHome();
                    // Если страница 'Мне нравится' открыта, обновляем её
                    const fullListTitle = document.getElementById('full-list-content')?.querySelector('h1')?.innerText;
                    if (fullListTitle === 'Мне нравится') openFullList('Мне нравится', getFavorites());
                }
            });

            initCloudSync();
            listenGlobalCharts();
        };

        function navTo(p, title = '') {
            document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
            document.getElementById('page-' + p).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-brandY', 'text-dim/40'));

            if(p === 'home') {
                document.getElementById('nav-home').classList.replace('text-dim/40', 'text-brandY');
            } else if(title === 'Мне нравится') {
                document.getElementById('nav-fav').classList.replace('text-dim/40', 'text-brandY');
                openFullList(title, getFavorites());
            }
        }

        function groupTracks(tracks) {
            const groups = [];
            for (let i = 0; i < tracks.length; i += 3) groups.push(tracks.slice(i, i + 3));
            return groups;
        }

        function renderHome() {
            if(!db.artists) return;
            document.getElementById('home-artists').innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtistPage('${a.name}')" class="w-32 text-center transform active:scale-90 transition-transform cursor-pointer">
                    <img src="${imgBust(a.img)}" class="w-24 h-24 rounded-full mx-auto object-cover mb-3 shadow-2xl border border-white/5">
                    <div class="text-[10px] font-bold uppercase tracking-widest truncate text-white">${a.name}</div>
                </div>`).join('');
            
            const favs = getFavorites();
            if(favs.length) {
                document.getElementById('fav-section').classList.remove('hidden');
                document.getElementById('favorites-list').innerHTML = groupTracks(favs).map(group => `
                    <div class="track-column">${group.map(t => renderTrackItem(t, 'db.tracks')).join('')}</div>
                `).join('');
            } else document.getElementById('fav-section').classList.add('hidden');
            lucide.createIcons();
        }

        function listenGlobalCharts() {
            rtdb.ref('global_charts').on('value', (snap) => {
                const data = snap.val();
                if (!data || !db.tracks.length) return;
                const sortedIds = Object.keys(data).sort((a, b) => data[b] - data[a]);
                currentGlobalTracks = sortedIds.map(tid => db.tracks.find(x => x.id == tid)).filter(x => x).slice(0, 12);
                
                document.getElementById('home-charts').innerHTML = groupTracks(currentGlobalTracks).map(group => `
                    <div class="track-column">${group.map(t => renderTrackItem(t, 'db.tracks')).join('')}</div>
                `).join('');
                lucide.createIcons();
            });
        }

        function renderTrackItem(t, src) {
            const isFav = favorites.includes(t.id);
            return `
                <div class="flex items-center gap-4 p-2 rounded-xl active:bg-white/5 transition-all cursor-pointer" onclick="playTrack(${t.id}, ${src})">
                    <img src="${imgBust(t.img)}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm text-white truncate">${t.title}</div>
                        <div class="text-[10px] text-dim uppercase truncate">${t.artist}</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation(); toggleFavorite(${t.id})">
                        <i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-heart text-heart' : 'text-dim/20'}"></i>
                    </button>
                </div>`;
        }

        function openArtistPage(name) {
            currentArtistName = name;
            const a = db.artists[name]; if(!a) return;
            navTo('artist');
            document.getElementById('artist-view-img').src = imgBust(a.img);
            document.getElementById('artist-view-name').innerText = a.name;
            document.getElementById('artist-view-tracks').innerHTML = groupTracks(a.tracks || []).map(group => `
                <div class="track-column">${group.map(t => renderTrackItem(t, `db.artists['${name}'].tracks`)).join('')}</div>
            `).join('');
            document.getElementById('artist-view-albums').innerHTML = (a.albums || []).map(alb => `
                <div onclick="openAlbumPage('${name}', '${alb.title}')" class="album-card transform active:scale-95 transition-all cursor-pointer">
                    <img src="${imgBust(alb.cover)}" class="w-36 h-36 rounded-2xl object-cover mb-2 shadow-xl">
                    <div class="text-xs font-bold text-white truncate">${alb.title}</div>
                    <div class="text-[10px] text-dim">${alb.year}</div>
                </div>`).join('');
            lucide.createIcons();
        }

        function openAlbumPage(artistName, albumTitle) {
            const a = db.artists[artistName];
            const album = a.albums.find(x => x.title === albumTitle);
            const albumTracks = a.tracks.filter(t => t.album === albumTitle);
            navTo('album');
            document.getElementById('album-view-img').src = imgBust(album.cover);
            document.getElementById('album-view-title').innerText = albumTitle;
            document.getElementById('album-view-artist').innerText = artistName;
            document.getElementById('album-tracks-list').innerHTML = albumTracks.map(t => renderTrackItem(t, 'db.tracks')).join('');
            lucide.createIcons();
        }

        function initCloudSync() {
            rtdb.ref('users/' + user.id + '/profile').update({ name: user.first_name, username: user.username || "" });
            rtdb.ref('users/' + user.id + '/favorites').on('value', (snap) => {
                const data = snap.val();
                favorites = data ? Object.keys(data).filter(k => data[k] === true).map(Number) : [];
                renderHome();
                updateHeartIcons();
            });
        }

        function toggleFavorite(id) {
            if(!id) return;
            const isFav = favorites.includes(id);
            rtdb.ref('users/' + user.id + '/favorites/' + id).set(!isFav);
        }

        function updateHeartIcons() {
            const isFav = favorites.includes(currentTrackId);
            const btn = document.getElementById('f-heart');
            if (btn) {
                if (isFav) { btn.classList.add('fill-heart', 'text-heart'); btn.classList.remove('text-white'); }
                else { btn.classList.remove('fill-heart', 'text-heart'); btn.classList.add('text-white'); }
            }
            lucide.createIcons();
        }

        function playTrack(id, list) {
            const t = Array.isArray(list) ? list.find(x => x.id === id) : db.tracks.find(x => x.id === id);
            if(!t) return;
            currentTrackId = id;
            currentPlaylist = Array.isArray(list) ? list : db.tracks;
            
            document.getElementById('m-title').innerText = t.title;
            document.getElementById('m-artist').innerText = t.artist;
            document.getElementById('m-img').src = imgBust(t.img);
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('f-img').src = imgBust(t.img);
            
            audio.src = t.url; audio.play();
            document.getElementById('mini-player').classList.remove('translate-y-[200px]');
            updatePlayIcons(true);
            rtdb.ref('global_charts/' + id).transaction(c => (c || 0) + 1);
            updateHeartIcons();
        }

        function togglePlay() { 
            if(audio.paused) { audio.play(); updatePlayIcons(true); }
            else { audio.pause(); updatePlayIcons(false); }
        }

        function updatePlayIcons(playing) {
            const i = playing ? 'pause' : 'play';
            document.getElementById('m-play-icon').setAttribute('data-lucide', i);
            document.getElementById('f-play-icon').setAttribute('data-lucide', i);
            lucide.createIcons();
        }

        function nextTrack() {
            if (!currentPlaylist.length) return;
            let i = currentPlaylist.findIndex(t => t.id === currentTrackId);
            playTrack(currentPlaylist[(i+1)%currentPlaylist.length].id, currentPlaylist);
        }

        function prevTrack() {
            if (!currentPlaylist.length) return;
            let i = currentPlaylist.findIndex(t => t.id === currentTrackId);
            playTrack(currentPlaylist[(i-1+currentPlaylist.length)%currentPlaylist.length].id, currentPlaylist);
        }

        function seek(e) {
            const rect = document.getElementById('seek-bar').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        audio.ontimeupdate = () => { 
            if(audio.duration) {
                const p = (audio.currentTime/audio.duration)*100;
                document.getElementById('f-progress').style.width = p + "%";
                document.getElementById('f-handle').style.left = p + "%";
                document.getElementById('f-current-time').innerText = formatTime(audio.currentTime);
                document.getElementById('f-total-time').innerText = formatTime(audio.duration);
            }
        };

        function openFullPlayer() { document.getElementById('full-player').classList.remove('translate-y-full'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.add('translate-y-full'); }
        function imgBust(u) { return u ? `${u}${u.includes('?') ? '&' : '?'}v=${globalBust}` : ''; }
        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
        function getFavorites() { return db.tracks.filter(t => favorites.includes(t.id)); }
        
        function openFullList(title, list) {
            navTo('full-list', title);
            document.getElementById('full-list-content').innerHTML = `
                <h1 class="text-3xl font-black mb-8 text-white">${title}</h1>
                <div class="space-y-1">
                    ${list.map(t => renderTrackItem(t, 'db.tracks')).join('')}
                </div>`;
            lucide.createIcons();
        }

        function playRandom() { if(db.tracks.length) playTrack(db.tracks[Math.floor(Math.random()*db.tracks.length)].id, db.tracks); }
        function playArtistTracks() { 
            const n = document.getElementById('artist-view-name').innerText;
            if(db.artists[n] && db.artists[n].tracks.length) playTrack(db.artists[n].tracks[0].id, db.artists[n].tracks);
        }
        function playCurrentAlbum() {
            const title = document.getElementById('album-view-title').innerText;
            const albumTracks = db.tracks.filter(t => t.album === title);
            if(albumTracks.length) playTrack(albumTracks[0].id, albumTracks);
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase().trim();
            if (!q) { navTo('home'); return; }
            navTo('search');
            const foundArtists = Object.values(db.artists).filter(a => a.name.toLowerCase().includes(q));
            const foundTracks = db.tracks.filter(t => t.title.toLowerCase().includes(q));
            let h = '';
            if(foundArtists.length) {
                h += `<div class="text-[10px] text-dim uppercase mb-4 tracking-widest">Исполнители</div>`;
                foundArtists.forEach(a => h += `<div onclick="openArtistPage('${a.name}')" class="flex items-center gap-4 p-4 rounded-3xl bg-surface/40 mb-4 cursor-pointer text-white font-bold"><img src="${imgBust(a.img)}" class="w-12 h-12 rounded-full object-cover shadow-lg"><div>${a.name}</div></div>`);
            }
            if(foundTracks.length) {
                h += `<div class="text-[10px] text-dim uppercase mb-4 tracking-widest">Треки</div>`;
                h += foundTracks.map(t => renderTrackItem(t, 'db.tracks')).join('');
            }
            document.getElementById('search-results').innerHTML = h || '<div class="text-dim text-center py-20">Ничего не найдено</div>';
            lucide.createIcons();
        }

        audio.onended = () => nextTrack();
    </script>
</body>
</html>
