<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored Music 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #080414; color: #f3f4f6; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Анимация эквалайзера */
        @keyframes music-bar { 0%, 100% { height: 4px; } 50% { height: 14px; } }
        .animate-bar-1 { animation: music-bar 0.8s infinite ease-in-out; }
        .animate-bar-2 { animation: music-bar 0.6s infinite ease-in-out; }
        .animate-bar-3 { animation: music-bar 0.7s infinite ease-in-out; }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-44">

    <!-- Background Decor -->
    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-900/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080414]/60 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 p-[1px]">
                <div class="w-full h-full rounded-full bg-[#080414] flex items-center justify-center overflow-hidden">
                    <i class="fa fa-user text-purple-400"></i>
                </div>
            </div>
            <span class="font-bold text-lg tracking-tight">Uncensored Music <span class="text-orange-500">🔥</span></span>
        </div>
        <button class="p-2 bg-white/5 rounded-xl hover:bg-white/10 active:scale-90 transition-all">
            <i class="fa fa-ellipsis-h text-xl"></i>
        </button>
    </header>

    <!-- VIEW: HOME (Плеер) -->
    <main id="view-home" class="view-section active px-5 space-y-8 mt-4">
        <!-- Tabs -->
        <div class="flex gap-2 p-1 bg-white/5 rounded-2xl w-fit">
            <button class="py-2 px-6 rounded-xl font-bold text-sm bg-purple-600 shadow-lg shadow-purple-600/20">Треки</button>
            <button class="py-2 px-6 rounded-xl font-bold text-sm text-gray-400">Исполнители</button>
        </div>

        <!-- Search -->
        <div class="relative group">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors"></i>
            <input type="text" id="search-input" placeholder="Поиск..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-purple-500/20 transition-all text-sm">
        </div>

        <!-- Categories -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-1" id="categories">
            <button onclick="setCategory('pop')" id="cat-pop" class="cat-btn flex items-center gap-2 whitespace-nowrap border rounded-xl px-4 py-2.5 transition active:scale-95 text-xs font-bold uppercase bg-purple-600/20 border-purple-500 text-white">
                <i class="fa fa-fire text-orange-500"></i> Популярное
            </button>
            <button onclick="setCategory('best')" id="cat-best" class="cat-btn flex items-center gap-2 whitespace-nowrap border rounded-xl px-4 py-2.5 transition active:scale-95 text-xs font-bold uppercase bg-white/5 border-white/5 text-gray-400">
                ⭐ Лучшее
            </button>
            <button onclick="setCategory('liked')" id="cat-liked" class="cat-btn flex items-center gap-2 whitespace-nowrap border rounded-xl px-4 py-2.5 transition active:scale-95 text-xs font-bold uppercase bg-white/5 border-white/5 text-gray-400">
                <i class="fa fa-heart text-purple-500"></i> Мне нравится
            </button>
        </div>

        <!-- Track List -->
        <section class="pb-10">
            <h2 id="list-title" class="text-lg font-black mb-4 uppercase tracking-widest text-gray-500">Топ треков</h2>
            <div class="space-y-3" id="track-container">
                <!-- Треки генерятся через JS -->
            </div>
        </section>
    </main>

    <!-- VIEW: OPTIONS (Настройки) -->
    <main id="view-options" class="view-section px-5 space-y-6 mt-6">
        <h2 class="text-2xl font-black uppercase tracking-tighter">Опции</h2>
        <div class="bg-white/5 border border-white/10 rounded-3xl p-5 space-y-6">
            <div class="flex items-center gap-4 p-4 bg-white/5 rounded-2xl">
                <div class="w-12 h-12 rounded-full bg-purple-600 flex items-center justify-center font-black text-xl shadow-lg shadow-purple-500/20">U</div>
                <div>
                    <h3 class="font-bold" id="user-name">User #812</h3>
                    <p class="text-xs text-gray-500">Premium подписка активна</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="flex items-center gap-2 text-xs font-black text-gray-500 uppercase px-2">
                    <i class="fa fa-palette"></i> Выбор темы
                </label>
                <div class="grid grid-cols-3 gap-2">
                    <button class="py-3 rounded-xl text-xs font-bold border bg-purple-600 border-purple-400 shadow-lg">Dark</button>
                    <button class="py-3 rounded-xl text-xs font-bold border bg-white/5 border-white/10 text-gray-500">Glass</button>
                    <button class="py-3 rounded-xl text-xs font-bold border bg-white/5 border-white/10 text-gray-500">Deep</button>
                </div>
            </div>

            <button class="w-full flex items-center justify-between p-4 bg-indigo-600 hover:bg-indigo-500 transition-colors rounded-2xl shadow-xl shadow-indigo-900/20">
                <div class="flex items-center gap-3 font-bold">
                    <i class="fa fa-comment-dots"></i> Написать в поддержку
                </div>
                <i class="fa fa-chevron-right text-sm"></i>
            </button>
        </div>
    </main>

    <!-- Floating Player Controls -->
    <div class="fixed bottom-6 left-4 right-4 z-[100] flex flex-col gap-4">
        <div class="bg-[#120c24]/90 backdrop-blur-3xl border border-white/10 rounded-[32px] p-2 shadow-2xl">
            
            <div class="flex items-center justify-between p-3 bg-white/5 rounded-[24px] mb-2">
                <div class="flex items-center gap-3 max-w-[60%]">
                    <img id="p-img" src="https://via.placeholder.com/100" class="w-12 h-12 rounded-xl object-cover shadow-lg">
                    <div class="overflow-hidden">
                        <h4 id="p-title" class="font-black text-sm truncate">Выберите трек</h4>
                        <p id="p-artist" class="text-[10px] font-bold text-purple-400/80 uppercase">АРТИСТ</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="p-play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center active:scale-90 transition-all shadow-lg">
                        <i class="fa fa-play text-xl ml-1"></i>
                    </button>
                    <button onclick="nextTrack()" class="text-gray-400 active:scale-90 transition-all">
                        <i class="fa fa-step-forward text-xl"></i>
                    </button>
                </div>
            </div>

            <div class="px-4 mb-2">
                <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                    <div id="p-bar" class="h-full bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.6)] transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Bottom Navigation -->
            <div class="flex justify-around items-center py-2 px-2">
                <button onclick="showView('home')" id="nav-home" class="nav-item flex flex-col items-center gap-1 text-purple-500">
                    <i class="fa fa-home text-xl"></i><span class="text-[9px] font-black uppercase">Дом</span>
                </button>
                <div class="relative -top-3">
                    <button onclick="filterLiked()" class="p-3 rounded-2xl bg-purple-600/80 text-white shadow-xl active:scale-90 transition-all relative">
                        <i class="fa fa-heart text-xl"></i>
                        <span id="like-count" class="absolute -top-1 -right-1 bg-red-500 text-[8px] font-black px-1.5 py-0.5 rounded-full border-2 border-[#120c24]">0</span>
                    </button>
                </div>
                <button onclick="showView('options')" id="nav-options" class="nav-item flex flex-col items-center gap-1 text-gray-500">
                    <i class="fa fa-cog text-xl"></i><span class="text-[9px] font-black uppercase">Опции</span>
                </button>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tracks = [
            { id: 1, title: 'Деньги', artist: 'Kizaru', image: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
            { id: 2, title: 'Goosebumps', artist: 'Travis Scott', image: 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
            { id: 3, title: 'Cristal & МОЁТ', artist: 'Morgenshtern', image: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' },
            { id: 4, title: 'Life Is Good', artist: 'Future ft. Drake', image: 'https://images.unsplash.com/photo-1514525253361-bee8718a74a2?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3' },
            { id: 5, title: 'Starboy', artist: 'The Weeknd', image: 'https://images.unsplash.com/photo-1459749411177-042180ce673c?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3' }
        ];

        let likedIds = new Set([1, 4]);
        let currentIdx = 0;
        let isPlaying = false;
        let currentCategory = 'pop';
        const audio = document.getElementById('main-audio');

        function renderTracks() {
            const container = document.getElementById('track-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = tracks.filter(t => t.title.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search));
            
            if (currentCategory === 'liked') {
                filtered = filtered.filter(t => likedIds.has(t.id));
                document.getElementById('list-title').innerText = "Любимые треки";
            } else {
                document.getElementById('list-title').innerText = "Топ треков";
            }

            container.innerHTML = filtered.map((t) => {
                const active = tracks[currentIdx].id === t.id && isPlaying;
                const liked = likedIds.has(t.id);
                return `
                    <div onclick="playTrackById(${t.id})" class="flex items-center justify-between p-3 rounded-2xl transition-all border ${active ? 'bg-purple-600/10 border-purple-500/30' : 'bg-white/[0.02] border-transparent'}">
                        <div class="flex items-center gap-4">
                            <div class="relative w-14 h-14 rounded-2xl overflow-hidden shadow-md">
                                <img src="${t.image}" class="w-full h-full object-cover">
                                ${active ? `<div class="absolute inset-0 bg-black/40 flex items-center justify-center gap-1">
                                    <div class="w-1 bg-white animate-bar-1"></div>
                                    <div class="w-1 bg-white animate-bar-2"></div>
                                    <div class="w-1 bg-white animate-bar-3"></div>
                                </div>` : ''}
                            </div>
                            <div>
                                <h4 class="font-bold text-sm ${active ? 'text-purple-400' : ''}">${t.title}</h4>
                                <p class="text-xs text-gray-500 font-medium">${t.artist}</p>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); toggleLike(${t.id})" class="p-2 ${liked ? 'text-purple-500' : 'text-gray-600'} transition-all active:scale-125">
                            <i class="${liked ? 'fa fa-heart' : 'fa-regular fa-heart'} text-xl"></i>
                        </button>
                    </div>
                `;
            }).join('') || '<div class="text-center py-10 text-gray-600 font-bold uppercase tracking-widest text-xs">Ничего не найдено</div>';
            
            document.getElementById('like-count').innerText = likedIds.size;
        }

        function playTrackById(id) {
            const index = tracks.findIndex(t => t.id === id);
            if (currentIdx === index && isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                currentIdx = index;
                audio.src = tracks[currentIdx].url;
                audio.play();
                isPlaying = true;
            }
            updatePlayerUI();
            renderTracks();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function togglePlay() {
            if (isPlaying) { audio.pause(); isPlaying = false; }
            else { audio.play(); isPlaying = true; }
            updatePlayerUI();
            renderTracks();
        }

        function updatePlayerUI() {
            const t = tracks[currentIdx];
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.image;
            document.getElementById('p-play-btn').innerHTML = isPlaying ? '<i class="fa fa-pause text-xl"></i>' : '<i class="fa fa-play text-xl ml-1"></i>';
        }

        function nextTrack() {
            currentIdx = (currentIdx + 1) % tracks.length;
            audio.src = tracks[currentIdx].url;
            if (isPlaying) audio.play();
            updatePlayerUI();
            renderTracks();
        }

        function toggleLike(id) {
            if (likedIds.has(id)) likedIds.delete(id);
            else likedIds.add(id);
            renderTracks();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function showView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-purple-500', 'text-gray-500'));
            document.getElementById('nav-' + view).classList.replace('text-gray-500', 'text-purple-500');
            tg.HapticFeedback.impactOccurred('light');
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.replace('bg-purple-600/20', 'bg-white/5');
                b.classList.replace('border-purple-500', 'border-white/5');
                b.classList.replace('text-white', 'text-gray-400');
            });
            const activeBtn = document.getElementById('cat-' + cat);
            activeBtn.classList.replace('bg-white/5', 'bg-purple-600/20');
            activeBtn.classList.replace('border-white/5', 'border-purple-500');
            activeBtn.classList.replace('text-gray-400', 'text-white');
            renderTracks();
        }

        function filterLiked() {
            showView('home');
            setCategory('liked');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        audio.ontimeupdate = () => {
            const prog = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('p-bar').style.width = prog + '%';
        };

        document.getElementById('p-play-btn').onclick = togglePlay;
        document.getElementById('search-input').oninput = renderTracks;

        if (tg.initDataUnsafe?.user?.first_name) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        }

        renderTracks();
        updatePlayerUI();
    </script>
</body>
</html>
