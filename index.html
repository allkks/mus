<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .track-row:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .active-track {
            color: #fbbf24; /* Золотистый цвет для активного трека */
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .album-card img {
            transition: transform 0.3s ease;
        }
        .album-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-black text-white">

    <div class="flex h-screen flex-col">
        <!-- Основной контент -->
        <div class="flex flex-1 overflow-hidden">
            
            <!-- Боковая панель -->
            <aside class="w-64 glass-effect p-6 hidden md:flex flex-col gap-8">
                <div class="text-2xl font-bold text-yellow-500 tracking-tighter italic">MY MUSIC</div>
                
                <nav class="space-y-4 text-gray-400">
                    <a href="#" class="flex items-center gap-3 text-white font-semibold">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        Главная
                    </a>
                    <a href="#" class="flex items-center gap-3 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        Поиск
                    </a>
                    <a href="#" class="flex items-center gap-3 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V9a2 2 0 00-2-2h-2"></path></svg>
                        Моя волна
                    </a>
                </nav>

                <div class="mt-auto">
                    <button class="w-full py-3 px-4 rounded-xl bg-yellow-500 text-black font-bold hover:bg-yellow-400 transition shadow-lg shadow-yellow-500/20">
                        Премиум
                    </button>
                </div>
            </aside>

            <!-- Главная область -->
            <main class="flex-1 overflow-y-auto p-4 md:p-10">
                
                <!-- Популярные альбомы -->
                <section class="mb-12">
                    <h2 class="text-3xl font-bold mb-6">Новые релизы</h2>
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6">
                        <!-- Альбом 1 -->
                        <div class="album-card group cursor-pointer" onclick="selectAlbum('Midnight City', 'The Dreamers', 'https://picsum.photos/seed/album1/400/400')">
                            <div class="relative overflow-hidden rounded-2xl mb-4 shadow-xl">
                                <img src="https://picsum.photos/seed/album1/400/400" alt="Album" class="w-full aspect-square object-cover">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                                    <div class="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black">
                                        <svg class="w-6 h-6 fill-current" viewBox="0 0 20 20"><path d="M6 4l10 6-10 6V4z"/></svg>
                                    </div>
                                </div>
                            </div>
                            <h3 class="font-bold truncate">Midnight City</h3>
                            <p class="text-gray-500 text-sm">The Dreamers</p>
                        </div>
                        <!-- Альбом 2 -->
                        <div class="album-card group cursor-pointer" onclick="selectAlbum('Solar Echos', 'Stardust', 'https://picsum.photos/seed/album2/400/400')">
                            <div class="relative overflow-hidden rounded-2xl mb-4 shadow-xl">
                                <img src="https://picsum.photos/seed/album2/400/400" alt="Album" class="w-full aspect-square object-cover">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                                    <div class="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black">
                                        <svg class="w-6 h-6 fill-current" viewBox="0 0 20 20"><path d="M6 4l10 6-10 6V4z"/></svg>
                                    </div>
                                </div>
                            </div>
                            <h3 class="font-bold truncate">Solar Echos</h3>
                            <p class="text-gray-500 text-sm">Stardust</p>
                        </div>
                    </div>
                </section>

                <!-- Список треков -->
                <section>
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold">Часто слушаете</h2>
                        <button class="text-sm text-gray-400 hover:text-white transition">Показать все</button>
                    </div>
                    
                    <div class="space-y-1">
                        <!-- Заголовок таблицы -->
                        <div class="grid grid-cols-12 px-4 py-2 text-xs text-gray-500 uppercase font-semibold">
                            <div class="col-span-1 text-center">#</div>
                            <div class="col-span-6">Трек</div>
                            <div class="col-span-3 text-right">Альбом</div>
                            <div class="col-span-2 text-right">Длительность</div>
                        </div>

                        <!-- Треки -->
                        <div id="tracks-container">
                            <!-- Трек 1 -->
                            <div class="track-row grid grid-cols-12 items-center px-4 py-3 rounded-xl cursor-pointer transition" onclick="playTrack('Neon Lights', 'Cyberwave', 'https://picsum.photos/seed/t1/100/100', this)">
                                <div class="col-span-1 text-center text-gray-500">1</div>
                                <div class="col-span-6 flex items-center gap-4">
                                    <img src="https://picsum.photos/seed/t1/100/100" class="w-10 h-10 rounded-md" alt="T">
                                    <div>
                                        <div class="font-medium track-name">Neon Lights</div>
                                        <div class="text-xs text-gray-500">Cyberwave</div>
                                    </div>
                                </div>
                                <div class="col-span-3 text-right text-sm text-gray-400">Digital City</div>
                                <div class="col-span-2 text-right text-sm text-gray-400">3:45</div>
                            </div>

                            <!-- Трек 2 -->
                            <div class="track-row grid grid-cols-12 items-center px-4 py-3 rounded-xl cursor-pointer transition" onclick="playTrack('After Dark', 'The Drifter', 'https://picsum.photos/seed/t2/100/100', this)">
                                <div class="col-span-1 text-center text-gray-500">2</div>
                                <div class="col-span-6 flex items-center gap-4">
                                    <img src="https://picsum.photos/seed/t2/100/100" class="w-10 h-10 rounded-md" alt="T">
                                    <div>
                                        <div class="font-medium track-name">After Dark</div>
                                        <div class="text-xs text-gray-500">The Drifter</div>
                                    </div>
                                </div>
                                <div class="col-span-3 text-right text-sm text-gray-400">Night Drive</div>
                                <div class="col-span-2 text-right text-sm text-gray-400">4:12</div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <!-- Нижняя панель плеера -->
        <footer class="h-24 glass-effect border-t border-white/10 px-4 md:px-8 flex items-center justify-between z-50">
            <!-- Сейчас играет -->
            <div class="flex items-center gap-4 w-1/3">
                <img id="current-cover" src="https://picsum.photos/seed/t1/100/100" class="w-14 h-14 rounded-lg shadow-lg" alt="Cover">
                <div class="overflow-hidden">
                    <div id="current-title" class="font-bold truncate text-sm md:text-base">Neon Lights</div>
                    <div id="current-artist" class="text-xs text-gray-400 truncate">Cyberwave</div>
                </div>
            </div>

            <!-- Управление -->
            <div class="flex flex-col items-center gap-2 w-1/3">
                <div class="flex items-center gap-6">
                    <button class="text-gray-400 hover:text-white transition hidden md:block">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                    </button>
                    <button class="text-gray-200 hover:text-white transition">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button id="play-btn" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition active:scale-95 shadow-lg shadow-white/10" onclick="togglePlay()">
                        <svg id="play-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="text-gray-200 hover:text-white transition">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zM16 6v12h2V6z"/></svg>
                    </button>
                    <button class="text-gray-400 hover:text-white transition hidden md:block">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                    </button>
                </div>
                
                <!-- Прогресс -->
                <div class="w-full flex items-center gap-2 text-xs text-gray-500 max-w-md">
                    <span>1:24</span>
                    <div class="flex-1 h-1 bg-white/10 rounded-full overflow-hidden relative group cursor-pointer">
                        <div class="h-full bg-yellow-500 w-1/3"></div>
                    </div>
                    <span>3:45</span>
                </div>
            </div>

            <!-- Громкость и доп. функции -->
            <div class="flex items-center justify-end gap-4 w-1/3">
                <div class="hidden md:flex items-center gap-2 w-32">
                    <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <div class="flex-1 h-1 bg-white/10 rounded-full relative">
                        <div class="h-full bg-white w-3/4"></div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let isPlaying = false;

        function playTrack(title, artist, cover, element) {
            // Обновляем UI плеера
            document.getElementById('current-title').textContent = title;
            document.getElementById('current-artist').textContent = artist;
            document.getElementById('current-cover').src = cover;

            // Сбрасываем выделение всех треков
            document.querySelectorAll('.track-row').forEach(row => {
                row.classList.remove('active-track');
                row.querySelector('.track-name').classList.remove('text-yellow-500');
            });

            // Выделяем активный
            element.classList.add('active-track');
            element.querySelector('.track-name').classList.add('text-yellow-500');

            // Симулируем нажатие Play
            if (!isPlaying) togglePlay();
        }

        function selectAlbum(title, artist, cover) {
            // При клике на альбом можно менять фоновое изображение или подгружать другие треки
            // Сейчас просто ставим первый "виртуальный" трек из альбома
            playTrack(title + " Intro", artist, cover, {
                classList: { add: () => {}, remove: () => {} },
                querySelector: () => ({ classList: { add: () => {}, remove: () => {} } })
            });
        }

        function togglePlay() {
            const playIcon = document.getElementById('play-icon');
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                // Иконка паузы
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                // Иконка играть
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }

        // Обработка клика по прогресс-бару (визуальный эффект)
        document.querySelectorAll('.flex-1.h-1').forEach(bar => {
            bar.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const width = rect.width;
                const percent = (x / width) * 100;
                this.querySelector('div').style.width = percent + '%';
            });
        });
    </script>
</body>
</html>
