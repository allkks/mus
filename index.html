<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored Music 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #080414; color: white; -webkit-user-select: none; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Анимация эквалайзера */
        @keyframes music-bar { 0%, 100% { height: 4px; } 50% { height: 16px; } }
        .animate-bar-1 { animation: music-bar 0.8s infinite ease-in-out; }
        .animate-bar-2 { animation: music-bar 0.6s infinite ease-in-out; }
        .animate-bar-3 { animation: music-bar 0.7s infinite ease-in-out; }

        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(8,4,20,0.98); z-index: 200; padding: 20px; backdrop-filter: blur(20px); }
        .admin-modal.active { display: flex; flex-direction: column; }
        
        .filter-btn.active { background: rgba(147, 51, 234, 0.2); border-color: rgba(168, 85, 247, 0.5); color: #a855f7; }
        
        .track-card.playing { background: rgba(147, 51, 234, 0.1); border-color: rgba(168, 85, 247, 0.3); }

        /* Для плавных переходов */
        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen pb-44">

    <!-- Динамический фон -->
    <div class="fixed top-[-10%] left-[-10%] w-[70%] h-[50%] bg-purple-900/10 blur-[120px] pointer-events-none animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[70%] h-[50%] bg-indigo-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080414]/60 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 p-[1px]">
                <div class="w-full h-full rounded-full bg-[#080414] flex items-center justify-center overflow-hidden">
                    <i class="fa fa-bolt text-purple-400"></i>
                </div>
            </div>
            <span class="font-bold text-lg tracking-tight">Uncensored <span class="text-purple-500">Music</span></span>
        </div>
        <button id="admin-plus-btn" class="hidden w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
            <i class="fa fa-plus"></i>
        </button>
    </header>

    <main class="px-5 space-y-8 mt-4">
        <!-- Поиск -->
        <div class="relative group">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="search-input" placeholder="Трек, артист или жанр..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-purple-500/50 focus:bg-white/10 transition-all text-sm">
        </div>

        <!-- Категории -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-1" id="category-filters">
            <button onclick="filterCategory('')" id="cat-all" class="filter-btn active flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap transition-all">Все</button>
            <button onclick="filterCategory('pop')" id="cat-pop" class="filter-btn flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap transition-all">🔥 Поп</button>
            <button onclick="filterCategory('rap')" id="cat-rap" class="filter-btn flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap transition-all">🎤 Рэп</button>
            <button onclick="filterCategory('punk')" id="cat-punk" class="filter-btn flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap transition-all">🎸 Панк</button>
        </div>

        <!-- Секция треков -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-black uppercase tracking-[0.2em] text-gray-500">Плейлист</h2>
                <span id="track-count" class="text-[10px] bg-white/5 px-2 py-1 rounded-md text-gray-400">0 треков</span>
            </div>
            <div class="space-y-3" id="track-container">
                <!-- Скелетон загрузки -->
                <div class="animate-pulse flex items-center gap-4 p-3">
                    <div class="w-14 h-14 bg-white/5 rounded-2xl"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-white/5 rounded w-1/2"></div>
                        <div class="h-2 bg-white/5 rounded w-1/4"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Плеер -->
    <div id="player-bar" class="fixed bottom-6 left-4 right-4 z-[100] translate-y-32 transition-all duration-500">
        <div class="bg-[#120c24]/90 backdrop-blur-2xl border border-white/10 rounded-[32px] p-2 shadow-2xl">
            
            <div class="flex items-center justify-between p-2 bg-white/5 rounded-[26px] mb-2">
                <div class="flex items-center gap-3 overflow-hidden">
                    <img id="p-img" src="" class="w-12 h-12 rounded-xl object-cover shadow-lg">
                    <div class="overflow-hidden">
                        <h4 id="p-title" class="font-bold text-sm truncate pr-2">Название</h4>
                        <p id="p-artist" class="text-[10px] text-purple-400 uppercase font-black tracking-wider truncate pr-2">Артист</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 pr-2">
                    <button id="p-prev" class="w-8 h-8 text-gray-400 active:text-white transition-colors"><i class="fa fa-step-backward"></i></button>
                    <button id="p-play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shadow-xl active:scale-90 transition-all">
                        <i class="fa fa-play ml-1"></i>
                    </button>
                    <button id="p-next" class="w-8 h-8 text-gray-400 active:text-white transition-colors"><i class="fa fa-step-forward"></i></button>
                </div>
            </div>

            <!-- Прогресс -->
            <div class="px-5 mb-4 mt-2">
                <div class="flex justify-between text-[8px] text-gray-500 mb-1 font-bold">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
                <div id="p-progress-container" class="w-full h-1 bg-white/10 rounded-full cursor-pointer relative">
                    <div id="p-bar" class="absolute top-0 left-0 h-full bg-purple-500 rounded-full shadow-[0_0_12px_rgba(168,85,247,0.8)]" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Навигация -->
            <div class="flex justify-around items-center py-2 border-t border-white/5">
                <button class="text-purple-500"><i class="fa fa-home text-lg"></i></button>
                <button class="text-gray-500 opacity-50"><i class="fa fa-compass text-lg"></i></button>
                <button class="text-gray-500 opacity-50"><i class="fa fa-heart text-lg"></i></button>
            </div>
        </div>
    </div>

    <!-- Модалка админа -->
    <div id="admin-modal" class="admin-modal no-scrollbar">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-black text-white">НОВЫЙ ТРЕК</h2>
                <p class="text-xs text-gray-500 uppercase tracking-widest">Добавление в базу</p>
            </div>
            <button onclick="toggleAdminModal()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full text-2xl">&times;</button>
        </div>
        
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">Основная информация</label>
                <input id="in-title" type="text" placeholder="Название песни" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500/50">
                <input id="in-artist" type="text" placeholder="Исполнитель" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500/50">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">Жанр</label>
                <select id="in-genre" class="w-full bg-[#1a142e] border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500/50 text-gray-300">
                    <option value="pop">Поп</option>
                    <option value="rap">Рэп</option>
                    <option value="punk">Панк</option>
                    <option value="other">Другое</option>
                </select>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">Ссылки (Прямые URL)</label>
                <input id="in-url" type="text" placeholder="Ссылка на MP3" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500/50">
                <input id="in-cover" type="text" placeholder="Ссылка на Обложку (JPG/PNG)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-purple-500/50">
            </div>

            <button onclick="saveToDB()" id="save-btn" class="w-full bg-purple-600 py-5 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all mt-4">
                <i class="fa fa-cloud-upload-alt mr-2"></i> Опубликовать
            </button>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // --- КОНФИГ ---
        const SB_URL = "https://zzztlkyoyjvkokcvqqfd.supabase.co";
        const SB_KEY = "sb_publishable_YOPX7PVk9K1d3gIH3kkQcw_HJlsk-OD";
        const ADMIN_ID = 7919252297; 
        // --------------

        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const audio = document.getElementById('main-audio');
        let dbMusic = [];
        let filteredMusic = [];
        let currentIdx = -1;
        let currentFilter = '';

        // Проверка прав админа
        if (tg.initDataUnsafe?.user?.id === ADMIN_ID) {
            document.getElementById('admin-plus-btn').classList.remove('hidden');
        }

        async function loadData() {
            const { data, error } = await supabase.from('music').select('*').order('created_at', { ascending: false });
            if (data) {
                dbMusic = data;
                applyFilters();
            }
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            filteredMusic = dbMusic.filter(t => 
                (t.title.toLowerCase().includes(search) || t.artist.toLowerCase().includes(search) || t.genre.toLowerCase().includes(search)) &&
                (currentFilter === "" || t.genre === currentFilter)
            );
            renderTracks();
        }

        function renderTracks() {
            const container = document.getElementById('track-container');
            document.getElementById('track-count').innerText = `${filteredMusic.length} треков`;

            container.innerHTML = filteredMusic.map((t, i) => {
                const isPlaying = currentIdx !== -1 && dbMusic[currentIdx]?.id === t.id;
                const activeClass = isPlaying ? 'track-card playing border-purple-500/30' : 'border-transparent bg-white/[0.03]';
                
                return `
                    <div class="flex items-center justify-between p-3 rounded-2xl transition-all border ${activeClass}" onclick="playTrackById(${t.id})">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <div class="relative w-14 h-14 rounded-xl overflow-hidden flex-shrink-0 shadow-lg">
                                <img src="${t.cover || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                                ${isPlaying && !audio.paused ? `
                                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center gap-[2px]">
                                        <div class="w-1 bg-purple-400 animate-bar-1"></div>
                                        <div class="w-1 bg-purple-400 animate-bar-2"></div>
                                        <div class="w-1 bg-purple-400 animate-bar-3"></div>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="text-left overflow-hidden">
                                <h4 class="font-bold text-sm truncate ${isPlaying ? 'text-purple-400' : 'text-white'}">${t.title}</h4>
                                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tight">${t.artist}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            ${tg.initDataUnsafe?.user?.id === ADMIN_ID ? `
                                <button onclick="event.stopPropagation(); deleteTrack(${t.id})" class="w-8 h-8 flex items-center justify-center text-red-500/50 hover:text-red-500 active:scale-90 transition-all">
                                    <i class="fa fa-trash-alt text-xs"></i>
                                </button>
                            ` : ''}
                            <div class="w-8 h-8 rounded-full flex items-center justify-center bg-white/5 text-gray-400">
                                <i class="fa ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play text-[10px]'}"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') || '<div class="text-center py-20 text-gray-600 text-sm font-medium">Здесь пока пусто...</div>';
        }

        function playTrackById(id) {
            const indexInDb = dbMusic.findIndex(t => t.id === id);
            
            if (currentIdx === indexInDb) {
                if (audio.paused) audio.play();
                else audio.pause();
            } else {
                currentIdx = indexInDb;
                audio.src = dbMusic[currentIdx].url;
                audio.play().catch(e => {
                    tg.showAlert("Ошибка воспроизведения. Проверьте URL трека.");
                });
                updatePlayerUI();
                // Показываем плеер если он был скрыт
                document.getElementById('player-bar').classList.remove('translate-y-32');
            }
            renderTracks();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updatePlayerUI() {
            const t = dbMusic[currentIdx];
            if (!t) return;
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.cover || '';
            document.getElementById('p-play-btn').innerHTML = audio.paused ? '<i class="fa fa-play ml-1"></i>' : '<i class="fa fa-pause"></i>';
        }

        // Удаление трека (Админ)
        async function deleteTrack(id) {
            tg.showConfirm("Удалить этот трек из базы навсегда?", async (yes) => {
                if (yes) {
                    const { error } = await supabase.from('music').delete().eq('id', id);
                    if (!error) {
                        tg.HapticFeedback.notificationOccurred('success');
                        loadData();
                    }
                }
            });
        }

        async function saveToDB() {
            const title = document.getElementById('in-title').value;
            const artist = document.getElementById('in-artist').value;
            const url = document.getElementById('in-url').value;
            
            if (!title || !artist || !url) {
                tg.showAlert("Заполни хотя бы название, артиста и ссылку на MP3!");
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner animate-spin mr-2"></i> ЗАГРУЗКА...';

            const payload = {
                title,
                artist,
                genre: document.getElementById('in-genre').value,
                url,
                cover: document.getElementById('in-cover').value || 'https://via.placeholder.com/300/4c1d95/ffffff?text=Music',
            };

            const { error } = await supabase.from('music').insert([payload]);
            
            if (!error) {
                tg.HapticFeedback.notificationOccurred('success');
                toggleAdminModal();
                // Очистка
                document.getElementById('in-title').value = '';
                document.getElementById('in-artist').value = '';
                document.getElementById('in-url').value = '';
                document.getElementById('in-cover').value = '';
                loadData();
            } else {
                tg.showAlert("Ошибка сохранения: " + error.message);
            }
            
            btn.disabled = false;
            btn.innerHTML = '<i class="fa fa-cloud-upload-alt mr-2"></i> Опубликовать';
        }

        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = cat === '' ? document.getElementById('cat-all') : document.getElementById(`cat-${cat}`);
            if (activeBtn) activeBtn.classList.add('active');
            applyFilters();
            tg.HapticFeedback.selectionChanged();
        }

        function toggleAdminModal() { 
            document.getElementById('admin-modal').classList.toggle('active'); 
        }

        // Управление плеером
        document.getElementById('p-play-btn').onclick = () => {
            if (audio.paused) audio.play();
            else audio.pause();
            tg.HapticFeedback.impactOccurred('medium');
        };

        document.getElementById('p-next').onclick = () => {
            if (currentIdx < dbMusic.length - 1) playTrackById(dbMusic[currentIdx + 1].id);
            else playTrackById(dbMusic[0].id); // Круг
        };

        document.getElementById('p-prev').onclick = () => {
            if (currentIdx > 0) playTrackById(dbMusic[currentIdx - 1].id);
        };

        // Логика аудио
        audio.onplay = () => { updatePlayerUI(); renderTracks(); };
        audio.onpause = () => { updatePlayerUI(); renderTracks(); };
        
        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            document.getElementById('p-bar').style.width = perc + '%';
            
            // Время
            const curM = Math.floor(audio.currentTime / 60);
            const curS = Math.floor(audio.currentTime % 60);
            document.getElementById('current-time').innerText = `${curM}:${curS < 10 ? '0' : ''}${curS}`;
            
            if (audio.duration) {
                const durM = Math.floor(audio.duration / 60);
                const durS = Math.floor(audio.duration % 60);
                document.getElementById('total-time').innerText = `${durM}:${durS < 10 ? '0' : ''}${durS}`;
            }
        };

        // Автопереключение
        audio.onended = () => {
            document.getElementById('p-next').click();
        };

        // Перемотка кликом по бару
        document.getElementById('p-progress-container').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const perc = x / rect.width;
            audio.currentTime = perc * audio.duration;
        };

        document.getElementById('search-input').oninput = () => applyFilters();
        document.getElementById('admin-plus-btn').onclick = toggleAdminModal;

        // Инициализация
        loadData();
    </script>
</body>
</html>
