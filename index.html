<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        :root { --accent: #9333ea; --bg: #0b0714; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; -webkit-user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .track-card { background: rgba(255,255,255,0.03); border-radius: 20px; transition: 0.2s; }
        .track-card.playing { background: rgba(147, 51, 234, 0.2); border: 1px solid var(--accent); }
        #artist-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 80; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
        #artist-page.active { transform: translateX(0); }
        #full-player { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 100; transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #full-player.active { transform: translateY(0); }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; }
    </style>
</head>
<body class="pb-40">

    <div class="px-6 pt-12 pb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-white">UNCENSORED</h1>
    </div>

    <div id="view-home">
        <div class="px-6 mb-10">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest mb-5">Исполнители</h3>
            <div id="artist-slider" class="flex gap-6 overflow-x-auto no-scrollbar"></div>
        </div>
        <div class="px-6">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest mb-5">Все треки</h3>
            <div id="tracks-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- Artist Page -->
    <div id="artist-page">
        <button onclick="closeArtist()" class="absolute top-12 left-6 z-10 w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
        <div id="ap-header" class="h-[250px] bg-purple-900 flex items-end p-6">
            <h2 id="ap-name" class="text-4xl font-black uppercase"></h2>
        </div>
        <div id="ap-tracks" class="p-6 space-y-4"></div>
    </div>

    <!-- Mini Player -->
    <div id="mini-player" class="fixed bottom-6 left-4 right-4 z-[90] translate-y-[200%] transition-transform duration-500">
        <div class="glass rounded-[30px] p-3 flex items-center justify-between shadow-2xl" onclick="openFullPlayer()">
            <div class="flex items-center gap-4 overflow-hidden">
                <img id="m-img" src="" class="w-12 h-12 rounded-2xl object-cover bg-purple-900">
                <div class="overflow-hidden"><h4 id="m-title" class="font-bold text-sm truncate"></h4></div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="m-play-btn" class="w-11 h-11 rounded-full bg-white text-black flex items-center justify-center"><i class="fa-solid fa-play"></i></button>
        </div>
    </div>

    <!-- Full Player -->
    <div id="full-player" class="p-10 flex flex-col justify-between text-center">
        <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
        <img id="f-img" src="" class="w-full aspect-square rounded-[60px] shadow-2xl object-cover bg-purple-900 mb-6">
        <h2 id="f-title" class="text-3xl font-black truncate"></h2>
        <div class="w-full">
            <div class="h-1.5 bg-white/10 rounded-full mb-8" onclick="seek(event)"><div id="f-progress" class="progress-fill"></div></div>
            <div class="flex justify-around items-center">
                <button onclick="prevTrack()" class="text-3xl"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" id="f-play-btn" class="w-24 h-24 bg-white text-black rounded-full text-4xl flex items-center justify-center"><i class="fa-solid fa-play"></i></button>
                <button onclick="nextTrack()" class="text-3xl"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const GITHUB_USER = 'allkks';
        const REPO_NAME = 'mus';
        
        let database = { artists: [], tracks: [] };
        let currentPlaylist = [];
        let currentIdx = -1;
        const audio = document.getElementById('audio');

        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/database.json?v=${Date.now()}`);
                database = await res.json();
                render();
            } catch(e) { alert("База данных пуста. Загрузите музыку через менеджер на ПК."); }
        }

        function render() {
            document.getElementById('artist-slider').innerHTML = database.artists.map(a => `
                <div onclick="openArtist('${a.id}')" class="flex flex-col items-center gap-3 flex-shrink-0 active:scale-90 transition-transform">
                    <img src="${a.img || 'https://api.dicebear.com/7.x/initials/svg?seed=' + a.name}" class="w-24 h-24 rounded-full object-cover border-2 border-purple-500/20 bg-purple-900">
                    <span class="text-[10px] font-black text-gray-500 uppercase">${a.name}</span>
                </div>
            `).join('');

            renderTrackList('tracks-list', database.tracks);
        }

        function renderTrackList(containerId, list) {
            document.getElementById(containerId).innerHTML = list.map((t, idx) => `
                <div onclick="playFromList('${containerId}', ${idx})" class="track-card p-5 flex items-center justify-between ${currentPlaylist[currentIdx]?.id === t.id ? 'playing' : ''}">
                    <div class="flex items-center gap-5 overflow-hidden">
                        <img src="${t.cover || 'https://api.dicebear.com/7.x/shapes/svg?seed=' + t.title}" class="w-14 h-14 rounded-2xl object-cover bg-purple-900">
                        <div class="overflow-hidden text-left">
                            <h4 class="font-bold text-sm truncate text-white">${t.title}</h4>
                            <p class="text-[10px] text-purple-400 font-black uppercase tracking-widest">${database.artists.find(a => a.id === t.artistId)?.name || 'Артист'}</p>
                        </div>
                    </div>
                    <i class="fa-solid ${currentPlaylist[currentIdx]?.id === t.id && !audio.paused ? 'fa-pause' : 'fa-play'} text-purple-500"></i>
                </div>
            `).join('');
        }

        function openArtist(id) {
            const artist = database.artists.find(a => a.id === id);
            const tracks = database.tracks.filter(t => t.artistId === id);
            document.getElementById('ap-name').innerText = artist.name;
            renderTrackList('ap-tracks', tracks);
            document.getElementById('artist-page').classList.add('active');
        }

        function closeArtist() { document.getElementById('artist-page').classList.remove('active'); }

        function playFromList(containerId, idx) {
            const list = (containerId === 'tracks-list') ? database.tracks : database.tracks.filter(t => t.artistId === database.artists.find(a => a.name === document.getElementById('ap-name').innerText).id);
            if(currentPlaylist === list && currentIdx === idx) { togglePlay(); return; }
            currentPlaylist = list; currentIdx = idx;
            const t = currentPlaylist[currentIdx];
            audio.src = t.url; audio.play();
            updateUI();
            document.getElementById('mini-player').classList.remove('translate-y-[200%]');
        }

        function togglePlay() {
            if(audio.paused) audio.play(); else audio.pause();
            updateUI();
        }

        function updateUI() {
            const t = currentPlaylist[currentIdx];
            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            document.getElementById('m-title').innerText = t.title;
            document.getElementById('m-img').src = t.cover || '';
            document.getElementById('m-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
        }

        function nextTrack() { if(currentIdx < currentPlaylist.length - 1) playFromList('', currentIdx + 1); }
        function prevTrack() { if(currentIdx > 0) playFromList('', currentIdx - 1); }
        function openFullPlayer() { document.getElementById('full-player').classList.add('active'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('active'); }
        function seek(e) { audio.currentTime = (e.clientX - 40) / (window.innerWidth - 80) * audio.duration; }
        audio.ontimeupdate = () => { document.getElementById('f-progress').style.width = (audio.currentTime / audio.duration * 100) + '%'; };
        audio.onended = () => nextTrack();

        init();
    </script>
</body>
</html>
