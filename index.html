<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uncensored Music 🔥</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #080414; color: #f3f4f6; -webkit-user-select: none; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Эквалайзер */
        @keyframes music-bar-1 { 0%, 100% { height: 4px; } 50% { height: 14px; } }
        @keyframes music-bar-2 { 0%, 100% { height: 10px; } 50% { height: 4px; } }
        @keyframes music-bar-3 { 0%, 100% { height: 6px; } 50% { height: 12px; } }
        .animate-bar-1 { animation: music-bar-1 0.8s infinite ease-in-out; }
        .animate-bar-2 { animation: music-bar-2 0.6s infinite ease-in-out; }
        .animate-bar-3 { animation: music-bar-3 0.7s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen pb-44">

    <!-- Dynamic Background Glow -->
    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-900/20 blur-[120px] pointer-events-none animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-900/10 blur-[120px] pointer-events-none"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080414]/60 p-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 p-[1px]">
                <div class="w-full h-full rounded-full bg-[#080414] flex items-center justify-center overflow-hidden">
                    <i class="fa fa-user text-purple-400"></i>
                </div>
            </div>
            <span class="font-bold text-lg tracking-tight">Uncensored Music <span class="text-orange-500">🔥</span></span>
        </div>
        <button class="p-2 bg-white/5 rounded-xl"><i class="fa fa-ellipsis-h text-xl"></i></button>
    </header>

    <main class="px-5 space-y-8 mt-4">
        <!-- Search -->
        <div class="relative group">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" id="search-icon"></i>
            <input type="text" id="search-input" placeholder="Поиск треков и исполнителей..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-purple-500/20 transition-all text-sm">
        </div>

        <!-- Categories -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-1">
            <button class="flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap"><i class="fa fa-fire text-orange-500"></i> Популярное</button>
            <button class="flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap">⭐ Лучшее</button>
            <button class="flex items-center gap-2 bg-white/5 border border-white/5 rounded-xl px-4 py-2 text-xs font-bold uppercase whitespace-nowrap">🆕 Новинки</button>
        </div>

        <!-- Recommendations -->
        <section>
            <h2 class="text-lg font-black mb-4 flex items-center justify-between tracking-widest">РЕКОМЕНДАЦИИ <span class="text-[10px] text-purple-500">ВСЕ</span></h2>
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                <div class="min-w-[180px] aspect-[1/1.2] rounded-3xl bg-gradient-to-br from-purple-600 to-indigo-600 p-6 flex flex-col justify-end relative overflow-hidden shadow-xl">
                    <i class="fa fa-music absolute top-4 right-4 text-6xl opacity-10"></i>
                    <h3 class="font-black text-2xl leading-tight">RAP HITS</h3>
                </div>
                <div class="min-w-[180px] aspect-[1/1.2] rounded-3xl bg-gradient-to-br from-pink-600 to-purple-600 p-6 flex flex-col justify-end relative overflow-hidden shadow-xl">
                    <i class="fa fa-bolt absolute top-4 right-4 text-6xl opacity-10"></i>
                    <h3 class="font-black text-2xl leading-tight">TOP CHART</h3>
                </div>
            </div>
        </section>

        <!-- Track List -->
        <section class="pb-10">
            <h2 class="text-lg font-black mb-4 uppercase tracking-widest text-gray-400">Топ треков</h2>
            <div class="space-y-3" id="track-container">
                <!-- Треки генерятся через JS -->
            </div>
        </section>
    </main>

    <!-- Floating Player -->
    <div class="fixed bottom-6 left-4 right-4 z-[100] flex flex-col gap-4">
        <div class="bg-[#120c24]/80 backdrop-blur-3xl border border-white/10 rounded-[32px] p-2 shadow-2xl">
            
            <!-- Player Content -->
            <div class="flex items-center justify-between p-3 bg-white/5 rounded-[24px] mb-2">
                <div class="flex items-center gap-3 max-w-[60%]">
                    <img id="p-img" src="https://via.placeholder.com/100" class="w-12 h-12 rounded-xl object-cover ring-1 ring-white/10">
                    <div class="overflow-hidden">
                        <h4 id="p-title" class="font-black text-sm truncate">Выберите трек</h4>
                        <p id="p-artist" class="text-[10px] font-bold text-purple-400/80 uppercase">АРТИСТ</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="prevTrack()" class="text-gray-400"><i class="fa fa-step-backward"></i></button>
                    <button id="main-play-btn" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center shadow-lg">
                        <i class="fa fa-play text-xl ml-1"></i>
                    </button>
                    <button onclick="nextTrack()" class="text-gray-400"><i class="fa fa-step-forward"></i></button>
                </div>
            </div>

            <!-- Progress -->
            <div class="px-4 mb-2">
                <div class="w-full h-1 bg-white/10 rounded-full relative overflow-hidden">
                    <div id="p-bar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-purple-500 to-indigo-400" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-1 text-[8px] font-bold text-gray-500 uppercase tracking-widest">
                    <span id="p-current">0:00</span>
                    <span id="p-duration">0:00</span>
                </div>
            </div>

            <!-- Nav Bar -->
            <div class="flex justify-around items-center py-2">
                <button class="flex flex-col items-center gap-1 text-purple-500"><i class="fa fa-home text-xl"></i><span class="text-[9px] font-black uppercase">Дом</span></button>
                <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa fa-search text-xl"></i><span class="text-[9px] font-black uppercase">Поиск</span></button>
                <div class="relative -top-3">
                    <div class="p-3 rounded-2xl bg-purple-600 text-white shadow-lg"><i class="fa fa-heart text-xl"></i></div>
                </div>
                <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa fa-broadcast-tower text-xl"></i><span class="text-[9px] font-black uppercase">Радио</span></button>
                <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fa fa-cog text-xl"></i><span class="text-[9px] font-black uppercase">Опции</span></button>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tracks = [
            { id: 1, title: 'Деньги', artist: 'Kizaru', image: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
            { id: 2, title: 'Goosebumps', artist: 'Travis Scott', image: 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
            { id: 3, title: 'Cristal & МОЁТ', artist: 'Morgenshtern', image: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=200&h=200&fit=crop', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        const audio = document.getElementById('main-audio');
        const container = document.getElementById('track-container');

        function render(filter = "") {
            container.innerHTML = tracks
                .filter(t => t.title.toLowerCase().includes(filter.toLowerCase()))
                .map((t, i) => {
                const active = i === currentIndex && isPlaying;
                return `
                    <div onclick="playTrack(${i})" class="flex items-center justify-between p-3 rounded-2xl transition-all border ${active ? 'bg-purple-600/10 border-purple-500/30' : 'bg-white/[0.02] border-transparent'}">
                        <div class="flex items-center gap-4">
                            <div class="relative w-14 h-14 rounded-2xl overflow-hidden">
                                <img src="${t.image}" class="w-full h-full object-cover">
                                ${active ? `<div class="absolute inset-0 bg-black/40 flex items-center justify-center gap-1">
                                    <div class="w-1 bg-white animate-bar-1"></div>
                                    <div class="w-1 bg-white animate-bar-2"></div>
                                    <div class="w-1 bg-white animate-bar-3"></div>
                                </div>` : ''}
                            </div>
                            <div>
                                <h4 class="font-bold text-sm ${active ? 'text-purple-400' : ''}">${t.title}</h4>
                                <p class="text-xs text-gray-500">${t.artist}</p>
                            </div>
                        </div>
                        <i class="fa ${active ? 'fa-pause' : 'fa-play'} text-gray-500"></i>
                    </div>
                `;
            }).join('');
        }

        function playTrack(index) {
            if (currentIndex === index && isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                currentIndex = index;
                audio.src = tracks[index].url;
                audio.play();
                isPlaying = true;
                updatePlayerUI();
            }
            render();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updatePlayerUI() {
            const t = tracks[currentIndex];
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.image;
            document.getElementById('main-play-btn').innerHTML = isPlaying ? '<i class="fa fa-pause text-xl"></i>' : '<i class="fa fa-play text-xl ml-1"></i>';
        }

        document.getElementById('main-play-btn').onclick = () => playTrack(currentIndex);
        
        document.getElementById('search-input').oninput = (e) => render(e.target.value);

        audio.ontimeupdate = () => {
            const prog = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('p-bar').style.width = prog + '%';
            const fmt = (s) => Math.floor(s/60) + ':' + ('0'+Math.floor(s%60)).slice(-2);
            document.getElementById('p-current').innerText = fmt(audio.currentTime);
            if(audio.duration) document.getElementById('p-duration').innerText = fmt(audio.duration);
        };

        function nextTrack() { playTrack((currentIndex + 1) % tracks.length); }
        function prevTrack() { playTrack((currentIndex - 1 + tracks.length) % tracks.length); }

        render();
    </script>
</body>
</html>
