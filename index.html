<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --accent: #9333ea; --bg: #0f0a1e; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; -webkit-user-select: none; overflow-x: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .artist-card:active { transform: scale(0.95); transition: 0.2s; }
        
        #full-player {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0f0a1e; z-index: 100;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #full-player.active { transform: translateY(0); }
        
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }
        .track-item.playing { background: rgba(147, 51, 234, 0.15); border-left: 4px solid var(--accent); }
        
        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <div class="px-6 pt-10 pb-4 flex items-center justify-between">
        <h1 class="text-2xl font-black italic tracking-tighter">UNCENSORED</h1>
        <button id="back-btn" onclick="goBack()" class="hidden glass px-4 py-2 rounded-2xl text-xs font-bold text-purple-400">← НАЗАД</button>
    </div>

    <div class="px-6 mb-6">
        <h2 id="view-title" class="text-3xl font-extrabold">Исполнители</h2>
        <p id="view-subtitle" class="text-gray-500 text-sm">Твоя медиатека</p>
    </div>

    <!-- Main Grid -->
    <div id="main-content" class="px-6 grid grid-cols-2 gap-4">
        <!-- Сюда грузятся артисты или треки -->
    </div>

    <!-- Mini Player -->
    <div id="mini-player" class="fixed bottom-6 left-4 right-4 z-50 translate-y-[200%] transition-transform duration-500">
        <div class="glass rounded-3xl p-3 flex items-center justify-between shadow-2xl" onclick="openFullPlayer()">
            <div class="flex items-center gap-3 overflow-hidden">
                <div id="m-img" class="w-12 h-12 rounded-2xl bg-purple-600 flex items-center justify-center font-bold text-xl">?</div>
                <div class="overflow-hidden">
                    <h4 id="m-title" class="font-bold text-sm truncate">Трек</h4>
                    <p id="m-artist" class="text-[10px] text-gray-400 truncate">Артист</p>
                </div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="m-play-btn" class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center">
                <i class="fa-solid fa-play"></i>
            </button>
        </div>
    </div>

    <!-- Full Player -->
    <div id="full-player" class="p-8 flex flex-col justify-between">
        <div class="flex justify-between">
            <button onclick="closeFullPlayer()" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
            <div class="text-center mt-2">
                <p class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Сейчас играет</p>
            </div>
            <div class="w-10"></div>
        </div>

        <div class="flex flex-col items-center">
            <div id="f-img" class="w-full aspect-square rounded-[40px] bg-gradient-to-br from-purple-600 to-blue-900 shadow-2xl flex items-center justify-center text-7xl font-black">?</div>
            <div class="w-full mt-10">
                <h2 id="f-title" class="text-3xl font-black truncate">Название трека</h2>
                <p id="f-artist" class="text-xl text-purple-400 mt-2">Исполнитель</p>
            </div>
        </div>

        <div class="w-full">
            <div class="h-1.5 w-full bg-white/10 rounded-full mb-4 overflow-hidden" onclick="seek(event)">
                <div id="f-progress" class="progress-fill"></div>
            </div>
            <div class="flex justify-between text-[10px] text-gray-500 font-mono mb-10">
                <span id="f-time-curr">0:00</span>
                <span id="f-time-total">0:00</span>
            </div>
            <div class="flex justify-around items-center">
                <button onclick="prevTrack()" class="text-3xl text-white/80"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" id="f-play-btn" class="w-20 h-20 bg-white text-black rounded-full text-3xl flex items-center justify-center shadow-xl">
                    <i class="fa-solid fa-play ml-1"></i>
                </button>
                <button onclick="nextTrack()" class="text-3xl text-white/80"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // --- НАСТРОЙКИ GITHUB ---
        const GITHUB_USER = 'allkks'; 
        const REPO_NAME = 'mus';
        const ROOT_PATH = 'all music'; // Убедись, что папка в GitHub называется именно так

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0f0a1e';

        const audio = document.getElementById('audio');
        let currentPath = ROOT_PATH;
        let playlist = [];
        let currentIdx = -1;
        let currentArtist = "";

        // Загрузка данных из GitHub API
        async function fetchGithub(path) {
            showLoader();
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}`);
                const data = await response.json();
                return data;
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        // Показ исполнителей
        async function loadArtists() {
            const items = await fetchGithub(ROOT_PATH);
            const grid = document.getElementById('main-content');
            grid.className = "px-6 grid grid-cols-2 gap-4";
            grid.innerHTML = '';
            
            document.getElementById('view-title').innerText = "Исполнители";
            document.getElementById('back-btn').classList.add('hidden');

            items.forEach(item => {
                if (item.type === 'dir') {
                    grid.innerHTML += `
                        <div onclick="openArtist('${item.path}', '${item.name}')" class="artist-card glass p-6 rounded-[30px] flex flex-col items-center gap-4">
                            <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-purple-500 to-blue-600 flex items-center justify-center text-2xl font-bold shadow-lg">
                                ${item.name[0]}
                            </div>
                            <span class="font-bold text-sm text-center truncate w-full">${item.name}</span>
                        </div>
                    `;
                }
            });
        }

        // Показ треков исполнителя
        async function openArtist(path, name) {
            currentArtist = name;
            const items = await fetchGithub(path);
            const grid = document.getElementById('main-content');
            grid.className = "px-6 space-y-3";
            grid.innerHTML = '';

            document.getElementById('view-title').innerText = name;
            document.getElementById('back-btn').classList.remove('hidden');

            playlist = items.filter(i => i.name.endsWith('.mp3'));
            
            playlist.forEach((track, idx) => {
                const isPlaying = currentIdx !== -1 && playlist[currentIdx].sha === track.sha;
                grid.innerHTML += `
                    <div onclick="playTrack(${idx})" class="track-item glass p-4 rounded-2xl flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <div class="w-10 h-10 flex items-center justify-center text-purple-400"><i class="fa-solid fa-music"></i></div>
                            <h4 class="font-bold text-sm truncate text-white">${track.name.replace('.mp3', '')}</h4>
                        </div>
                        <i class="fa-solid ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play'} text-purple-500 text-xs"></i>
                    </div>
                `;
            });
            tg.HapticFeedback.impactOccurred('light');
        }

        function playTrack(idx) {
            if (currentIdx === idx && playlist[idx].sha === currentTrackSha) {
                togglePlay();
                return;
            }
            currentIdx = idx;
            currentTrackSha = playlist[idx].sha;
            currentPlayingArtist = currentArtist;

            audio.src = playlist[idx].download_url;
            audio.play();
            
            updateUI();
            document.getElementById('mini-player').classList.remove('translate-y-[200%]');
            openArtist(playlist[idx].path.replace('/' + playlist[idx].name, ''), currentArtist);
            tg.HapticFeedback.impactOccurred('medium');
        }

        let currentTrackSha = '';
        let currentPlayingArtist = '';

        function togglePlay() {
            audio.paused ? audio.play() : audio.pause();
            updateUI();
            openArtist(playlist[0].path.replace('/' + playlist[0].name, ''), currentArtist);
        }

        function updateUI() {
            const track = playlist[currentIdx];
            const title = track.name.replace('.mp3', '');
            const icon = audio.paused ? 'fa-play' : 'fa-pause';

            document.getElementById('m-title').innerText = title;
            document.getElementById('m-artist').innerText = currentPlayingArtist;
            document.getElementById('m-img').innerText = title[0];
            document.getElementById('m-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;

            document.getElementById('f-title').innerText = title;
            document.getElementById('f-artist').innerText = currentPlayingArtist;
            document.getElementById('f-img').innerText = title[0];
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon} ${audio.paused ? 'ml-1' : ''}"></i>`;
        }

        function goBack() { loadArtists(); tg.HapticFeedback.impactOccurred('light'); }
        function showLoader() { document.getElementById('main-content').innerHTML = '<div class="col-span-2 flex justify-center py-20"><i class="fa-solid fa-circle-notch loader text-3xl text-purple-500"></i></div>'; }
        function openFullPlayer() { document.getElementById('full-player').classList.add('active'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('active'); }

        function nextTrack() { if (currentIdx < playlist.length - 1) playTrack(currentIdx + 1); }
        function prevTrack() { if (currentIdx > 0) playTrack(currentIdx - 1); }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('f-progress').style.width = p + '%';
            const fmt = (t) => Math.floor(t/60) + ":" + Math.floor(t%60).toString().padStart(2,'0');
            document.getElementById('f-time-curr').innerText = fmt(audio.currentTime);
            document.getElementById('f-time-total').innerText = fmt(audio.duration || 0);
        };

        audio.onended = () => nextTrack();

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        loadArtists();
    </script>
</body>
</html>
