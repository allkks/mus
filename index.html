<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Premium Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bg: '#0a0510', accent: '#8a2be2', surface: '#1a1225', 
                        text: '#ffffff', dim: '#b3a9c0', heart: '#ff2d55', brandY: '#ffcc00' 
                    },
                    fontFamily: { sans: ['Manrope', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0510; color: #ffffff; font-family: 'Manrope', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-player { background: rgba(26, 18, 37, 0.98); backdrop-filter: blur(30px); border-top: 1px solid rgba(138, 43, 226, 0.2); }
        .hero-bg { background: linear-gradient(180deg, transparent 0%, rgba(10, 5, 16, 1) 100%); }
        .yandex-gradient { background: linear-gradient(135deg, #8a2be2 0%, #ff2d55 100%); }
        .h-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; }
        .h-scroll > div { scroll-snap-align: start; flex-shrink: 0; }
        .track-column { width: 85vw; max-width: 420px; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-44">
        
        <!-- HEADER / SEARCH -->
        <div class="p-6 pt-10 sticky top-0 bg-bg/90 backdrop-blur-xl z-50 flex items-center gap-4">
            <div class="flex-1 flex items-center gap-3 bg-surface/50 border border-white/5 rounded-2xl px-5 py-3 focus-within:border-accent transition-all">
                <i data-lucide="search" class="w-4 h-4 text-dim"></i>
                <input id="search-input" type="text" placeholder="Поиск музыки" class="bg-transparent border-none outline-none w-full text-sm" oninput="handleSearch()">
            </div>
            <div class="w-10 h-10 rounded-full bg-accent/20 flex items-center justify-center border border-white/5"><i data-lucide="user" class="w-5 h-5 text-accent"></i></div>
        </div>

        <!-- PAGE: HOME -->
        <section id="page-home" class="page p-4">
            <div onclick="playRandom()" class="relative h-48 rounded-[2.5rem] overflow-hidden mb-10 yandex-gradient shadow-2xl p-8 flex flex-col justify-end cursor-pointer btn-active">
                <h2 class="text-4xl font-black italic tracking-tighter text-white">Моя волна</h2>
                <div class="absolute bottom-8 right-8 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-xl"><i data-lucide="play" class="fill-black text-black ml-1"></i></div>
            </div>

            <div id="fav-section" class="hidden mb-10">
                <h2 class="text-xl font-bold mb-4 px-2 flex items-center justify-between text-heart">
                    <span>Мне нравится</span>
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </h2>
                <div id="favorites-list" class="space-y-1 px-2"></div>
            </div>

            <h2 class="text-xl font-bold mb-6 px-2 italic">Исполнители</h2>
            <div id="home-artists" class="h-scroll no-scrollbar px-2"></div>

            <h2 class="text-xl font-bold mb-4 px-2 italic">Популярно</h2>
            <div id="home-trending" class="space-y-1"></div>
        </section>

        <!-- PAGE: ARTIST -->
        <section id="page-artist" class="page hidden">
            <div class="relative h-[55vh] w-full flex flex-col justify-end overflow-hidden">
                <img id="artist-view-img" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <button onclick="navTo('home')" class="absolute top-6 left-6 bg-black/40 p-3 rounded-full backdrop-blur-xl border border-white/10 z-10"><i data-lucide="chevron-left"></i></button>
                <div class="relative p-6 pb-8 z-10">
                    <h1 id="artist-view-name" class="text-5xl font-black italic tracking-tighter mb-4 leading-tight"></h1>
                    <button class="bg-brandY text-black px-12 py-4 rounded-full font-black flex items-center gap-2 shadow-xl btn-active" onclick="playArtistAll()">
                        <i data-lucide="play" class="fill-black w-5 h-5"></i> СЛУШАТЬ
                    </button>
                </div>
            </div>
            <div class="px-4 mb-10 mt-8">
                <h2 class="text-xl font-bold mb-5 italic">Популярные треки</h2>
                <div id="artist-view-tracks-scroll" class="h-scroll no-scrollbar px-1"></div>
            </div>
            <div class="px-4 mb-10">
                <h2 class="text-xl font-bold mb-6 italic">Альбомы</h2>
                <div id="artist-view-albums" class="h-scroll no-scrollbar pb-6 px-1"></div>
            </div>
        </section>

        <!-- PAGE: SEARCH -->
        <section id="page-search" class="page hidden p-6"><div id="search-results" class="space-y-1"></div></section>
    </main>

    <!-- PLAYER -->
    <div id="player" class="glass-player fixed bottom-6 left-2 right-2 rounded-[2.5rem] p-4 z-[100] transition-all duration-500 translate-y-44 shadow-2xl">
        <div class="flex items-center gap-4">
            <img id="p-img" class="w-12 h-12 rounded-xl object-cover shadow-lg">
            <div class="flex-1 overflow-hidden">
                <div id="p-title" class="font-bold truncate text-sm">...</div>
                <div id="p-artist" class="text-dim text-[10px] font-bold uppercase tracking-widest truncate italic">...</div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleFavorite(currentTrackId)"><i id="p-heart" data-lucide="heart" class="w-6 h-6"></i></button>
                <button onclick="togglePlay()" class="w-12 h-12 flex items-center justify-center bg-white text-black rounded-full shadow-lg btn-active"><i id="p-play-icon" data-lucide="play" class="fill-black"></i></button>
                <button onclick="nextTrack()"><i data-lucide="skip-forward" class="w-6 h-6 text-dim"></i></button>
            </div>
        </div>
        <div class="absolute top-0 left-10 right-10 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="player-progress" class="h-full bg-brandY w-0"></div>
        </div>
    </div>

    <!-- NAVBAR -->
    <div class="fixed bottom-0 left-0 right-0 h-20 bg-bg border-t border-white/5 flex items-center justify-around z-[90]">
        <button onclick="navTo('home')" class="flex flex-col items-center gap-1 text-brandY"><i data-lucide="home"></i><span class="text-[9px] font-bold uppercase tracking-widest">Главная</span></button>
        <button class="flex flex-col items-center gap-1 text-dim/40"><i data-lucide="heart"></i><span class="text-[9px] font-bold uppercase tracking-widest">Моё</span></button>
    </div>

    <div id="main-loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-brandY border-t-transparent animate-spin rounded-full mb-4"></div>
        <div class="text-[10px] font-bold text-brandY tracking-widest uppercase italic">Синхронизация...</div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const USER = "allkks";
        const REPO = "mus";
        let db = { tracks: [], artists: {} };
        let currentPlaylist = [];
        let currentIndex = -1;
        let currentTrackId = null;
        let favorites = JSON.parse(localStorage.getItem('user_favorites') || '[]');
        const audio = document.getElementById('audio-engine');

        window.onload = async () => { lucide.createIcons(); await loadDatabase(); };

        async function loadDatabase() {
            try {
                // Прямой запрос к GitHub API для получения свежего содержимого файла
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database.json?t=${Date.now()}`);
                const data = await res.json();
                // Декодируем base64 (стандарт ответа API)
                const decodedContent = decodeURIComponent(escape(atob(data.content)));
                db = JSON.parse(decodedContent);
                renderHome();
                document.getElementById('main-loader').classList.add('hidden');
            } catch (e) {
                console.error("API error, trying RAW", e);
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                renderHome();
                document.getElementById('main-loader').classList.add('hidden');
            }
        }

        function renderHome() {
            const artistContainer = document.getElementById('home-artists');
            artistContainer.innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtistPage('${a.name.replace(/'/g, "\\'")}')" class="w-28 text-center transform active:scale-90 transition-transform cursor-pointer group">
                    <img src="${a.img}" class="w-24 h-24 rounded-full mx-auto object-cover mb-3 border border-white/5 shadow-2xl group-hover:border-brandY transition-all">
                    <div class="text-[10px] font-bold uppercase tracking-widest truncate">${a.name}</div>
                </div>`).join('');

            document.getElementById('home-trending').innerHTML = db.tracks.slice(0, 8).map(t => renderTrackItem(t, db.tracks)).join('');
            renderFavorites();
            lucide.createIcons();
        }

        function renderTrackItem(t, list) {
            const isFav = favorites.includes(t.id);
            // Безопасно передаем данные в функцию
            return `
                <div class="flex items-center gap-4 p-3 rounded-2xl active:bg-white/5 transition-all cursor-pointer group" onclick="playTrackById(${t.id})">
                    <img src="${t.img}" class="w-12 h-12 rounded-lg object-cover shadow-md">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm truncate group-hover:text-brandY">${t.title}</div>
                        <div class="text-[10px] text-dim font-bold uppercase tracking-widest">${t.artist}</div>
                    </div>
                    <button onclick="event.stopPropagation(); toggleFavorite(${t.id})"><i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-heart text-heart' : 'text-dim/20'}"></i></button>
                </div>`;
        }

        function renderFavorites() {
            const favTracks = db.tracks.filter(t => favorites.includes(t.id));
            if(favTracks.length > 0) {
                document.getElementById('fav-section').classList.remove('hidden');
                document.getElementById('favorites-list').innerHTML = favTracks.map(t => renderTrackItem(t, favTracks)).join('');
            } else { document.getElementById('fav-section').classList.add('hidden'); }
            lucide.createIcons();
        }

        function openArtistPage(name) {
            const artist = db.artists[name];
            if(!artist) return;
            document.getElementById('artist-view-img').src = artist.img;
            document.getElementById('artist-view-name').innerText = artist.name;

            const groups = [];
            const tracks = artist.tracks;
            for (let i = 0; i < tracks.length; i += 3) groups.push(tracks.slice(i, i + 3));

            document.getElementById('artist-view-tracks-scroll').innerHTML = groups.map(group => `
                <div class="track-column flex flex-col gap-2">
                    ${group.map(t => `
                        <div onclick="playTrackById(${t.id})" class="flex items-center gap-4 bg-surface/30 p-3 rounded-2xl active:bg-accent/20 transition-all cursor-pointer group">
                            <img src="${t.img}" class="w-12 h-12 rounded-lg object-cover shadow-sm">
                            <div class="flex-1 truncate group-hover:text-brandY font-bold text-sm">${t.title}</div>
                            <i data-lucide="play" class="w-4 h-4 text-dim opacity-20"></i>
                        </div>`).join('')}
                </div>`).join('');

            document.getElementById('artist-view-albums').innerHTML = (artist.albums || []).map(alb => `
                <div class="w-44 transform active:scale-95 transition-all cursor-pointer" onclick="playAlbum('${name.replace(/'/g, "\\'")}', '${alb.title.replace(/'/g, "\\'")}')">
                    <img src="${alb.cover}" class="w-44 h-44 rounded-[2.5rem] object-cover shadow-2xl mb-3 border border-white/5">
                    <div class="font-bold text-sm truncate px-1">${alb.title}</div>
                    <div class="text-[10px] text-dim font-bold uppercase px-1 tracking-widest">${alb.year || '2026'}</div>
                </div>`).join('');

            navTo('artist'); lucide.createIcons();
        }

        function playTrackById(id) {
            const t = db.tracks.find(x => x.id === id);
            if(!t) return;
            currentPlaylist = db.tracks; 
            currentIndex = db.tracks.findIndex(x => x.id === id);
            currentTrackId = id;

            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.img;
            audio.src = t.url; audio.play();
            document.getElementById('p-play-icon').setAttribute('data-lucide', 'pause');
            document.getElementById('player').classList.remove('translate-y-44');
            lucide.createIcons(); updateHeartIcons();
        }

        function playAlbum(artistName, albumTitle) {
            const artist = db.artists[artistName];
            const albumTracks = artist.tracks.filter(t => t.album === albumTitle);
            if(albumTracks.length > 0) {
                currentPlaylist = albumTracks;
                playTrackById(albumTracks[0].id);
            }
        }

        function playArtistAll() {
            const name = document.getElementById('artist-view-name').innerText;
            if(db.artists[name] && db.artists[name].tracks.length > 0) {
                playTrackById(db.artists[name].tracks[0].id);
            }
        }

        function togglePlay() { 
            if(audio.paused) { audio.play(); document.getElementById('p-play-icon').setAttribute('data-lucide', 'pause'); } 
            else { audio.pause(); document.getElementById('p-play-icon').setAttribute('data-lucide', 'play'); }
            lucide.createIcons();
        }

        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if(idx > -1) favorites.splice(idx, 1); else favorites.push(id);
            localStorage.setItem('user_favorites', JSON.stringify(favorites));
            updateHeartIcons(); renderFavorites();
        }

        function updateHeartIcons() {
            const isFav = favorites.includes(currentTrackId);
            const heart = document.getElementById('p-heart');
            if(heart) heart.className = `w-6 h-6 ${isFav ? 'fill-heart text-heart' : 'text-dim/20'}`;
            lucide.createIcons();
        }

        function nextTrack() {
            if(currentIndex < currentPlaylist.length - 1) {
                currentIndex++;
                playTrackById(currentPlaylist[currentIndex].id);
            }
        }

        function navTo(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('scroll-container').scrollTo(0,0);
        }

        function playRandom() { if(db.tracks.length) playTrackById(db.tracks[Math.floor(Math.random()*db.tracks.length)].id); }

        audio.ontimeupdate = () => { document.getElementById('player-progress').style.width = (audio.currentTime/audio.duration)*100+"%"; };
        audio.onended = nextTrack;
    </script>
</body>
</html>
