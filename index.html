<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Твоя музыка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        bg: '#0A090C', 
                        accent: '#8A2BE2', // Фиолетовый акцент
                        surface: '#16141A', 
                        text: '#FFFFFF', 
                        dim: '#94A3B8' 
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A090C; color: #FFFFFF; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(22, 20, 26, 0.8); backdrop-filter: blur(40px); border-top: 1px solid rgba(138, 43, 226, 0.2); }
        .hero-bg { background: linear-gradient(180deg, transparent 20%, rgba(10, 9, 12, 1) 95%); }
        .story-card { transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .story-card:hover { transform: scale(1.05) translateY(-5px); border-color: #8A2BE2; }
        .track-hover:hover { background-color: #1e1b24; transform: translateX(5px); }
        .hero-name { font-size: clamp(3rem, 10vw, 8rem); font-weight: 900; letter-spacing: -4px; line-height: 0.9; }
        #player-progress { box-shadow: 0 0 15px rgba(138, 43, 226, 0.6); }
        .modal-active { transform: translateY(0) !important; }
    </style>
</head>
<body>
    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-32">
        
        <section id="page-home" class="page p-6 pt-20">
            <div onclick="playRandom()" class="relative h-72 rounded-[2.5rem] overflow-hidden mb-12 cursor-pointer group shadow-2xl">
                <div class="absolute inset-0 bg-gradient-to-br from-accent via-purple-900 to-indigo-900 opacity-90 transition-all group-hover:scale-105"></div>
                <div class="absolute inset-0 flex flex-col justify-end p-10 z-10">
                    <div class="bg-white/10 backdrop-blur-md w-fit px-4 py-1 rounded-full text-[10px] font-black tracking-widest mb-4">МОЯ ВОЛНА</div>
                    <h2 class="text-5xl font-black italic tracking-tighter text-white leading-none">Слушай лучшее</h2>
                    <p class="text-white/70 font-bold mt-2 text-lg">Персональный поток музыки специально для тебя</p>
                </div>
                <div class="absolute bottom-10 right-10 w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-2xl transition-transform group-hover:scale-110">
                    <i data-lucide="play" class="fill-black text-black ml-1"></i>
                </div>
            </div>

            <h2 class="text-xl font-black mb-6 uppercase tracking-widest text-dim">Твои артисты</h2>
            <div id="home-artists" class="flex gap-5 overflow-x-auto pb-6 no-scrollbar snap-x"></div>

            <h2 class="text-xl font-black mb-6 mt-10 uppercase tracking-widest text-dim">Сейчас в тренде</h2>
            <div id="home-trending" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </section>

        <section id="page-artist" class="page hidden">
            <div class="relative h-[65vh] w-full">
                <img id="artist-view-img" class="w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <button onclick="navTo('home')" class="absolute top-8 left-6 bg-black/40 p-4 rounded-full backdrop-blur-xl border border-white/10"><i data-lucide="arrow-left"></i></button>
                <div class="absolute bottom-12 left-8 pr-8">
                    <div id="artist-view-name" class="hero-name italic text-white drop-shadow-2xl"></div>
                </div>
            </div>

            <div class="p-8">
                <div id="artist-bio" class="text-dim leading-relaxed mb-12 max-w-2xl text-lg italic opacity-80 border-l-2 border-accent pl-6"></div>
                
                <h2 class="text-3xl font-black mb-8 italic tracking-tight">Популярные треки</h2>
                <div id="artist-view-tracks" class="space-y-2 mb-16"></div>

                <h2 class="text-3xl font-black mb-8 italic tracking-tight">Все релизы</h2>
                <div id="artist-view-albums" class="flex gap-8 overflow-x-auto pb-10 no-scrollbar"></div>
            </div>
        </section>
    </main>

    <div id="player" onclick="openImmersivePlayer()" class="glass fixed bottom-4 left-4 right-4 rounded-[2rem] p-4 z-[100] cursor-pointer shadow-2xl border border-white/5">
        <div class="flex items-center gap-4">
            <img id="p-img" class="w-14 h-14 rounded-2xl object-cover">
            <div class="flex-1 overflow-hidden">
                <div id="p-title" class="font-bold truncate text-sm">Выберите трек</div>
                <div id="p-artist" class="text-dim text-[11px] font-bold uppercase tracking-widest">MUS.LIB</div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="event.stopImmediatePropagation(); togglePlay()" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center"><i id="p-play-icon" data-lucide="play" class="fill-current"></i></button>
                <button onclick="event.stopImmediatePropagation(); nextTrack()"><i data-lucide="skip-forward" class="w-6 h-6"></i></button>
            </div>
        </div>
        <div class="mt-3 h-1 bg-white/5 rounded-full overflow-hidden">
            <div id="player-progress" class="h-full bg-accent w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div id="immersive-player" class="fixed inset-0 bg-bg z-[200] transition-transform duration-500 translate-y-full flex flex-col p-8 pt-20">
        <button onclick="closeImmersivePlayer()" class="absolute top-8 left-8 text-dim"><i data-lucide="chevron-down" class="w-10 h-10"></i></button>
        <div class="flex-1 flex flex-col items-center justify-center">
            <img id="imm-img" class="w-full max-w-sm aspect-square rounded-[3rem] shadow-[0_40px_80px_rgba(138,43,226,0.3)] object-cover mb-12 border border-white/10">
            <div class="w-full max-w-sm text-center">
                <h1 id="imm-title" class="text-3xl font-black tracking-tighter mb-2">---</h1>
                <p id="imm-artist" class="text-accent text-xl font-bold italic">---</p>
            </div>
        </div>
        <div class="w-full max-w-sm mx-auto pb-20">
            <div class="flex justify-between gap-10 items-center">
                <button onclick="prevTrack()" class="text-dim hover:text-white"><i data-lucide="skip-back" class="w-10 h-10 fill-current"></i></button>
                <button onclick="togglePlay()" class="w-24 h-24 bg-white text-black rounded-[2.5rem] flex items-center justify-center shadow-2xl"><i id="imm-play-icon" data-lucide="play" class="w-12 h-12 fill-current"></i></button>
                <button onclick="nextTrack()" class="text-dim hover:text-white"><i data-lucide="skip-forward" class="w-10 h-10 fill-current"></i></button>
            </div>
        </div>
    </div>

    <div id="main-loader" class="fixed inset-0 z-[300] bg-bg flex items-center justify-center">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-accent border-t-transparent animate-spin rounded-full mb-4 mx-auto"></div>
            <div class="text-[10px] font-black tracking-[0.5em] text-accent uppercase">Загрузка медиатеки</div>
        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const USER = "allkks";
        const REPO = "mus";
        let db = { tracks: [], artists: {} };
        let currentPlaylist = [];
        let currentIndex = -1;
        const audio = document.getElementById('audio-engine');

        window.onload = async () => { lucide.createIcons(); await loadApp(); };

        async function loadApp() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database.json?t=${Date.now()}`);
                const data = await res.json();
                db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                renderHome();
                document.getElementById('main-loader').style.display = 'none';
            } catch (e) {
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                renderHome();
                document.getElementById('main-loader').style.display = 'none';
            }
        }

        function renderHome() {
            document.getElementById('home-artists').innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtist('${a.name}')" class="story-card w-44 flex-shrink-0 cursor-pointer snap-center">
                    <div class="relative aspect-[4/5] rounded-[2rem] overflow-hidden shadow-2xl border border-white/5">
                        <img src="${a.img}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                        <div class="absolute bottom-5 left-5 font-black text-xl italic tracking-tighter">${a.name}</div>
                    </div>
                </div>`).join('');

            document.getElementById('home-trending').innerHTML = db.tracks.slice(0, 10).map((t, i) => `
                <div onclick='playTrack(${t.id}, db.tracks)' class="track-hover flex items-center gap-5 p-4 bg-surface/50 rounded-[1.5rem] cursor-pointer transition-all">
                    <div class="font-mono text-3xl font-black opacity-10 w-8">${i+1}</div>
                    <img src="${t.img}" class="w-14 h-14 rounded-xl object-cover">
                    <div class="flex-1 truncate"><div class="font-bold text-sm truncate">${t.title}</div><div class="text-[10px] text-dim font-bold uppercase">${t.artist}</div></div>
                </div>`).join('');
        }

        function openArtist(name) {
            const artist = db.artists[name];
            if (!artist) return;
            document.getElementById('artist-view-name').innerText = artist.name.toUpperCase();
            document.getElementById('artist-view-img').src = artist.img;
            document.getElementById('artist-bio').innerText = artist.bio || "Популярный исполнитель вашей медиатеки.";

            document.getElementById('artist-view-tracks').innerHTML = artist.tracks.map((t, i) => `
                <div onclick='playTrack(${t.id}, db.artists["${name}"].tracks)' class="track-hover flex items-center gap-6 p-4 rounded-[1.5rem] cursor-pointer">
                    <div class="text-dim opacity-30 font-black font-mono">${i+1}</div>
                    <div class="flex-1 font-bold text-lg">${t.title}</div>
                    <i data-lucide="play" class="w-5 h-5 text-accent opacity-100"></i>
                </div>`).join('');

            document.getElementById('artist-view-albums').innerHTML = (artist.albums || []).map(alb => `
                <div onclick="playAlbum('${artist.name}', '${alb.title}')" class="flex-shrink-0 w-52 cursor-pointer group">
                    <div class="relative aspect-square rounded-[2rem] overflow-hidden shadow-2xl mb-4 border border-white/5 transition-transform group-hover:scale-105">
                        <img src="${alb.cover}" class="w-full h-full object-cover">
                    </div>
                    <div class="text-center font-black text-lg italic tracking-tighter truncate">${alb.title}</div>
                    <div class="text-center text-[10px] text-dim font-bold">${alb.year || '2026'}</div>
                </div>`).join('');
            
            navTo('artist'); lucide.createIcons();
        }

        function playTrack(id, playlist) {
            currentPlaylist = playlist;
            currentIndex = currentPlaylist.findIndex(t => t.id === id);
            const t = currentPlaylist[currentIndex];
            if(!t) return;
            document.getElementById('p-title').innerText = document.getElementById('imm-title').innerText = t.title;
            document.getElementById('p-artist').innerText = document.getElementById('imm-artist').innerText = t.artist;
            document.getElementById('p-img').src = document.getElementById('imm-img').src = t.img;
            audio.src = t.url; audio.play(); updateUI(true);
        }

        function togglePlay() { audio.paused ? (audio.play(), updateUI(true)) : (audio.pause(), updateUI(false)); }
        function updateUI(p) { 
            const icons = ['p-play-icon', 'imm-play-icon'];
            icons.forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.setAttribute('data-lucide', p ? 'pause' : 'play'); lucide.createIcons(); }
            });
        }
        function nextTrack() { if (currentIndex < currentPlaylist.length - 1) playTrack(currentPlaylist[currentIndex+1].id, currentPlaylist); }
        function prevTrack() { if (currentIndex > 0) playTrack(currentPlaylist[currentIndex-1].id, currentPlaylist); }
        function playRandom() { if(db.tracks.length) playTrack(db.tracks[Math.floor(Math.random()*db.tracks.length)].id, db.tracks); }
        function navTo(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden')); document.getElementById('page-'+p).classList.remove('hidden'); document.getElementById('scroll-container').scrollTo(0,0); }
        function openImmersivePlayer() { document.getElementById('immersive-player').classList.add('modal-active'); }
        function closeImmersivePlayer() { document.getElementById('immersive-player').classList.remove('modal-active'); }
        audio.ontimeupdate = () => { document.getElementById('player-progress').style.width = (audio.currentTime/audio.duration)*100+"%"; };
        audio.onended = nextTrack;
    </script>
</body>
</html>
