<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Premium Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { brand: '#ffcc00', surface: '#121212', accent: '#1e1e1e' }, 
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border-top: 1px solid rgba(255, 255, 255, 0.08); }
        .hero-gradient { background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%); }
        .track-item:hover { transform: translateX(8px); background-color: rgba(255, 204, 0, 0.1) !important; }
        .pb-safe { padding-bottom: 12rem; }
        .progress-glow { box-shadow: 0 0 15px #ffcc00; }
    </style>
</head>
<body class="overflow-hidden">

    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-safe">
        
        <!-- HOME PAGE -->
        <section id="page-home" class="page p-6 pt-20">
            <!-- BANNER -->
            <div onclick="playWave()" class="relative h-64 rounded-3xl overflow-hidden mb-10 cursor-pointer group shadow-2xl">
                <div class="absolute inset-0 bg-gradient-to-br from-brand to-orange-600 opacity-90"></div>
                <div class="absolute inset-0 flex flex-col justify-end p-8 z-10">
                    <h2 class="text-4xl font-black italic tracking-tighter mb-1 text-black">Моя волна</h2>
                    <p class="text-black/70 font-bold">Слушай лучшее из своей библиотеки</p>
                </div>
            </div>

            <!-- ARTISTS -->
            <div class="mb-12">
                <h2 class="text-2xl font-bold mb-6">Артисты</h2>
                <div id="home-artists" class="grid grid-cols-3 md:grid-cols-6 gap-6"></div>
            </div>

            <!-- NEW TRACKS -->
            <div>
                <h2 class="text-2xl font-bold mb-6">Недавние треки</h2>
                <div id="home-tracks" class="space-y-2"></div>
            </div>
        </section>

        <!-- ARTIST PAGE -->
        <section id="page-artist" class="page hidden">
            <div class="relative h-[50vh] w-full">
                <img id="artist-view-img" class="w-full h-full object-cover">
                <div class="absolute inset-0 hero-gradient"></div>
                <button onclick="navTo('home')" class="absolute top-6 left-6 bg-black/40 p-3 rounded-full backdrop-blur-md border border-white/10">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div class="absolute bottom-10 left-8">
                    <h1 id="artist-view-name" class="text-6xl md:text-8xl font-black italic tracking-tighter"></h1>
                </div>
            </div>

            <div class="p-8">
                <button onclick="playArtistAll()" class="w-full bg-brand text-black font-black py-5 rounded-2xl mb-12 flex items-center justify-center gap-3 active:scale-95 transition-transform">
                    <i data-lucide="play" class="fill-current"></i> СЛУШАТЬ ВСЁ
                </button>

                <h2 class="text-2xl font-bold mb-6 italic">★ Треки</h2>
                <div id="artist-view-tracks" class="space-y-2 mb-14"></div>

                <h2 class="text-2xl font-bold mb-6 italic">📀 Альбомы</h2>
                <div id="artist-view-albums" class="flex gap-6 overflow-x-auto no-scrollbar pb-4"></div>
            </div>
        </section>
    </main>

    <!-- PLAYER -->
    <div class="fixed bottom-0 left-0 right-0 glass-nav z-50 p-4 pb-10">
        <div class="h-1 bg-white/5 rounded-full overflow-hidden mb-4 mx-2">
            <div id="player-progress" class="h-full bg-brand progress-glow w-0"></div>
        </div>
        <div class="flex items-center justify-between gap-4 px-2">
            <div class="flex items-center gap-3 flex-1 truncate">
                <img id="p-img" class="w-14 h-14 rounded-xl object-cover bg-accent shadow-lg">
                <div class="truncate">
                    <div id="p-title" class="font-bold text-base truncate">Музыка</div>
                    <div id="p-artist" class="text-xs text-gray-400 truncate">Выберите трек</div>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="togglePlay()" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center active:scale-90 transition-transform">
                    <i id="p-play-icon" data-lucide="play" class="fill-current w-8 h-8 ml-1"></i>
                </button>
                <button onclick="nextTrack()" class="text-white/80 hover:text-white"><i data-lucide="skip-forward"></i></button>
            </div>
        </div>
    </div>

    <!-- LOADER -->
    <div id="main-loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-brand border-t-transparent animate-spin rounded-full mb-4"></div>
        <div class="text-brand font-black tracking-widest text-xs uppercase italic">MUS.LIB LOADING</div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const REPO = "allkks/mus";
        let db = { tracks: [], artists: {} };
        let currentPlaylist = [];
        let currentIndex = -1;
        let activeArtist = null;
        const audio = document.getElementById('audio-engine');

        window.onload = async () => { lucide.createIcons(); await loadApp(); };

        async function loadApp() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                renderHome();
                document.getElementById('main-loader').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function renderHome() {
            const artists = Object.values(db.artists);
            document.getElementById('home-artists').innerHTML = artists.map(a => `
                <div onclick="openArtist('${a.name.replace(/'/g, "\\'")}')" class="text-center cursor-pointer group">
                    <div class="aspect-square rounded-full overflow-hidden mb-3 border-2 border-transparent group-hover:border-brand transition-all shadow-xl">
                        <img src="${a.img}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.name)}&background=333&color=fff'" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                    </div>
                    <p class="text-[10px] font-bold uppercase truncate">${a.name}</p>
                </div>
            `).join('');

            document.getElementById('home-tracks').innerHTML = db.tracks.slice(0, 15).map(t => createTrackItem(t, db.tracks)).join('');
            lucide.createIcons();
        }

        function createTrackItem(t, playlist) {
            // Чтобы не передавать огромный JSON в атрибут onclick, мы просто передаем ID и имя артиста (если нужно)
            return `
                <div onclick='playFromPlaylist(${t.id}, "${t.artist.replace(/'/g, "\\'")}")' class="track-item flex items-center justify-between p-3 bg-white/5 rounded-2xl hover:bg-white/10 cursor-pointer transition-all group">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <img src="${t.img}" class="w-12 h-12 rounded-lg object-cover shadow-lg">
                        <div class="truncate">
                            <div class="font-bold text-sm truncate group-hover:text-brand transition-colors">${t.title}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">${t.artist} • ${t.album || 'Single'}</div>
                        </div>
                    </div>
                    <i data-lucide="play" class="w-4 h-4 text-brand fill-current opacity-0 group-hover:opacity-100 transition-all"></i>
                </div>
            `;
        }

        function openArtist(name) {
            const artist = db.artists[name];
            if (!artist) return;
            activeArtist = artist;

            document.getElementById('artist-view-name').innerText = artist.name;
            document.getElementById('artist-view-img').src = artist.img;
            
            // Рендер треков
            document.getElementById('artist-view-tracks').innerHTML = artist.tracks.map(t => createTrackItem(t, artist.tracks)).join('');
            
            // Рендер альбомов
            const albContainer = document.getElementById('artist-view-albums');
            if (artist.albums && artist.albums.length > 0) {
                albContainer.innerHTML = artist.albums.map(alb => `
                    <div onclick="playAlbum('${artist.name.replace(/'/g, "\\'")}', '${alb.title.replace(/'/g, "\\'")}')" class="flex-shrink-0 w-40 group cursor-pointer">
                        <div class="aspect-square rounded-3xl overflow-hidden mb-3 border border-white/10 group-hover:border-brand transition-all shadow-xl">
                            <img src="${alb.cover}" onerror="this.src='https://ui-avatars.com/api/?name=A&background=222&color=fff'" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                        </div>
                        <p class="font-bold text-sm truncate group-hover:text-brand transition-colors">${alb.title}</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Альбом</p>
                    </div>
                `).join('');
            } else {
                albContainer.innerHTML = `<p class="text-gray-500 text-sm italic ml-2">Альбомов пока нет</p>`;
            }

            navTo('artist');
            lucide.createIcons();
        }

        function playFromPlaylist(trackId, artistName) {
            // Если артист передан, берем его плейлист, иначе общий чарт
            const playlist = artistName && db.artists[artistName] ? db.artists[artistName].tracks : db.tracks;
            playTrack(trackId, playlist);
        }

        function playAlbum(artistName, albumTitle) {
            const artist = db.artists[artistName];
            const albumTracks = artist.tracks.filter(t => t.album === albumTitle);
            if(albumTracks.length > 0) playTrack(albumTracks[0].id, albumTracks);
        }

        function playArtistAll() {
            if (activeArtist && activeArtist.tracks.length > 0) playTrack(activeArtist.tracks[0].id, activeArtist.tracks);
        }

        function playTrack(id, playlist) {
            currentPlaylist = playlist;
            currentIndex = currentPlaylist.findIndex(t => t.id === id);
            const t = currentPlaylist[currentIndex];
            if (!t) return;

            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.img;
            audio.src = t.url; audio.play(); updateUI(true);
        }

        function togglePlay() { 
            if (!audio.src) return;
            if (audio.paused) { audio.play(); updateUI(true); } else { audio.pause(); updateUI(false); } 
        }

        function updateUI(p) { 
            document.getElementById('p-play-icon').setAttribute('data-lucide', p ? 'pause' : 'play'); 
            lucide.createIcons(); 
        }

        function nextTrack() { 
            if (currentIndex < currentPlaylist.length - 1) {
                currentIndex++;
                playTrack(currentPlaylist[currentIndex].id, currentPlaylist);
            }
        }

        function playWave() {
            if (db.tracks.length > 0) {
                const randomIdx = Math.floor(Math.random() * db.tracks.length);
                playTrack(db.tracks[randomIdx].id, db.tracks);
            }
        }

        function navTo(p) { 
            document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden')); 
            document.getElementById('page-'+p).classList.remove('hidden'); 
            document.getElementById('scroll-container').scrollTo(0,0);
        }

        audio.ontimeupdate = () => { document.getElementById('player-progress').style.width = (audio.currentTime/audio.duration)*100+"%"; };
        audio.onended = nextTrack;
    </script>
</body>
</html>
