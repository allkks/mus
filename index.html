<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --accent: #a855f7; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; -webkit-user-select: none; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .track-card { background: var(--card-bg); border-radius: 16px; transition: all 0.2s ease; }
        .track-card.playing { background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.3); }
        #artist-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        #artist-page.active { transform: translateY(0); }
        .progress-fill { height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); width: 0%; transition: width 0.1s linear; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #player-bar { transform: translateY(150%); opacity: 0; transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); pointer-events: none; }
        #player-bar.visible { transform: translateY(0); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="pb-32">

    <!-- Индикатор обновления (чтобы мы знали, что код новый) -->
    <div class="fixed top-2 right-2 text-[8px] opacity-20 z-[300]">BUILD V2.1</div>

    <header class="px-6 pt-12 pb-4 flex justify-between items-center">
        <div>
            <p class="text-[10px] font-bold text-purple-500 uppercase tracking-[0.3em]">Premium</p>
            <h1 class="text-3xl font-extrabold tracking-tight">UNCENSORED</h1>
        </div>
        <div class="w-10 h-10 rounded-full glass flex items-center justify-center">
            <i class="fa-solid fa-magnifying-glass text-sm opacity-60"></i>
        </div>
    </header>

    <main id="home-view">
        <section class="mt-4">
            <div class="px-6 flex justify-between items-end mb-4">
                <h3 class="text-lg font-bold">Твои кумиры</h3>
            </div>
            <div id="artist-list" class="flex gap-6 overflow-x-auto px-6 no-scrollbar snap-x"></div>
        </section>

        <section class="mt-10 px-6">
            <h3 class="text-lg font-bold mb-4">Все релизы</h3>
            <div id="track-list" class="space-y-3"></div>
        </section>
    </main>

    <!-- Страница артиста -->
    <div id="artist-page" class="overflow-y-auto no-scrollbar">
        <div id="ap-banner" class="h-[40vh] relative flex items-end p-8 bg-cover bg-center">
            <button onclick="closeArtist()" class="fixed top-12 left-6 z-50 w-10 h-10 glass rounded-full flex items-center justify-center">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/40 to-transparent z-10"></div>
            <h2 id="ap-name" class="text-5xl font-extrabold tracking-tighter relative z-20"></h2>
        </div>
        <div id="ap-content" class="p-6 relative z-20 bg-[#050505]"></div>
        <div class="h-32"></div>
    </div>

    <!-- Мини-плеер -->
    <div id="player-bar" class="fixed bottom-8 left-4 right-4 z-[150]">
        <div class="glass rounded-2xl p-2 flex items-center justify-between shadow-2xl" onclick="openFullPlayer()">
            <div class="flex items-center gap-3 min-w-0">
                <img id="p-img" src="" class="w-12 h-12 rounded-xl object-cover bg-neutral-900">
                <div class="min-w-0">
                    <h4 id="p-title" class="font-bold text-sm truncate pr-4"></h4>
                    <p id="p-subtitle" class="text-[10px] text-neutral-400 uppercase font-semibold"></p>
                </div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="p-play-btn" class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center mr-2">
                <i class="fa-solid fa-play"></i>
            </button>
        </div>
    </div>

    <!-- Полный плеер -->
    <div id="full-player" class="fixed inset-0 bg-[#050505] z-[200] translate-y-full transition-transform duration-500">
        <div class="h-full flex flex-col p-8 pt-12">
            <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full flex items-center justify-center mb-8"><i class="fa-solid fa-chevron-down"></i></button>
            <div class="flex-1 flex flex-col justify-center text-center">
                <img id="f-img" src="" class="w-full aspect-square rounded-3xl shadow-2xl object-cover mb-10 bg-neutral-900">
                <h2 id="f-title" class="text-3xl font-black truncate"></h2>
                <p id="f-artist" class="text-lg text-purple-400 font-semibold mt-2"></p>
            </div>
            <div class="w-full pb-12">
                <div class="h-1 bg-white/10 rounded-full mb-8 overflow-hidden" onclick="seek(event)"><div id="f-progress" class="progress-fill"></div></div>
                <div class="flex justify-around items-center">
                    <button onclick="prevTrack()" class="text-2xl opacity-60"><i class="fa-solid fa-backward-step"></i></button>
                    <button onclick="togglePlay()" id="f-play-btn" class="w-24 h-24 bg-white text-black rounded-full text-4xl flex items-center justify-center shadow-xl"><i class="fa-solid fa-play ml-1"></i></button>
                    <button onclick="nextTrack()" class="text-2xl opacity-60"><i class="fa-solid fa-forward-step"></i></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const GITHUB_USER = 'allkks', REPO_NAME = 'mus';
        let db = { artists: [], tracks: [] }, currentIdx = -1, currentList = [];
        const audio = document.getElementById('audio');

        async function init() {
            try {
                // Принудительный сброс кеша для JSON
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                render();
            } catch (e) { console.log("Ошибка загрузки"); }
        }

        function render() {
            document.getElementById('artist-list').innerHTML = db.artists.map(a => `
                <div onclick="openArtist('${a.id}')" class="flex flex-col items-center gap-3 snap-center min-w-[90px]">
                    <img src="${a.img}" class="w-20 h-20 rounded-full object-cover border-2 border-white/5">
                    <span class="text-[10px] font-extrabold text-neutral-400 uppercase text-center">${a.name}</span>
                </div>
            `).join('');
            renderTracks('track-list', db.tracks);
        }

        function renderTracks(containerId, list) {
            const container = document.getElementById(containerId);
            if(!container) return;
            container.innerHTML = list.map((t, idx) => {
                const isPlaying = currentList[currentIdx]?.url === t.url;
                return `
                    <div onclick='playTrack(${idx}, ${JSON.stringify(list).replace(/'/g, "&apos;")})' 
                         class="track-card p-3 flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <img src="${t.cover}" class="w-12 h-12 rounded-xl object-cover">
                            <div class="overflow-hidden">
                                <h4 class="font-bold text-sm truncate">${t.title}</h4>
                                <p class="text-[10px] text-neutral-500 font-bold uppercase">${t.album}</p>
                            </div>
                        </div>
                        <i class="fa-solid ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play'} text-purple-500 mr-2"></i>
                    </div>
                `;
            }).join('');
        }

        function openArtist(id) {
            const artist = db.artists.find(a => a.id === id);
            const tracks = db.tracks.filter(t => t.artistId === id);
            document.getElementById('ap-name').innerText = artist.name;
            document.getElementById('ap-banner').style.backgroundImage = `url(${artist.img})`;
            
            const albums = [...new Set(tracks.map(t => t.album))];
            let html = "";
            albums.forEach(al => {
                const albumId = al.replace(/\s/g, '_');
                html += `<h3 class="text-[10px] font-black text-purple-500 uppercase tracking-[0.3em] mt-8 mb-4">${al}</h3>`;
                html += `<div id="album-${albumId}" class="space-y-3"></div>`;
            });
            document.getElementById('ap-content').innerHTML = html;
            document.getElementById('artist-page').classList.add('active');
            
            setTimeout(() => {
                albums.forEach(al => {
                    const alTracks = tracks.filter(t => t.album === al);
                    renderTracks(`album-${al.replace(/\s/g, '_')}`, alTracks);
                });
            }, 50);
        }

        function closeArtist() { document.getElementById('artist-page').classList.remove('active'); }

        function playTrack(idx, list) {
            if(currentList === list && currentIdx === idx) { togglePlay(); return; }
            currentList = list; currentIdx = idx;
            audio.src = currentList[currentIdx].url; audio.play();
            document.getElementById('player-bar').classList.add('visible');
            updateUI();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateUI(); }

        function updateUI() {
            const t = currentList[currentIdx];
            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-subtitle').innerText = t.album;
            document.getElementById('p-img').src = t.cover;
            document.getElementById('p-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = t.album;
            document.getElementById('f-img').src = t.cover;
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            
            renderTracks('track-list', db.tracks);
        }

        function openFullPlayer() { document.getElementById('full-player').style.transform = 'translateY(0)'; }
        function closeFullPlayer() { document.getElementById('full-player').style.transform = 'translateY(100%)'; }
        function seek(e) { audio.currentTime = (e.clientX - 32) / (window.innerWidth - 64) * audio.duration; }
        audio.ontimeupdate = () => { document.getElementById('f-progress').style.width = (audio.currentTime / audio.duration * 100) + '%'; };
        audio.onended = () => { if(currentIdx < currentList.length - 1) playTrack(currentIdx+1, currentList); };

        function prevTrack() { if(currentIdx > 0) playTrack(currentIdx - 1, currentList); }
        function nextTrack() { if(currentIdx < currentList.length - 1) playTrack(currentIdx + 1, currentList); }

        init();
    </script>
</body>
</html>
