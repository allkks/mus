<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Premium Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    colors: {
                        bg: '#050505',
                        accent: '#ffcc00',
                        surface: '#121212',
                        text: '#f0f0f0',
                        dim: '#aaaaaa'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #f0f0f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(32px); border-top: 1px solid rgba(255,255,255,0.08); }
        .hero-bg { background: linear-gradient(180deg, transparent 30%, rgba(5,5,5,0.95) 85%); }
        .story-card { transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .story-card:hover { transform: scale(1.08) translateY(-8px); box-shadow: 0 25px 50px -12px rgb(255 204 0 / 0.3); }
        .track-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .track-hover:hover { background-color: #1f1f1f; transform: translateX(12px); }
        .album-card { position: relative; }
        .album-reflection { position: absolute; bottom: 0; left: 0; right: 0; height: 45%; background: linear-gradient(to top, rgba(255,255,255,0.25), transparent); transform: scaleY(-1); opacity: 0.35; border-radius: 0 0 24px 24px; pointer-events: none; }
        .modal { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.75) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .hero-name { font-size: clamp(3.5rem, 8vw, 7rem); line-height: 0.85; font-weight: 900; letter-spacing: -6px; }
    </style>
</head>
<body>
    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-28">
        
        <!-- HOME PAGE -->
        <section id="page-home" class="page p-6 pt-20">
            <!-- Моя волна (динамический блок с hover-анимацией) -->
            <div onclick="playRandom()" class="relative h-80 rounded-3xl overflow-hidden mb-12 cursor-pointer group shadow-2xl">
                <img id="wave-bg" src="https://picsum.photos/id/1015/2000/1200" class="absolute inset-0 w-full h-full object-cover transition-all group-hover:scale-110">
                <div class="hero-bg absolute inset-0"></div>
                <div class="absolute bottom-8 left-8 z-10">
                    <div class="inline-flex items-center gap-2 bg-accent/90 text-black text-xs font-black px-6 py-2 rounded-3xl mb-4">Моя волна</div>
                    <h1 class="text-6xl font-black tracking-tighter italic">Сегодня для тебя</h1>
                    <p class="text-xl text-dim mt-2">Персональный микс • 24 трека</p>
                </div>
                <div class="absolute bottom-8 right-8 bg-accent text-black w-20 h-20 rounded-3xl flex items-center justify-center shadow-2xl group-active:scale-95 transition-transform">
                    <i data-lucide="play" class="w-10 h-10"></i>
                </div>
            </div>

            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3"><span class="w-1.5 h-8 bg-accent rounded-full"></span> Артисты</h2>
            <div id="home-artists" class="flex gap-6 overflow-x-auto pb-6 snap-x no-scrollbar"></div>

            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 mt-14"><span class="w-1.5 h-8 bg-accent rounded-full"></span> Сейчас в тренде</h2>
            <div id="home-trending" class="space-y-3"></div>

            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 mt-14"><span class="w-1.5 h-8 bg-accent rounded-full"></span> Недавно добавленные</h2>
            <div id="home-recent" class="space-y-3"></div>
        </section>

        <!-- ARTIST PAGE -->
        <section id="page-artist" class="page hidden">
            <div class="relative h-[62vh] w-full overflow-hidden">
                <img id="artist-view-img" class="w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <button onclick="navTo('home')" class="absolute top-8 left-6 glass px-6 py-4 rounded-3xl flex items-center gap-3 text-lg">
                    <i data-lucide="arrow-left"></i> Назад
                </button>
                <div class="absolute bottom-10 left-8">
                    <h1 id="artist-view-name" class="hero-name text-white drop-shadow-2xl italic"></h1>
                </div>
            </div>

            <div class="p-8 -mt-12 relative z-10">
                <button onclick="playArtistAll()" class="w-full bg-accent hover:bg-[#ffe033] text-black font-black py-6 rounded-3xl text-xl flex items-center justify-center gap-4 active:scale-95 transition-all shadow-xl">
                    <i data-lucide="play-circle" class="w-8 h-8"></i> СЛУШАТЬ ВСЁ
                </button>

                <div class="mt-16">
                    <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">Треки <span class="text-accent text-sm font-normal ml-auto">(нумерация)</span></h2>
                    <div id="artist-view-tracks" class="space-y-2"></div>
                </div>

                <div class="mt-20">
                    <h2 class="text-3xl font-bold mb-8">Альбомы</h2>
                    <div id="artist-view-albums" class="flex gap-8 overflow-x-auto pb-8 snap-x no-scrollbar"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- GLASS PLAYER -->
    <div id="player" onclick="openFullPlayer()" class="glass fixed bottom-0 left-0 right-0 p-6 z-50 cursor-pointer">
        <div class="flex items-center gap-5">
            <img id="p-img" class="w-16 h-16 rounded-3xl object-cover ring-2 ring-accent/30 shadow-2xl">
            <div class="flex-1 min-w-0">
                <div id="p-title" class="font-bold text-xl truncate">—</div>
                <div id="p-artist" class="text-dim text-sm truncate">—</div>
            </div>
            <button onclick="event.stopImmediatePropagation(); togglePlay()" class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center shadow-inner active:scale-95">
                <i id="p-play-icon" data-lucide="play" class="w-7 h-7 text-black"></i>
            </button>
        </div>
        <div class="mt-5 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="player-progress" class="h-full bg-accent w-0 transition-all duration-200"></div>
        </div>
    </div>

    <!-- FULLSCREEN MODAL -->
    <div id="full-player-modal" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="modal w-full max-w-lg bg-[#121212] rounded-3xl p-10 text-center">
            <button onclick="closeFullPlayer()" class="absolute top-8 right-8 text-5xl text-white/70 hover:text-white">×</button>
            <img id="modal-img" class="w-72 h-72 mx-auto rounded-3xl object-cover shadow-2xl mb-10 ring-4 ring-accent/40">
            <div id="modal-title" class="text-4xl font-black tracking-tight mb-3"></div>
            <div id="modal-artist" class="text-xl text-dim mb-14"></div>
            
            <div class="flex justify-center gap-12">
                <button onclick="prevTrack()" class="text-4xl"><i data-lucide="skip-back"></i></button>
                <button onclick="togglePlay()" class="w-20 h-20 bg-white text-black rounded-3xl flex items-center justify-center shadow-2xl"><i id="modal-play-icon" data-lucide="pause" class="w-12 h-12"></i></button>
                <button onclick="nextTrack()" class="text-4xl"><i data-lucide="skip-forward"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const USER = "allkks";
        const REPO = "mus";
        let db = { tracks: [], artists: {} };
        let currentPlaylist = [];
        let currentIndex = -1;
        let activeArtist = null;
        const audio = document.getElementById('audio-engine');

        window.onload = async () => { 
            lucide.createIcons(); 
            await loadApp(); 
        };

        // КРИТИЧЕСКАЯ ЛОГИКА — НЕ ТРОГАТЬ
        async function loadApp() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database.json?t=${Date.now()}`);
                const data = await res.json();
                const decoded = decodeURIComponent(escape(atob(data.content)));
                db = JSON.parse(decoded);
                renderHome();
                document.getElementById('main-loader') && (document.getElementById('main-loader').style.display = 'none');
            } catch (e) { 
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                renderHome();
            }
            lucide.createIcons();
        }

        function renderHome() {
            // Артисты — вертикальные карточки-истории
            document.getElementById('home-artists').innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtist('${a.name}')" class="story-card w-48 flex-shrink-0 snap-center cursor-pointer">
                    <div class="relative rounded-3xl overflow-hidden shadow-2xl">
                        <img src="${a.img}" class="w-full aspect-[4/5] object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${a.name}'">
                        <div class="absolute bottom-0 left-0 right-0 h-2/5 bg-gradient-to-t from-black to-transparent"></div>
                        <div class="absolute bottom-6 left-6 text-2xl font-black tracking-tighter">${a.name}</div>
                    </div>
                </div>
            `).join('');

            // Тренды — нумерованные
            document.getElementById('home-trending').innerHTML = db.tracks.slice(0, 8).map((t, i) => createNumberedTrack(t, i+1)).join('');
            // Недавно
            document.getElementById('home-recent').innerHTML = db.tracks.slice(8, 18).map(t => createTrackItem(t)).join('');
        }

        function createNumberedTrack(t, num) {
            return `<div onclick="playTrack(${t.id}, db.tracks)" class="track-hover flex gap-6 p-5 bg-surface rounded-3xl cursor-pointer">
                <div class="font-mono text-5xl font-black text-white/10 w-12 text-right">${num}</div>
                <img src="${t.img}" class="w-14 h-14 rounded-2xl object-cover">
                <div class="flex-1">
                    <div class="font-semibold text-lg">${t.title}</div>
                    <div class="text-dim">${t.artist}</div>
                </div>
                <i data-lucide="more-horizontal" class="w-6 h-6 opacity-40"></i>
            </div>`;
        }

        function createTrackItem(t) {
            return `<div onclick="playTrack(${t.id}, db.tracks)" class="track-hover flex items-center gap-5 p-5 bg-surface rounded-3xl cursor-pointer">
                <img src="${t.img}" class="w-14 h-14 rounded-2xl">
                <div class="flex-1"><div class="font-semibold">${t.title}</div><div class="text-xs text-dim">${t.artist}</div></div>
            </div>`;
        }

        function openArtist(name) {
            const artist = db.artists[name];
            if (!artist) return;
            activeArtist = artist;
            document.getElementById('artist-view-name').innerText = artist.name.toUpperCase();
            document.getElementById('artist-view-img').src = artist.img || 'https://picsum.photos/1200';

            // Треки с крупной нумерацией + меню
            let tracksHTML = artist.tracks.map((t, i) => `
                <div onclick="playTrack(${t.id}, activeArtist.tracks)" class="track-hover flex items-center gap-6 p-5 bg-surface rounded-3xl cursor-pointer">
                    <span class="font-mono text-6xl font-black text-white/15 w-12">${i+1}</span>
                    <div class="flex-1">
                        <div class="font-semibold text-xl">${t.title}</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation(); showTrackMenu('${t.title}')" class="text-3xl opacity-40">…</button>
                </div>
            `).join('');
            document.getElementById('artist-view-tracks').innerHTML = tracksHTML;

            // Горизонтальный carousel альбомов с отражением
            let albumsHTML = (artist.albums || []).map(alb => `
                <div onclick="playAlbum('${artist.name}', '${alb.title}')" class="album-card w-64 flex-shrink-0 snap-center cursor-pointer">
                    <div class="relative rounded-3xl overflow-hidden shadow-2xl">
                        <img src="${alb.cover}" class="w-full aspect-square object-cover">
                        <div class="album-reflection"></div>
                    </div>
                    <div class="mt-6 text-center font-bold text-2xl">${alb.title}</div>
                </div>
            `).join('');
            document.getElementById('artist-view-albums').innerHTML = albumsHTML;

            navTo('artist');
            lucide.createIcons();
        }

        function playRandom() {
            const randomTrack = db.tracks[Math.floor(Math.random() * db.tracks.length)];
            if (randomTrack) playTrack(randomTrack.id, db.tracks);
        }

        function showTrackMenu(title) {
            alert(`Меню трека: ${title}\n(добавить в плейлист / скачать / поделиться)`);
        }

        function openFullPlayer() {
            const modal = document.getElementById('full-player-modal');
            modal.classList.remove('hidden');
            document.getElementById('modal-img').src = document.getElementById('p-img').src;
            document.getElementById('modal-title').innerText = document.getElementById('p-title').innerText;
            document.getElementById('modal-artist').innerText = document.getElementById('p-artist').innerText;
        }

        function closeFullPlayer() {
            document.getElementById('full-player-modal').classList.add('hidden');
        }

        // ВСЯ ОСТАЛЬНАЯ ЛОГИКА АУДИО И НАВИГАЦИИ (НЕ ТРОГАТЬ)
        function playTrack(id, playlist) {
            currentPlaylist = playlist;
            currentIndex = currentPlaylist.findIndex(t => t.id === id);
            const t = currentPlaylist[currentIndex];
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.img;
            audio.src = t.url; 
            audio.play(); 
            updateUI(true);
        }

        function playAlbum(artistName, albumTitle) {
            const artist = db.artists[artistName];
            const albumTracks = artist.tracks.filter(t => t.album === albumTitle);
            if (albumTracks.length) playTrack(albumTracks[0].id, albumTracks);
        }

        function playArtistAll() { 
            if (activeArtist && activeArtist.tracks.length) playTrack(activeArtist.tracks[0].id, activeArtist.tracks); 
        }
        function togglePlay() { 
            audio.paused ? (audio.play(), updateUI(true)) : (audio.pause(), updateUI(false)); 
        }
        function updateUI(p) { 
            document.getElementById('p-play-icon').setAttribute('data-lucide', p ? 'pause' : 'play'); 
            const modalIcon = document.getElementById('modal-play-icon');
            if (modalIcon) modalIcon.setAttribute('data-lucide', p ? 'pause' : 'play');
            lucide.createIcons(); 
        }
        function nextTrack() { 
            if (currentIndex < currentPlaylist.length - 1) playTrack(currentPlaylist[currentIndex + 1].id, currentPlaylist); 
        }
        function prevTrack() { 
            if (currentIndex > 0) playTrack(currentPlaylist[currentIndex - 1].id, currentPlaylist); 
        }
        function navTo(p) { 
            document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden')); 
            document.getElementById('page-'+p).classList.remove('hidden'); 
            document.getElementById('scroll-container').scrollTo(0,0); 
        }
        audio.ontimeupdate = () => { 
            document.getElementById('player-progress').style.width = (audio.currentTime / audio.duration * 100) + "%"; 
        };
        audio.onended = nextTrack;
    </script>
</body>
</html>
