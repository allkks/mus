<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --accent: #9333ea; --bg: #0b0714; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; -webkit-user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .track-card { background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid transparent; transition: 0.2s; }
        .track-card.playing { background: rgba(147, 51, 234, 0.15); border-color: var(--accent); }
        #artist-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
        #artist-page.active { transform: translateX(0); }
        .album-header { font-size: 10px; font-weight: 900; color: #9333ea; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 5px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: 0 0 10px var(--accent); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-40">

    <div class="px-6 pt-12 pb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-white uppercase">UNCENSORED</h1>
    </div>

    <div id="home-view">
        <div class="px-6 mb-10">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-5">Артисты</h3>
            <div id="artist-list" class="flex gap-5 overflow-x-auto no-scrollbar"></div>
        </div>
        <div class="px-6">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-5">Все релизы</h3>
            <div id="track-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="artist-page" class="no-scrollbar">
        <div id="ap-banner" class="h-[280px] relative bg-purple-900 flex items-end p-8">
            <button onclick="closeArtist()" class="absolute top-10 left-6 z-10 w-10 h-10 glass rounded-full flex items-center justify-center z-20"><i class="fa-solid fa-chevron-left text-white"></i></button>
            <div class="absolute inset-0 bg-gradient-to-t from-[#0b0714] to-transparent z-10"></div>
            <h2 id="ap-name" class="text-4xl font-black uppercase relative z-20"></h2>
        </div>
        <div id="ap-content" class="p-6"></div>
    </div>

    <div id="player-bar" class="fixed bottom-6 left-4 right-4 z-[150] translate-y-[200%] transition-transform duration-500">
        <div class="glass rounded-3xl p-3 flex items-center justify-between shadow-2xl" onclick="openFullPlayer()">
            <div class="flex items-center gap-3 overflow-hidden">
                <img id="p-img" src="" class="w-12 h-12 rounded-2xl object-cover bg-purple-900">
                <div class="overflow-hidden"><h4 id="p-title" class="font-bold text-sm truncate text-white"></h4></div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="p-play-btn" class="w-11 h-11 rounded-full bg-white text-black flex items-center justify-center"><i class="fa-solid fa-play"></i></button>
        </div>
    </div>

    <div id="full-player" class="fixed inset-0 bg-[#0b0714] z-[200] p-10 flex flex-col justify-between text-center translate-y-full transition-transform duration-500">
        <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full self-start flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
        <div class="flex flex-col items-center">
            <img id="f-img" src="" class="w-full aspect-square rounded-[50px] shadow-2xl object-cover bg-purple-900 mb-8">
            <h2 id="f-title" class="text-2xl font-black text-white"></h2>
            <p id="f-artist" class="text-purple-400 font-bold uppercase text-xs mt-2 tracking-widest"></p>
        </div>
        <div class="w-full">
            <div class="h-1 bg-white/10 rounded-full mb-8" onclick="seek(event)"><div id="f-progress" class="progress-fill"></div></div>
            <div class="flex justify-around items-center">
                <button onclick="prevTrack()" class="text-3xl"><i class="fa-solid fa-backward-step text-white"></i></button>
                <button onclick="togglePlay()" id="f-play-btn" class="w-20 h-20 bg-white text-black rounded-full text-3xl flex items-center justify-center shadow-xl"><i class="fa-solid fa-play"></i></button>
                <button onclick="nextTrack()" class="text-3xl"><i class="fa-solid fa-forward-step text-white"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const GITHUB_USER = 'allkks', REPO_NAME = 'mus';
        let db = { artists: [], tracks: [] }, currentIdx = -1, currentList = [];
        const audio = document.getElementById('audio');

        async function init() {
            const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/database.json?v=${Date.now()}`);
            db = await res.json();
            render();
        }

        function render() {
            document.getElementById('artist-list').innerHTML = db.artists.map(a => `
                <div onclick="openArtist('${a.id}')" class="flex flex-col items-center gap-3 active:scale-90 transition-transform">
                    <img src="${a.img || 'https://api.dicebear.com/7.x/initials/svg?seed='+a.name}" class="w-20 h-20 rounded-full object-cover border-2 border-purple-500/20 bg-purple-900">
                    <span class="text-[9px] font-black text-gray-500 uppercase">${a.name}</span>
                </div>
            `).join('');
            renderTracks('track-list', db.tracks);
        }

        function renderTracks(containerId, list) {
            const container = document.getElementById(containerId);
            container.innerHTML = list.map((t, idx) => {
                const isPlaying = currentList[currentIdx]?.url === t.url;
                return `
                    <div onclick='playTrack(${idx}, ${JSON.stringify(list).replace(/'/g, "&apos;")})' class="track-card p-4 flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-4 overflow-hidden text-left">
                            <img src="${t.cover || 'https://api.dicebear.com/7.x/shapes/svg?seed='+t.title}" class="w-12 h-12 rounded-xl object-cover bg-purple-900">
                            <div class="overflow-hidden">
                                <h4 class="font-bold text-sm truncate text-white">${t.title}</h4>
                                <p class="text-[9px] text-purple-400 font-black uppercase">${t.album || 'Сингл'}</p>
                            </div>
                        </div>
                        <i class="fa-solid ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play'} text-purple-500 text-xs"></i>
                    </div>
                `;
            }).join('');
        }

        function openArtist(id) {
            const artist = db.artists.find(a => a.id === id);
            const tracks = db.tracks.filter(t => t.artistId === id);
            document.getElementById('ap-name').innerText = artist.name;
            document.getElementById('ap-banner').style.background = `linear-gradient(to top, #0b0714, transparent), url(${artist.img}) center/cover`;
            
            // Группировка по альбомам
            const albums = [...new Set(tracks.map(t => t.album))];
            let html = "";
            albums.forEach(al => {
                html += `<div class="album-header">${al}</div>`;
                const alTracks = tracks.filter(t => t.album === al);
                html += `<div id="album-${al}" class="space-y-3"></div>`;
                setTimeout(() => renderTracks(`album-${al}`, alTracks), 10);
            });
            document.getElementById('ap-content').innerHTML = html;
            document.getElementById('artist-page').classList.add('active');
        }

        function closeArtist() { document.getElementById('artist-page').classList.remove('active'); }

        function playTrack(idx, list) {
            if(currentList === list && currentIdx === idx) { togglePlay(); return; }
            currentList = list; currentIdx = idx;
            audio.src = currentList[currentIdx].url; audio.play();
            document.getElementById('player-bar').classList.remove('translate-y-[200%]');
            updateUI();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateUI(); }

        function updateUI() {
            const t = currentList[currentIdx];
            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-img').src = t.cover || '';
            document.getElementById('p-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = t.album;
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            renderTracks('track-list', db.tracks);
        }

        function openFullPlayer() { document.getElementById('full-player').style.transform = 'translateY(0)'; }
        function closeFullPlayer() { document.getElementById('full-player').style.transform = 'translateY(100%)'; }
        function seek(e) { audio.currentTime = (e.clientX - 40) / (window.innerWidth - 80) * audio.duration; }
        audio.ontimeupdate = () => { document.getElementById('f-progress').style.width = (audio.currentTime / audio.duration * 100) + '%'; };
        audio.onended = () => { if(currentIdx < currentList.length - 1) playTrack(currentIdx + 1, currentList); };
        function prevTrack() { if(currentIdx > 0) playTrack(currentIdx - 1, currentList); }
        function nextTrack() { if(currentIdx < currentList.length - 1) playTrack(currentIdx + 1, currentList); }

        init();
    </script>
</body>
</html>
