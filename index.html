<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Music Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --accent: #a855f7;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.04);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: white;
            -webkit-user-select: none;
            overflow-x: hidden;
            margin: 0;
        }

        .glass {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .track-card {
            background: var(--card-bg);
            border-radius: 18px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .track-card.playing {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
        }

        #artist-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }

        #artist-page.active { transform: translateY(0); }

        .progress-container {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            width: 0%;
            border-radius: 10px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #player-bar {
            transform: translateY(150%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #player-bar.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .album-label {
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 30px 0 12px 4px;
            display: flex;
            items-center: center;
            gap: 10px;
        }

        .album-label::after {
            content: '';
            height: 1px;
            flex: 1;
            background: rgba(168, 85, 247, 0.2);
        }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="px-6 pt-10 pb-4 flex justify-between items-center">
        <div>
            <p class="text-[10px] font-bold text-purple-500 uppercase tracking-[0.3em] mb-1">Premium Collection</p>
            <h1 class="text-3xl font-extrabold tracking-tight">UNCENSORED</h1>
        </div>
        <div class="w-11 h-11 rounded-full glass flex items-center justify-center active:scale-90 transition-transform">
            <i class="fa-solid fa-magnifying-glass text-sm opacity-70"></i>
        </div>
    </header>

    <main id="home-view">
        <!-- Artists -->
        <section class="mt-4">
            <div class="px-6 mb-5">
                <h3 class="text-lg font-bold text-white/90">Исполнители</h3>
            </div>
            <div id="artist-list" class="flex gap-6 overflow-x-auto px-6 no-scrollbar snap-x">
                <!-- Артисты -->
            </div>
        </section>

        <!-- All Releases -->
        <section class="mt-10 px-6">
            <h3 class="text-lg font-bold mb-5 text-white/90">Все треки</h3>
            <div id="track-list" class="space-y-3">
                <!-- Треки -->
            </div>
        </section>
    </main>

    <!-- Artist Page Overlay -->
    <div id="artist-page" class="overflow-y-auto no-scrollbar">
        <div id="ap-banner" class="h-[42vh] relative flex items-end p-8 bg-cover bg-center">
            <button onclick="closeArtist()" class="fixed top-10 left-6 z-[110] w-10 h-10 glass rounded-full flex items-center justify-center">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/30 to-transparent z-10"></div>
            <h2 id="ap-name" class="text-5xl font-extrabold tracking-tighter relative z-20 uppercase"></h2>
        </div>
        
        <div class="p-6 relative z-20 bg-[#050505]">
            <div id="ap-content"></div>
        </div>
        <div class="h-40"></div>
    </div>

    <!-- Mini Player -->
    <div id="player-bar" class="fixed bottom-8 left-4 right-4 z-[150]">
        <div class="glass rounded-[22px] p-2 flex items-center justify-between shadow-2xl" onclick="openFullPlayer()">
            <div class="flex items-center gap-3 min-w-0">
                <img id="p-img" src="" class="w-12 h-12 rounded-lg object-cover bg-neutral-900">
                <div class="min-w-0">
                    <h4 id="p-title" class="font-bold text-sm truncate pr-2"></h4>
                    <p id="p-subtitle" class="text-[10px] text-neutral-400 uppercase font-bold tracking-tight"></p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="event.stopPropagation(); togglePlay();" id="p-play-btn" class="w-11 h-11 rounded-full bg-white text-black flex items-center justify-center active:scale-90 transition-transform">
                    <i class="fa-solid fa-play"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Full Player -->
    <div id="full-player" class="fixed inset-0 bg-[#050505] z-[200] translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.32, 0.72, 0, 1)]">
        <div class="h-full flex flex-col p-8 pt-12">
            <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full flex items-center justify-center mb-8">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            
            <div class="flex-1 flex flex-col justify-center">
                <img id="f-img" src="" class="w-full aspect-square rounded-[40px] shadow-2xl object-cover bg-neutral-900 mb-12">
                <div class="text-left px-2">
                    <h2 id="f-title" class="text-3xl font-black tracking-tight mb-2"></h2>
                    <p id="f-artist" class="text-lg text-purple-400 font-bold opacity-80 uppercase tracking-wider"></p>
                </div>
            </div>

            <div class="w-full mt-auto pb-10">
                <div class="flex justify-between text-[10px] font-bold text-neutral-500 mb-3 uppercase tracking-widest">
                    <span id="f-current-time">0:00</span>
                    <span id="f-duration">0:00</span>
                </div>
                <div class="progress-container mb-12" id="f-seek-bar" onclick="seek(event)">
                    <div id="f-progress" class="progress-fill"></div>
                </div>
                
                <div class="flex justify-around items-center">
                    <button onclick="prevTrack()" class="text-2xl opacity-60 active:opacity-100"><i class="fa-solid fa-backward-step"></i></button>
                    <button onclick="togglePlay()" id="f-play-btn" class="w-24 h-24 bg-white text-black rounded-full text-4xl flex items-center justify-center shadow-xl active:scale-90 transition-transform">
                        <i class="fa-solid fa-play ml-1"></i>
                    </button>
                    <button onclick="nextTrack()" class="text-2xl opacity-60 active:opacity-100"><i class="fa-solid fa-forward-step"></i></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const GITHUB_USER = 'allkks', REPO_NAME = 'mus';
        let db = { artists: [], tracks: [] }, currentIdx = -1, currentList = [];
        const audio = document.getElementById('audio');

        async function init() {
            try {
                // Анти-кеш: добавляем временную метку
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/database.json?v=${Date.now()}`);
                db = await res.json();
                render();
            } catch (e) { console.error("Database error"); }
        }

        function render() {
            // Список артистов
            document.getElementById('artist-list').innerHTML = db.artists.map(a => `
                <div onclick="openArtist('${a.id}')" class="flex flex-col items-center gap-3 active:scale-95 transition-transform snap-center min-w-[90px]">
                    <div class="w-20 h-20 rounded-full overflow-hidden border-2 border-white/5 shadow-xl">
                        <img src="${a.img || 'https://api.dicebear.com/7.x/initials/svg?seed='+a.name}" class="w-full h-full object-cover bg-neutral-900">
                    </div>
                    <span class="text-[10px] font-extrabold text-neutral-400 uppercase tracking-tighter text-center leading-tight">${a.name}</span>
                </div>
            `).join('');

            renderTracks('track-list', db.tracks);
        }

        function renderTracks(containerId, list) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = list.map((t, idx) => {
                const isPlaying = currentList[currentIdx]?.url === t.url;
                const icon = (isPlaying && !audio.paused) ? 'fa-pause' : 'fa-play';
                return `
                    <div onclick='playTrack(${idx}, ${JSON.stringify(list).replace(/'/g, "&apos;")})' 
                         class="track-card p-4 flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-4 overflow-hidden min-w-0">
                            <div class="relative w-12 h-12 flex-shrink-0">
                                <img src="${t.cover || 'https://api.dicebear.com/7.x/shapes/svg?seed='+t.title}" class="w-full h-full rounded-xl object-cover bg-neutral-800">
                                ${isPlaying && !audio.paused ? '<div class="absolute inset-0 bg-purple-600/30 rounded-xl flex items-center justify-center"><div class="w-1 h-3 bg-white animate-bounce mx-0.5"></div><div class="w-1 h-4 bg-white animate-bounce"></div><div class="w-1 h-2 bg-white animate-bounce mx-0.5"></div></div>' : ''}
                            </div>
                            <div class="min-w-0">
                                <h4 class="font-bold text-sm truncate text-white">${t.title}</h4>
                                <p class="text-[10px] text-neutral-500 font-bold uppercase tracking-tight">${t.album || 'Single'}</p>
                            </div>
                        </div>
                        <div class="text-neutral-500 text-xs px-2">
                             <i class="fa-solid ${icon} ${isPlaying ? 'text-purple-500' : ''}"></i>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openArtist(id) {
            const artist = db.artists.find(a => a.id === id);
            const tracks = db.tracks.filter(t => t.artistId === id);
            
            document.getElementById('ap-name').innerText = artist.name;
            document.getElementById('ap-banner').style.backgroundImage = `url(${artist.img})`;
            
            // Группировка
            const albumNames = [...new Set(tracks.map(t => t.album || 'Синглы'))];
            let html = "";
            
            albumNames.forEach(al => {
                const albumId = al.replace(/\s/g, '_');
                html += `<div class="album-label">${al}</div>`;
                html += `<div id="album-${albumId}" class="space-y-3"></div>`;
            });

            document.getElementById('ap-content').innerHTML = html;
            document.getElementById('artist-page').classList.add('active');

            setTimeout(() => {
                albumNames.forEach(al => {
                    const albumId = al.replace(/\s/g, '_');
                    const alTracks = tracks.filter(t => (t.album || 'Синглы') === al);
                    renderTracks(`album-${albumId}`, alTracks);
                });
            }, 50);
        }

        function closeArtist() { document.getElementById('artist-page').classList.remove('active'); }

        function playTrack(idx, list) {
            if(currentList === list && currentIdx === idx) { togglePlay(); return; }
            currentList = list; currentIdx = idx;
            audio.src = currentList[currentIdx].url; audio.play();
            document.getElementById('player-bar').classList.add('visible');
            updateUI();
        }

        function togglePlay() { 
            audio.paused ? audio.play() : audio.pause(); 
            updateUI(); 
        }

        function updateUI() {
            const t = currentList[currentIdx];
            if(!t) return;
            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            const artist = db.artists.find(a => a.id === t.artistId)?.name || 'Unknown';
            
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-subtitle').innerText = artist;
            document.getElementById('p-img').src = t.cover || '';
            document.getElementById('p-play-btn').innerHTML = `<i class="fa-solid ${icon}${audio.paused ? ' ml-0.5' : ''}"></i>`;

            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = artist;
            document.getElementById('f-img').src = t.cover || '';
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon}${audio.paused ? ' ml-1' : ''}"></i>`;

            // Обновляем все списки
            renderTracks('track-list', db.tracks);
            if(document.getElementById('artist-page').classList.contains('active')) {
                const curArtId = t.artistId;
                const tracks = db.tracks.filter(tr => tr.artistId === curArtId);
                const albumNames = [...new Set(tracks.map(tr => tr.album || 'Синглы'))];
                albumNames.forEach(al => {
                    const albumId = al.replace(/\s/g, '_');
                    const alTracks = tracks.filter(tr => (tr.album || 'Синглы') === al);
                    renderTracks(`album-${albumId}`, alTracks);
                });
            }
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }

        function seek(e) { 
            const rect = document.getElementById('f-seek-bar').getBoundingClientRect();
            const x = e.clientX - rect.left;
            audio.currentTime = (x / rect.width) * audio.duration; 
        }

        audio.ontimeupdate = () => {
            if(!audio.duration) return;
            const p = (audio.currentTime / audio.duration * 100);
            document.getElementById('f-progress').style.width = p + '%';
            
            const fmt = s => {
                let m = Math.floor(s/60), sec = Math.floor(s%60);
                return m + ":" + (sec < 10 ? "0"+sec : sec);
            }
            document.getElementById('f-current-time').innerText = fmt(audio.currentTime);
            document.getElementById('f-duration').innerText = fmt(audio.duration);
        };

        audio.onended = () => nextTrack();

        function prevTrack() { if(currentIdx > 0) playTrack(currentIdx - 1, currentList); }
        function nextTrack() { if(currentIdx < currentList.length - 1) playTrack(currentIdx + 1, currentList); }

        init();
    </script>
</body>
</html>
