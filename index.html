<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUS.LIB — Premium Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bg: '#0a0510', accent: '#8a2be2', surface: '#1a1225', text: '#ffffff', dim: '#b3a9c0', heart: '#ff2d55', brandY: '#ffcc00' },
                    fontFamily: { sans: ['Manrope', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0510; color: #ffffff; font-family: 'Manrope', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-player { background: rgba(26, 18, 37, 0.98); backdrop-filter: blur(30px); border-top: 1px solid rgba(138, 43, 226, 0.2); }
        .hero-bg { background: linear-gradient(180deg, transparent 0%, rgba(10, 5, 16, 1) 100%); }
        .wave-purple { background: linear-gradient(135deg, #8a2be2 0%, #ff2d55 100%); }
        .btn-active:active { transform: scale(0.96); }
        /* Контейнер для горизонтального скролла с примагничиванием */
        .h-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .h-scroll > div { scroll-snap-align: start; flex-shrink: 0; }
    </style>
</head>
<body>

    <main id="scroll-container" class="h-screen overflow-y-auto no-scrollbar pb-44">
        
        <!-- HEADER -->
        <div class="p-6 pt-10 sticky top-0 bg-bg/90 backdrop-blur-xl z-50 flex items-center gap-4">
            <div class="flex-1 flex items-center gap-3 bg-surface/50 border border-white/5 rounded-2xl px-5 py-3 focus-within:border-accent transition-all">
                <i data-lucide="search" class="w-4 h-4 text-dim"></i>
                <input id="search-input" type="text" placeholder="Треки, артисты" class="bg-transparent border-none outline-none w-full text-sm" oninput="handleSearch()">
            </div>
            <button class="w-10 h-10 rounded-full bg-surface flex items-center justify-center border border-white/5"><i data-lucide="user" class="w-5 h-5"></i></button>
        </div>

        <!-- HOME -->
        <section id="page-home" class="page p-4">
            <!-- МОЯ ВОЛНА -->
            <div onclick="playRandom()" class="relative h-48 rounded-[2rem] overflow-hidden mb-10 yandex-gradient btn-active shadow-2xl p-8 flex flex-col justify-end">
                <div class="absolute top-6 right-6 w-20 h-20 bg-white/10 rounded-full blur-3xl"></div>
                <h2 class="text-4xl font-black italic tracking-tighter">Моя волна</h2>
                <p class="text-white/70 text-sm">Музыка под настроение</p>
                <div class="absolute bottom-6 right-6 w-12 h-12 bg-white rounded-full flex items-center justify-center"><i data-lucide="play" class="fill-black text-black ml-1"></i></div>
            </div>

            <!-- ЛЮБИМОЕ (ГОРИЗОНТАЛЬНО) -->
            <div id="fav-section" class="hidden mb-10">
                <h2 class="text-xl font-bold mb-4 px-2 flex items-center justify-between">
                    <span>Мне нравится</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-dim"></i>
                </h2>
                <div id="favorites-list" class="h-scroll gap-4 px-2 no-scrollbar"></div>
            </div>

            <h2 class="text-xl font-bold mb-6 px-2">Исполнители</h2>
            <div id="home-artists" class="h-scroll gap-4 px-2 no-scrollbar mb-10"></div>

            <h2 class="text-xl font-bold mb-6 px-2">Популярно сегодня</h2>
            <div id="home-trending" class="space-y-1"></div>
        </section>

        <!-- ARTIST PAGE (ЯНДЕКС СТИЛЬ) -->
        <section id="page-artist" class="page hidden">
            <!-- HERO -->
            <div class="relative h-[60vh] w-full flex flex-col justify-end">
                <img id="artist-view-img" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 hero-bg"></div>
                <div class="absolute inset-0 bg-black/20"></div>
                
                <button onclick="navTo('home')" class="absolute top-6 left-6 bg-black/40 p-3 rounded-full backdrop-blur-xl border border-white/10"><i data-lucide="chevron-left"></i></button>

                <div class="relative p-6 pb-10">
                    <h1 id="artist-view-name" class="text-6xl font-black italic tracking-tighter mb-4 leading-none"></h1>
                    <div class="flex items-center gap-6 mb-8">
                        <div class="text-center">
                            <div class="text-white/60 text-[10px] font-bold uppercase tracking-widest">Лайков</div>
                            <div class="font-bold text-lg">719</div>
                        </div>
                        <div class="w-[1px] h-8 bg-white/10"></div>
                        <button class="bg-brandY text-black px-8 py-3 rounded-full font-bold flex items-center gap-2 btn-active" onclick="playArtistTracks()">
                            <i data-lucide="play" class="fill-black w-5 h-5"></i> Слушать
                        </button>
                    </div>
                </div>
            </div>

            <!-- POPULAR TRACKS (3 IN ROW) -->
            <div class="px-4 mb-10">
                <h2 class="text-xl font-bold mb-4 flex items-center justify-between">
                    <span>Популярные треки</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-dim"></i>
                </h2>
                <div id="artist-view-tracks-scroll" class="h-scroll gap-4 no-scrollbar">
                    <!-- Сюда вставятся треки по 3 штуки в колонку -->
                </div>
            </div>

            <!-- ARTIST WAVE -->
            <div class="px-4 mb-10">
                <div onclick="playRandom()" class="wave-purple p-6 rounded-3xl flex items-center justify-between btn-active">
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest opacity-70">Моя волна по исполнителю</div>
                        <div id="artist-wave-name" class="text-xl font-black italic">Артист</div>
                    </div>
                    <i data-lucide="play" class="w-10 h-10 fill-white"></i>
                </div>
            </div>

            <!-- POPULAR ALBUMS -->
            <div class="px-4 mb-10">
                <h2 class="text-xl font-bold mb-4 flex items-center justify-between">
                    <span>Популярные альбомы</span>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-dim"></i>
                </h2>
                <div id="artist-view-albums" class="h-scroll gap-6 no-scrollbar pb-4">
                    <!-- Альбомы -->
                </div>
            </div>
        </section>
    </main>

    <!-- ПЛЕЕР -->
    <div id="player" class="glass-player fixed bottom-6 left-2 right-2 rounded-[2rem] p-4 z-[100] transition-all duration-500 translate-y-44">
        <div class="flex items-center gap-4">
            <img id="p-img" class="w-12 h-12 rounded-xl object-cover" onclick="openFullscreenPlayer()">
            <div class="flex-1 overflow-hidden" onclick="openFullscreenPlayer()">
                <div id="p-title" class="font-bold truncate text-sm">---</div>
                <div id="p-artist" class="text-dim text-[10px] font-bold uppercase tracking-widest truncate">---</div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleFavorite(currentTrackId)"><i id="p-heart" data-lucide="heart" class="w-6 h-6"></i></button>
                <button onclick="togglePlay()" class="w-12 h-12 flex items-center justify-center bg-white text-black rounded-full btn-active"><i id="p-play-icon" data-lucide="play" class="fill-black"></i></button>
                <button onclick="nextTrack()"><i data-lucide="skip-forward" class="w-6 h-6 text-dim"></i></button>
            </div>
        </div>
        <div class="absolute top-0 left-10 right-10 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="player-progress" class="h-full bg-accent w-0"></div>
        </div>
    </div>

    <!-- ТАБ БАР -->
    <div class="fixed bottom-0 left-0 right-0 h-20 glass-player flex items-center justify-around z-[90] px-6">
        <button onclick="navTo('home')" class="flex flex-col items-center gap-1 text-accent"><i data-lucide="home"></i><span class="text-[9px] font-bold uppercase">Главная</span></button>
        <button class="flex flex-col items-center gap-1 text-dim/50"><i data-lucide="music-2"></i><span class="text-[9px] font-bold uppercase">Коллекция</span></button>
        <button class="flex flex-col items-center gap-1 text-dim/50"><i data-lucide="heart"></i><span class="text-[9px] font-bold uppercase">Моё</span></button>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const USER = "allkks";
        const REPO = "mus";
        let db = { tracks: [], artists: {} };
        let currentPlaylist = [];
        let currentIndex = -1;
        let currentTrackId = null;
        let favorites = JSON.parse(localStorage.getItem('user_favorites') || '[]');
        const audio = document.getElementById('audio-engine');

        window.onload = async () => { lucide.createIcons(); await fetchData(); };

        async function fetchData() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database.json?t=${Date.now()}`);
                db = await res.json();
                renderHome();
            } catch (e) { console.error("Error", e); }
        }

        function renderHome() {
            // Артисты
            document.getElementById('home-artists').innerHTML = Object.values(db.artists).map(a => `
                <div onclick="openArtistPage('${a.name}')" class="w-32 text-center btn-active cursor-pointer">
                    <img src="${a.img}" class="w-24 h-24 rounded-full mx-auto object-cover mb-3 border border-white/5 shadow-xl">
                    <div class="text-[11px] font-bold uppercase tracking-widest truncate px-2">${a.name}</div>
                </div>`).join('');

            // Популярное
            document.getElementById('home-trending').innerHTML = db.tracks.slice(0, 5).map(t => renderTrackItemVertical(t)).join('');
            renderFavorites();
            lucide.createIcons();
        }

        // Вертикальный список треков (как в поиске или чарте)
        function renderTrackItemVertical(t) {
            const isFav = favorites.includes(t.id);
            return `
                <div class="flex items-center gap-4 p-3 rounded-2xl active:bg-white/5 transition-all group">
                    <img src="${t.img}" class="w-12 h-12 rounded-lg object-cover" onclick="playTrack(${t.id}, db.tracks)">
                    <div class="flex-1 min-w-0" onclick="playTrack(${t.id}, db.tracks)">
                        <div class="font-bold text-sm truncate">${t.title}</div>
                        <div class="text-[10px] text-dim font-bold uppercase tracking-wider">${t.artist}</div>
                    </div>
                    <button onclick="toggleFavorite(${t.id})"><i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-heart text-heart' : 'text-dim/20'}"></i></button>
                </div>`;
        }

        function renderFavorites() {
            const favTracks = db.tracks.filter(t => favorites.includes(t.id));
            const container = document.getElementById('favorites-list');
            if(favTracks.length > 0) {
                document.getElementById('fav-section').classList.remove('hidden');
                container.innerHTML = favTracks.map(t => `
                    <div onclick="playTrack(${t.id}, db.tracks)" class="w-40 bg-surface/40 p-4 rounded-[2rem] btn-active">
                        <img src="${t.img}" class="w-full aspect-square rounded-2xl object-cover mb-3 shadow-lg">
                        <div class="font-bold text-xs truncate">${t.title}</div>
                        <div class="text-[9px] text-dim uppercase font-bold truncate">${t.artist}</div>
                    </div>`).join('');
            }
        }

        function openArtistPage(name) {
            const artist = db.artists[name];
            if(!artist) return;
            document.getElementById('artist-view-img').src = artist.img;
            document.getElementById('artist-view-name').innerText = artist.name;
            document.getElementById('artist-wave-name').innerText = artist.name;

            // Рендер треков группами по 3 (как в ленте)
            const trackGroups = [];
            for (let i = 0; i < artist.tracks.length; i += 3) {
                trackGroups.push(artist.tracks.slice(i, i + 3));
            }

            document.getElementById('artist-view-tracks-scroll').innerHTML = trackGroups.map(group => `
                <div class="w-[85vw] flex flex-col gap-2">
                    ${group.map(t => `
                        <div onclick="playTrack(${t.id}, db.artists['${name}'].tracks)" class="flex items-center gap-4 bg-surface/30 p-3 rounded-2xl">
                            <img src="${t.img}" class="w-12 h-12 rounded-lg object-cover">
                            <div class="flex-1 truncate"><div class="font-bold text-sm truncate">${t.title}</div></div>
                            <i data-lucide="more-horizontal" class="w-5 h-5 text-dim"></i>
                        </div>`).join('')}
                </div>`).join('');

            // Рендер альбомов
            document.getElementById('artist-view-albums').innerHTML = (artist.albums || []).map(alb => `
                <div class="w-40 btn-active cursor-pointer" onclick="playAlbum('${name}', '${alb.title}')">
                    <img src="${alb.cover}" class="w-40 h-40 rounded-3xl object-cover mb-3 shadow-2xl">
                    <div class="font-bold text-sm truncate">${alb.title}</div>
                    <div class="text-[10px] text-dim font-bold">${alb.year || '2026'}</div>
                </div>`).join('');

            navTo('artist'); lucide.createIcons();
        }

        // --- PLAYER LOGIC ---
        function playTrack(id, list) {
            currentPlaylist = list;
            currentIndex = list.findIndex(t => t.id === id);
            const t = list[currentIndex];
            currentTrackId = id;
            document.getElementById('p-title').innerText = t.title;
            document.getElementById('p-artist').innerText = t.artist;
            document.getElementById('p-img').src = t.img;
            audio.src = t.url; audio.play();
            updatePlayIcon(true); updateHeartIcons();
            document.getElementById('player').classList.remove('translate-y-44');
        }

        function togglePlay() { audio.paused ? (audio.play(), updatePlayIcon(true)) : (audio.pause(), updatePlayIcon(false)); }
        function updatePlayIcon(p) { document.getElementById('p-play-icon').setAttribute('data-lucide', p ? 'pause' : 'play'); lucide.createIcons(); }
        
        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if(idx > -1) favorites.splice(idx, 1); else favorites.push(id);
            localStorage.setItem('user_favorites', JSON.stringify(favorites));
            updateHeartIcons(); fetchData();
        }

        function updateHeartIcons() {
            const isFav = favorites.includes(currentTrackId);
            document.getElementById('p-heart').className = `w-6 h-6 ${isFav ? 'fill-heart text-heart' : 'text-dim/20'}`;
            lucide.createIcons();
        }

        function nextTrack() { if(currentIndex < currentPlaylist.length - 1) playTrack(currentPlaylist[currentIndex+1].id, currentPlaylist); }
        function navTo(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden')); document.getElementById('page-'+p).classList.remove('hidden'); document.getElementById('scroll-container').scrollTo(0,0); }
        audio.ontimeupdate = () => { document.getElementById('player-progress').style.width = (audio.currentTime/audio.duration)*100+"%"; };
        audio.onended = nextTrack;
    </script>
</body>
</html>
