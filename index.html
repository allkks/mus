<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uncensored Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --accent: #9333ea; --bg: #0b0714; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; -webkit-user-select: none; overflow-x: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Genres */
        .chip { padding: 10px 22px; border-radius: 16px; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.05); white-space: nowrap; transition: 0.3s; }
        .chip.active { background: var(--accent); box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4); }

        /* Track Cards */
        .track-card { background: rgba(255,255,255,0.03); border-radius: 24px; transition: 0.2s; border: 1px solid transparent; }
        .track-card.playing { background: rgba(147, 51, 234, 0.12); border-color: rgba(147, 51, 234, 0.3); }

        /* Full Player */
        #full-player { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 100; transform: translateY(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #full-player.active { transform: translateY(0); }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: 0 0 15px var(--accent); }

        /* Loader */
        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-40">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full border-2 border-purple-500 p-1 shadow-lg shadow-purple-500/20">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Music" class="w-full h-full rounded-full bg-purple-900">
            </div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter leading-none text-white">UNCENSORED</h1>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Premium Access</p>
            </div>
        </div>
        <button onclick="toggleAdmin()" class="w-11 h-11 glass rounded-full flex items-center justify-center text-gray-400">
            <i class="fa-solid fa-sliders"></i>
        </button>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="user-view">
        <!-- Genre Filter -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar px-6 mb-10" id="genre-list">
            <button onclick="filterGenre('All')" class="chip active">🔥 Популярное</button>
            <button onclick="filterGenre('Rock')" class="chip">🎸 Рок</button>
            <button onclick="filterGenre('Rap')" class="chip">🎤 Рэп</button>
            <button onclick="filterGenre('Pop')" class="chip">✨ Поп</button>
        </div>

        <!-- Artists Horizontal -->
        <div class="px-6 mb-10">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-[0.2em] mb-5">Исполнители</h3>
            <div id="artist-slider" class="flex gap-6 overflow-x-auto no-scrollbar">
                <!-- Artists dynamic -->
            </div>
        </div>

        <!-- Tracks List -->
        <div class="px-6">
            <h3 class="text-[11px] font-black text-gray-500 uppercase tracking-[0.2em] mb-5">Все треки</h3>
            <div id="tracks-list" class="space-y-4">
                <!-- Tracks dynamic -->
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-view" class="hidden px-6 pb-20">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black text-purple-500">Админ-панель</h2>
            <button onclick="saveToGithub()" id="save-btn" class="bg-green-600 px-6 py-2 rounded-full text-xs font-black shadow-lg shadow-green-900/40">ОПУБЛИКОВАТЬ</button>
        </div>

        <!-- Auth -->
        <div class="glass p-5 rounded-3xl mb-6 border-purple-500/30">
            <p class="text-[10px] font-bold text-purple-400 mb-3 uppercase">Настройки доступа</p>
            <input id="gh-token" type="password" placeholder="GitHub Token (ghp_...)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-purple-500 mb-2">
            <p class="text-[9px] text-gray-500">Токен хранится только на твоем устройстве.</p>
        </div>

        <!-- Add Items -->
        <div class="glass p-6 rounded-[35px] mb-8">
            <p class="text-[10px] font-bold text-gray-400 mb-4 uppercase">Новый контент</p>
            <input id="adm-title" type="text" placeholder="Название / Имя" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-3 outline-none text-sm">
            <input id="adm-img" type="text" placeholder="URL фото (для артиста)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-3 outline-none text-sm">
            <input id="adm-url" type="text" placeholder="URL MP3 (для трека)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-3 outline-none text-sm">
            <select id="adm-genre" class="w-full bg-[#161122] border border-white/10 rounded-xl p-4 mb-6 text-sm outline-none">
                <option value="Rock">Жанр: Рок</option>
                <option value="Rap">Жанр: Рэп</option>
                <option value="Pop">Жанр: Поп</option>
            </select>
            
            <div class="flex gap-3">
                <button onclick="addArtist()" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-xs">АРТИСТ</button>
                <button onclick="addTrack()" class="flex-1 bg-purple-600 py-4 rounded-2xl font-black text-xs">ТРЕК</button>
            </div>
        </div>

        <!-- Manage List -->
        <div id="admin-manage-list" class="space-y-3"></div>
    </div>

    <!-- Mini Player -->
    <div id="mini-player" class="fixed bottom-6 left-4 right-4 z-[60] translate-y-[200%] transition-transform duration-500">
        <div class="glass rounded-[30px] p-3 flex items-center justify-between shadow-2xl" onclick="openFullPlayer()">
            <div class="flex items-center gap-4 overflow-hidden">
                <img id="m-img" src="" class="w-12 h-12 rounded-2xl object-cover bg-purple-900">
                <div class="overflow-hidden">
                    <h4 id="m-title" class="font-bold text-sm truncate">...</h4>
                    <p id="m-artist" class="text-[10px] text-gray-500 font-bold uppercase tracking-wider truncate">...</p>
                </div>
            </div>
            <button onclick="event.stopPropagation(); togglePlay();" id="m-play-btn" class="w-11 h-11 rounded-full bg-white text-black flex items-center justify-center shadow-lg"><i class="fa-solid fa-play"></i></button>
        </div>
    </div>

    <!-- Full Player -->
    <div id="full-player" class="p-10 flex flex-col justify-between">
        <div class="flex justify-between items-center">
            <button onclick="closeFullPlayer()" class="w-12 h-12 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
            <div class="text-center"><p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Now Playing</p></div>
            <div class="w-12"></div>
        </div>

        <div class="flex flex-col items-center">
            <img id="f-img" src="" class="w-full aspect-square rounded-[60px] shadow-2xl object-cover bg-purple-900 mb-12 shadow-purple-900/40">
            <div class="w-full text-center">
                <h2 id="f-title" class="text-3xl font-black truncate px-4">...</h2>
                <p id="f-artist" class="text-xl text-purple-500 font-bold mt-2 uppercase tracking-widest">...</p>
            </div>
        </div>

        <div class="w-full">
            <div class="h-1.5 bg-white/10 rounded-full mb-4" onclick="seek(event)"><div id="f-progress" class="progress-fill"></div></div>
            <div class="flex justify-between text-[10px] font-bold text-gray-600 mb-10 tracking-widest px-1">
                <span id="f-time-curr">0:00</span><span id="f-time-total">0:00</span>
            </div>
            <div class="flex justify-around items-center">
                <button onclick="prevTrack()" class="text-3xl opacity-80"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" id="f-play-btn" class="w-24 h-24 bg-white text-black rounded-full text-4xl flex items-center justify-center shadow-2xl"><i class="fa-solid fa-play ml-1"></i></button>
                <button onclick="nextTrack()" class="text-3xl opacity-80"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // --- CONFIG ---
        const GITHUB_USER = 'allkks';
        const REPO_NAME = 'mus';
        const FILE_PATH = 'database.json';

        let database = { artists: [], tracks: [] };
        let filteredTracks = [];
        let currentIdx = -1;
        let isAdmin = false;
        const audio = document.getElementById('audio');

        // Initial Load
        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${FILE_PATH}?t=${Date.now()}`);
                database = await res.json();
                filteredTracks = database.tracks;
                render();
                // Load token if saved
                if(localStorage.getItem('gh_token')) document.getElementById('gh-token').value = localStorage.getItem('gh_token');
            } catch(e) { console.error("Database not found. Create database.json on GitHub!"); }
        }

        function render() {
            // Artists slider
            document.getElementById('artist-slider').innerHTML = database.artists.map(a => `
                <div onclick="filterByArtist('${a.name}')" class="flex flex-col items-center gap-3 flex-shrink-0 active:scale-90 transition-transform">
                    <img src="${a.img}" class="w-20 h-20 rounded-full object-cover border-2 border-purple-500/20 shadow-lg">
                    <span class="text-[10px] font-black text-gray-500 uppercase text-center w-20 truncate tracking-tighter">${a.name}</span>
                </div>
            `).join('');

            // Tracks list
            document.getElementById('tracks-list').innerHTML = filteredTracks.map((t, idx) => {
                const isPlaying = currentIdx !== -1 && filteredTracks[currentIdx].url === t.url;
                const art = database.artists.find(a => a.name === t.artist) || { img: '' };
                return `
                    <div onclick="playTrack(${idx})" class="track-card p-5 flex items-center justify-between ${isPlaying ? 'playing' : ''}">
                        <div class="flex items-center gap-5 overflow-hidden">
                            <img src="${art.img}" class="w-14 h-14 rounded-2xl object-cover shadow-md bg-purple-900">
                            <div class="overflow-hidden">
                                <h4 class="font-bold text-sm text-white truncate mb-1">${t.title}</h4>
                                <p class="text-[10px] text-purple-400 font-black uppercase tracking-widest">${t.artist}</p>
                            </div>
                        </div>
                        <div class="w-10 h-10 glass rounded-full flex items-center justify-center text-purple-500">
                            <i class="fa-solid ${isPlaying && !audio.paused ? 'fa-pause' : 'fa-play'} text-[10px]"></i>
                        </div>
                    </div>
                `;
            }).join('');

            // Admin List
            if(isAdmin) {
                document.getElementById('admin-manage-list').innerHTML = `
                    <p class="text-[10px] font-black text-purple-500 mb-2 uppercase">Управление</p>
                    ${database.tracks.map((t, i) => `
                        <div class="flex justify-between items-center glass p-4 rounded-2xl text-xs mb-2">
                            <span class="truncate pr-4">${t.artist} - ${t.title}</span>
                            <button onclick="deleteItem('tracks', ${i})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    `).join('')}
                    ${database.artists.map((a, i) => `
                        <div class="flex justify-between items-center glass p-4 rounded-2xl text-xs mb-2 border-l-4 border-indigo-500">
                            <span>Артист: ${a.name}</span>
                            <button onclick="deleteItem('artists', ${i})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    `).join('')}
                `;
            }
        }

        // ADMIN FUNCTIONS
        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('user-view').classList.toggle('hidden', isAdmin);
            document.getElementById('admin-view').classList.toggle('hidden', !isAdmin);
            if(isAdmin) render();
        }

        function addArtist() {
            const name = document.getElementById('adm-title').value;
            const img = document.getElementById('adm-img').value;
            if(!name || !img) return alert("Заполни имя и фото!");
            database.artists.push({ name, img });
            render();
            alert("Артист добавлен! Не забудь нажать ОПУБЛИКОВАТЬ.");
        }

        function addTrack() {
            const title = document.getElementById('adm-title').value;
            const url = document.getElementById('adm-url').value;
            const genre = document.getElementById('adm-genre').value;
            if(!title || !url) return alert("Заполни название и ссылку!");
            const artist = prompt("Введи имя исполнителя (точно как в списке):");
            if(!artist) return;
            database.tracks.push({ title, artist, genre, url });
            render();
            alert("Трек добавлен! Не забудь нажать ОПУБЛИКОВАТЬ.");
        }

        function deleteItem(type, idx) {
            database[type].splice(idx, 1);
            render();
        }

        async function saveToGithub() {
            const token = document.getElementById('gh-token').value;
            if(!token) return alert("Нужен GitHub Token!");
            localStorage.setItem('gh_token', token);

            const btn = document.getElementById('save-btn');
            btn.innerText = "СОХРАНЯЮ...";
            btn.disabled = true;

            try {
                // 1. Get current file SHA
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await res.json();
                const sha = fileData.sha;

                // 2. Update File
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(database, null, 2))));
                const updateRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Update database via app",
                        content: content,
                        sha: sha
                    })
                });

                if(updateRes.ok) {
                    alert("Успешно опубликовано! Музыка обновится через минуту.");
                    toggleAdmin();
                } else {
                    alert("Ошибка GitHub: " + updateRes.status);
                }
            } catch(e) {
                alert("Ошибка соединения: " + e.message);
            } finally {
                btn.innerText = "ОПУБЛИКОВАТЬ";
                btn.disabled = false;
            }
        }

        // PLAYER ENGINE
        function playTrack(idx) {
            if(currentIdx === idx) return togglePlay();
            currentIdx = idx;
            const t = filteredTracks[idx];
            audio.src = t.url;
            audio.play();
            updateUI(t);
            document.getElementById('mini-player').classList.remove('translate-y-[200%]');
            render();
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        function togglePlay() {
            audio.paused ? audio.play() : audio.pause();
            updateUI(filteredTracks[currentIdx]);
            render();
        }

        function updateUI(t) {
            const art = database.artists.find(a => a.name === t.artist) || { img: '' };
            const icon = audio.paused ? 'fa-play' : 'fa-pause';
            
            document.getElementById('m-title').innerText = t.title;
            document.getElementById('m-artist').innerText = t.artist;
            document.getElementById('m-img').src = art.img;
            document.getElementById('m-play-btn').innerHTML = `<i class="fa-solid ${icon}"></i>`;
            
            document.getElementById('f-title').innerText = t.title;
            document.getElementById('f-artist').innerText = t.artist;
            document.getElementById('f-img').src = art.img;
            document.getElementById('f-play-btn').innerHTML = `<i class="fa-solid ${icon} ${audio.paused ? 'ml-1' : ''}"></i>`;
        }

        function filterGenre(g) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            filteredTracks = g === 'All' ? database.tracks : database.tracks.filter(t => t.genre === g);
            render();
        }

        function filterByArtist(name) {
            filteredTracks = database.tracks.filter(t => t.artist === name);
            render();
        }

        // Helpers
        function nextTrack() { if(currentIdx < filteredTracks.length - 1) playTrack(currentIdx + 1); }
        function prevTrack() { if(currentIdx > 0) playTrack(currentIdx - 1); }
        function openFullPlayer() { document.getElementById('full-player').classList.add('active'); }
        function closeFullPlayer() { document.getElementById('full-player').classList.remove('active'); }
        function seek(e) { audio.currentTime = (e.clientX - 40) / (window.innerWidth - 80) * audio.duration; }
        
        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration * 100) || 0;
            document.getElementById('f-progress').style.width = p + '%';
            const fmt = t => Math.floor(t/60) + ":" + Math.floor(t%60).toString().padStart(2,'0');
            document.getElementById('f-time-curr').innerText = fmt(audio.currentTime);
            document.getElementById('f-time-total').innerText = fmt(audio.duration || 0);
        };
        audio.onended = () => nextTrack();

        init();
    </script>
</body>
</html>
